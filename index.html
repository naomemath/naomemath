<!DOCTYPE html>
<html lang="pt-BR" id="root">
<head>
<meta charset="UTF-8">
<script>
  (function(){
    var t=localStorage.getItem('nmm_theme');
    if(t==='light')document.documentElement.setAttribute('data-theme','light');
  })();
</script>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>naomemath · finanças</title>
<!-- Chart.js removido: usando Canvas API nativa -->
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  /* ── SUPERFÍCIES ── */
  --bg:#09090f;
  --s1:#0f0f1a;
  --s2:#131320;
  --s3:#17172a;
  --s4:#1c1c2e;

  /* ── BORDAS ── */
  --b1:rgba(255,255,255,0.06);
  --b2:rgba(255,255,255,0.10);
  --b3:rgba(255,255,255,0.16);

  /* ── PALETA SEMÂNTICA ── */
  --gold:#C68A14;
  --gold-dim:rgba(198,138,20,0.09);
  --gold-soft:rgba(198,138,20,0.04);
  --gold2:rgba(198,138,20,0.12);

  --green:#1A9E6E;
  --green-dim:rgba(26,158,110,0.09);
  --green-soft:rgba(26,158,110,0.04);
  --green2:rgba(26,158,110,0.12);

  --red:#C94040;
  --red-dim:rgba(201,64,64,0.09);
  --red-soft:rgba(201,64,64,0.04);
  --red2:rgba(201,64,64,0.12);

  --blue:#3B7DE8;
  --blue-dim:rgba(59,125,232,0.09);
  --blue2:rgba(59,125,232,0.12);

  --purple:#6D3AC7;
  --purple-dim:rgba(109,58,199,0.09);
  --purple2:rgba(109,58,199,0.12);

  --teal:#0B85A0;
  --teal-dim:rgba(11,133,160,0.09);
  --teal2:rgba(11,133,160,0.12);

  --orange:#EA580C;
  --pink:#DB2777;

  /* ── TIPOGRAFIA ── */
  --text:#e8e8f0;
  --sub:#72728a;
  --dim:#38384e;
  --muted:#2a2a3e;

  --fs-2xs:10px;
  --fs-xs:11px;
  --fs-sm:12px;
  --fs-base:13px;
  --fs-md:14px;
  --fs-lg:17px;
  --fs-xl:22px;
  --fs-2xl:30px;
  --fs-display:36px;

  /* ── ESPAÇAMENTO ── */
  --sp-1:4px; --sp-2:8px; --sp-3:12px;
  --sp-4:16px; --sp-5:20px; --sp-6:24px;

  /* ── RAIOS ── */
  --r-xs:6px; --r-sm:8px; --r:12px;
  --r-lg:16px; --r-xl:20px; --r-full:999px;

  /* ── SOMBRAS ── */
  --sh-xs:0 1px 2px rgba(0,0,0,.18);
  --sh-sm:0 1px 3px rgba(0,0,0,.2);
  --sh:0 2px 10px rgba(0,0,0,.25),0 1px 2px rgba(0,0,0,.15);
  --sh-md:0 4px 16px rgba(0,0,0,.28),0 1px 4px rgba(0,0,0,.15);
  --sh-lg:0 8px 32px rgba(0,0,0,.32);
  --sh-glow:none;

  /* aliases legacy */
  --shadow:var(--sh-sm);
  --shadow-sm:var(--sh-xs);
  --shadow-md:var(--sh-md);
  --shadow-lg:var(--sh-lg);
  --shadow-glow:none;

  /* ── GLASS ── */
  --glass:rgba(9,9,15,0.88);
  --glass-border:rgba(255,255,255,0.07);

  /* ── MOVIMENTO ── */
  --ease:cubic-bezier(.4,0,.2,1);
  --ease-out:cubic-bezier(0,.6,.4,1);
  --ease-in:cubic-bezier(.4,0,1,1);
  --spring:cubic-bezier(.34,1.4,.64,1);
  --spring-soft:cubic-bezier(.34,1.15,.64,1);
  --dur-instant:80ms;
  --dur-fast:120ms;
  --dur:180ms;
  --dur-med:240ms;
  --dur-slow:360ms;

  /* legacy */
  --r-sm:8px;
  --r-full:999px;
}

/* ── RESET & BASE ── */
*{box-sizing:border-box;margin:0;padding:0}
html,body{
  height:100%;background:var(--bg);color:var(--text);
  font-family:'DM Sans',sans-serif;overflow:hidden;
  font-size:var(--fs-base);line-height:1.5;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--s4);border-radius:var(--r-full)}
button,input,select{font-family:inherit;font-size:inherit}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}

/* ── LOGIN ── */
#login{
  position:fixed;inset:0;z-index:999;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:var(--sp-6);
  background:radial-gradient(ellipse 60% 30% at 50% -20%,rgba(198,138,20,.05),transparent 55%),var(--bg);
}
.brand{text-align:center}
.brand h1{
  font-family:'Syne',sans-serif;font-size:26px;font-weight:800;
  letter-spacing:-1.5px;line-height:1;color:var(--text);
}
.brand h1 em{color:var(--gold);font-style:normal}
.brand p{
  font-size:10px;color:var(--sub);
  letter-spacing:3px;text-transform:uppercase;margin-top:8px;opacity:.7;
}
.lbox{
  background:var(--s1);border:1px solid var(--b2);
  border-radius:var(--r-xl);padding:28px;
  width:296px;max-width:90vw;
  display:flex;flex-direction:column;gap:14px;
  box-shadow:var(--sh-md);
}
.lbl{
  display:block;font-size:var(--fs-2xs);color:var(--sub);
  font-weight:600;letter-spacing:.8px;text-transform:uppercase;margin-bottom:4px;
}
.inp{
  width:100%;background:var(--s2);border:1px solid var(--b2);
  border-radius:var(--r-sm);padding:10px 12px;
  color:var(--text);font-size:var(--fs-md);
  outline:none;transition:border-color var(--dur) var(--ease);
}
.inp:focus{border-color:var(--gold)}
.inp::placeholder{color:var(--dim)}
.btn-g{
  width:100%;background:var(--gold);color:#000;border:none;
  border-radius:var(--r-sm);padding:11px;
  font-size:var(--fs-base);font-weight:700;letter-spacing:-.1px;
  cursor:pointer;margin-top:2px;
  transition:opacity var(--dur) var(--ease),box-shadow var(--dur) var(--ease);
}
.btn-g:hover{opacity:.85}
.btn-g:active{opacity:.75;transform:scale(.99)}
.lerr{color:var(--red);font-size:var(--fs-xs);text-align:center;display:none}
.lhint{font-size:var(--fs-xs);color:var(--sub);text-align:center;line-height:1.7}

/* ── SHELL ── */
#app{display:none;height:100vh;flex-direction:column}

/* ── TOPBAR ── */
.top{
  display:flex;align-items:center;gap:var(--sp-2);
  padding:0 20px;height:44px;
  border-bottom:1px solid var(--b1);
  background:rgba(9,9,15,.92);
  backdrop-filter:saturate(180%) blur(20px);
  -webkit-backdrop-filter:saturate(180%) blur(20px);
  flex-shrink:0;flex-wrap:nowrap;
  position:sticky;top:0;z-index:200;
}
.tlogo{
  font-family:'Syne',sans-serif;font-size:14px;font-weight:800;
  letter-spacing:-.3px;white-space:nowrap;color:var(--text);flex-shrink:0;
}
.tlogo em{color:var(--gold);font-style:normal}
.acc-sw{
  display:flex;background:var(--s2);
  border:1px solid var(--b1);border-radius:var(--r-sm);
  padding:2px;gap:1px;flex-shrink:0;
}
.ab{
  background:transparent;border:none;color:var(--sub);
  border-radius:6px;padding:4px 10px;
  font-size:var(--fs-xs);font-weight:600;
  cursor:pointer;transition:all var(--dur-fast) var(--ease);
  white-space:nowrap;letter-spacing:.1px;
}
.ab:hover{color:var(--text);background:var(--s3)}
.ab.on{background:var(--gold);color:#000;font-weight:700}
.sp{flex:1;min-width:0}
.msel{
  background:var(--s2);border:1px solid var(--b1);
  color:var(--text);border-radius:var(--r-sm);
  padding:4px 8px;font-size:var(--fs-xs);
  outline:none;cursor:pointer;max-width:140px;flex-shrink:0;
}
.tbtn{
  border:none;border-radius:var(--r-sm);
  padding:5px 11px;font-size:var(--fs-xs);
  font-weight:600;cursor:pointer;flex-shrink:0;
  transition:opacity var(--dur-fast) var(--ease);letter-spacing:.1px;
}
.tbtn:hover{opacity:.8}
.tbtn:active{opacity:.6}
.pill{
  border-radius:var(--r-full);padding:3px 9px;
  font-size:10px;font-weight:600;
  white-space:nowrap;flex-shrink:0;
  font-variant-numeric:tabular-nums;letter-spacing:-.2px;
  border:1px solid;
}

/* ── TABS ── */
.tabs{
  display:flex;gap:1px;padding:0 20px;
  border-bottom:1px solid var(--b1);
  flex-shrink:0;overflow-x:auto;
  background:var(--s1);height:38px;align-items:center;
}
.tabs::-webkit-scrollbar{display:none}
.tab{
  background:transparent;border:none;
  color:var(--sub);border-radius:var(--r-sm);
  padding:5px 12px;font-size:var(--fs-xs);
  font-weight:500;cursor:pointer;white-space:nowrap;
  transition:color var(--dur-fast) var(--ease),background var(--dur-fast) var(--ease);
  letter-spacing:.1px;height:30px;display:flex;align-items:center;
}
.tab:hover{color:var(--text);background:var(--s2)}
.tab.on{
  background:transparent;color:var(--text);
  font-weight:600;
}
.tab-badge{
  background:var(--red);color:#fff;border-radius:var(--r-full);
  font-size:9px;padding:1px 4px;margin-left:3px;font-weight:700;
}

/* ── SCROLL & PAGE ── */
.scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.page{padding:14px 16px;max-width:1020px;margin:0 auto;display:flex;flex-direction:column;gap:10px}

/* ── GRID ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}

/* ── CARD ── */
.card{
  background:var(--s1);border:1px solid var(--b1);
  border-radius:var(--r);padding:14px 16px;
  transition:border-color var(--dur) var(--ease);
}
.card:hover{border-color:var(--b2)}

/* Stat card */
.sl{
  font-size:10px;color:var(--sub);font-weight:500;
  letter-spacing:.5px;text-transform:uppercase;margin-bottom:4px;opacity:.9;
}
.sv{
  font-family:'Syne',sans-serif;font-size:16px;
  font-weight:800;line-height:1.15;
  font-variant-numeric:tabular-nums;letter-spacing:-.4px;
}
.ss{font-size:10px;color:var(--sub);margin-top:4px;opacity:.8}
.st{font-weight:600;font-size:13px;color:var(--text);letter-spacing:-.1px}
.sh{display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--sp-3)}

/* ── PROGRESS ── */
.track{
  background:var(--s3);border-radius:var(--r-full);
  height:2px;overflow:hidden;margin-top:var(--sp-2);
}
.fill{height:100%;border-radius:var(--r-full);transition:width .8s var(--ease)}

/* ── CHECKLIST BLOCK ── */
.cblock{
  background:var(--s1);border:1px solid var(--b1);
  border-radius:var(--r);overflow:hidden;
}
.cbh{
  display:flex;align-items:center;justify-content:space-between;
  padding:9px 14px;border-bottom:1px solid var(--b1);
  background:var(--s2);
}
.cbhtl{
  font-weight:600;font-size:var(--fs-base);
  display:flex;align-items:center;gap:6px;color:var(--text);
}
.cbct{
  font-size:var(--fs-2xs);color:var(--sub);
  background:var(--s3);border-radius:var(--r-full);
  padding:1px 7px;font-weight:600;letter-spacing:.3px;
}
.cbv{font-weight:700;font-size:var(--fs-base);font-variant-numeric:tabular-nums}

/* ── ROW ── */
.crow{
  display:flex;align-items:center;gap:var(--sp-2);
  padding:8px 14px;
  border-bottom:1px solid var(--b1);
  transition:background var(--dur-fast) var(--ease);
  cursor:pointer;-webkit-tap-highlight-color:transparent;
  user-select:none;
}
.crow:last-child{border-bottom:none}
.crow:hover{background:var(--s2)}
.crow:active{background:var(--s3)}
.crow.done{opacity:.4}
.crow.done .rn{text-decoration:line-through}

/* ── CHECK ── */
.chk{
  width:18px;height:18px;min-width:18px;border-radius:50%;
  border:1.5px solid var(--b3);
  display:flex;align-items:center;justify-content:center;
  transition:all var(--dur) var(--ease);flex-shrink:0;
  background:transparent;cursor:pointer;
}
.chk.ok{border-color:currentColor;background:currentColor}
.chk svg{
  width:9px;height:9px;stroke:#000;stroke-width:2.5;
  fill:none;display:none;stroke-linecap:round;stroke-linejoin:round;
}
.chk.ok svg{display:block}

/* ── ROW ELEMENTS ── */
.rn{
  flex:1;font-size:var(--fs-base);font-weight:400;color:var(--text);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.rb{
  font-size:var(--fs-2xs);padding:2px 6px;border-radius:var(--r-xs);
  font-weight:600;white-space:nowrap;flex-shrink:0;letter-spacing:.2px;
}
.rd{font-size:var(--fs-xs);color:var(--sub);white-space:nowrap;flex-shrink:0}
.rv{
  font-weight:600;font-size:var(--fs-base);white-space:nowrap;
  min-width:68px;text-align:right;flex-shrink:0;
  font-variant-numeric:tabular-nums;letter-spacing:-.3px;
}
.rdl{
  background:none;border:none;color:var(--dim);
  cursor:pointer;font-size:14px;padding:0 2px;
  line-height:1;transition:color var(--dur-fast) var(--ease);flex-shrink:0;
}
.rdl:hover{color:var(--red)}
.redit{
  background:none;border:none;color:var(--dim);
  cursor:pointer;font-size:11px;padding:0 2px;
  line-height:1;transition:color var(--dur-fast) var(--ease);flex-shrink:0;
}
.redit:hover{color:var(--text)}
.erow{
  padding:20px 14px;color:var(--dim);font-size:11px;
  font-style:normal;opacity:.6;text-align:center;
  display:flex;flex-direction:column;align-items:center;gap:4px;
  letter-spacing:.2px;
}

/* ── EDIT PANEL ── */
.edit-panel{
  background:var(--s2);border-bottom:1px solid var(--b1);
  padding:var(--sp-3) var(--sp-4);
  display:flex;flex-direction:column;gap:var(--sp-2);
  animation:slideDown 120ms var(--ease-out);
}
@keyframes slideDown{from{opacity:0;transform:translateY(-3px)}to{opacity:1;transform:translateY(0)}}
.edit-row{display:flex;gap:6px;flex-wrap:wrap;align-items:flex-end}
.edit-lbl{font-size:var(--fs-2xs);color:var(--sub);font-weight:600;letter-spacing:.5px;text-transform:uppercase;margin-bottom:2px;display:block}
.edit-inp{
  background:var(--s1);border:1px solid var(--b2);
  border-radius:var(--r-xs);padding:6px 9px;
  color:var(--text);font-size:var(--fs-sm);
  outline:none;transition:border-color var(--dur) var(--ease);min-width:70px;
}
.edit-inp:focus{border-color:var(--gold)}
.edit-sel{
  background:var(--s1);border:1px solid var(--b2);color:var(--text);
  border-radius:var(--r-xs);padding:6px 9px;font-size:var(--fs-sm);
  outline:none;cursor:pointer;
}
.edit-save{
  background:var(--green);color:#fff;border:none;
  border-radius:var(--r-xs);padding:6px 12px;
  font-size:var(--fs-sm);font-weight:600;cursor:pointer;
}
.edit-cancel{
  background:var(--s3);color:var(--sub);border:none;
  border-radius:var(--r-xs);padding:6px 10px;
  font-size:var(--fs-sm);font-weight:500;cursor:pointer;
}

/* ── FORM ── */
.af{
  background:var(--s1);border:1px solid var(--b1);
  border-radius:var(--r);padding:var(--sp-3) var(--sp-4);
}
.aft{
  font-weight:600;font-size:var(--fs-2xs);color:var(--sub);
  text-transform:uppercase;letter-spacing:.8px;margin-bottom:var(--sp-2);
}
.fr{display:flex;gap:6px;flex-wrap:wrap;align-items:flex-end}
.fi{
  flex:1;min-width:80px;background:var(--s2);
  border:1px solid var(--b1);border-radius:var(--r-xs);
  padding:7px 10px;color:var(--text);font-size:var(--fs-base);
  outline:none;transition:border-color var(--dur) var(--ease);
}
.fi:focus{border-color:var(--gold)}
.fi::placeholder{color:var(--dim)}
.fs{
  background:var(--s2);border:1px solid var(--b1);
  color:var(--text);border-radius:var(--r-xs);
  padding:7px 10px;font-size:var(--fs-base);
  outline:none;cursor:pointer;flex-shrink:0;
}
.fa{
  border:none;border-radius:var(--r-xs);
  padding:7px 14px;font-size:var(--fs-sm);
  font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0;
  transition:opacity var(--dur-fast) var(--ease);letter-spacing:.1px;
}
.fa:hover{opacity:.82}
.fa:active{opacity:.65}

/* ── CHARTS ── */
.ch{position:relative}
.ch-s{height:160px}.ch-m{height:210px}.ch-l{height:250px}

/* ── ALERTS ── */
.al{
  border-radius:var(--r-sm);padding:9px 12px;
  font-size:var(--fs-sm);font-weight:500;
  display:flex;align-items:flex-start;gap:8px;
  border:1px solid;line-height:1.5;
}
.al-r{background:var(--red-soft);border-color:var(--red-dim);color:#f87171}
.al-y{background:var(--gold-soft);border-color:var(--gold-dim);color:#fbbf24}
.al-g{background:var(--green-soft);border-color:var(--green-dim);color:#34d399}
.al-b{background:var(--blue-dim);border-color:rgba(59,130,246,.2);color:#93c5fd}

/* ── METRIC ROW ── */
.mr{
  display:flex;align-items:center;gap:var(--sp-3);
  padding:11px var(--sp-4);
  background:var(--s1);border:1px solid var(--b1);
  border-radius:var(--r-sm);
}
.md{width:6px;height:6px;min-width:6px;border-radius:50%}
.mi{flex:1;min-width:0}
.mt{font-weight:500;font-size:var(--fs-base);color:var(--text)}
.ms{font-size:var(--fs-xs);color:var(--sub);margin-top:1px}
.mv{font-weight:700;font-size:var(--fs-base);white-space:nowrap;font-variant-numeric:tabular-nums}

/* ── TABLE ── */
.htbl{width:100%;border-collapse:collapse;font-size:var(--fs-sm)}
.htbl th{
  text-align:left;font-size:var(--fs-2xs);color:var(--sub);
  font-weight:600;letter-spacing:.6px;text-transform:uppercase;
  padding:0 var(--sp-2) var(--sp-2) 0;border-bottom:1px solid var(--b1);
}
.htbl td{
  padding:8px var(--sp-2) 8px 0;
  border-bottom:1px solid var(--b1);vertical-align:middle;
}
.htbl tr:last-child td{border:none}

/* ── TOAST ── */
#toast{
  position:fixed;bottom:20px;left:50%;
  transform:translateX(-50%) translateY(4px);
  background:var(--s2);border:1px solid var(--b2);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-radius:var(--r);padding:8px 16px;
  font-size:var(--fs-sm);font-weight:600;
  z-index:9999;opacity:0;
  transition:opacity var(--dur) var(--ease),transform var(--dur) var(--ease);
  pointer-events:none;white-space:nowrap;
  box-shadow:var(--sh-md);
}

/* ── XFER ROW ── */
.xrow{border-left:2px solid rgba(11,133,160,.2)}

/* ── PROJ BAR ── */
.proj-bar{
  display:flex;border-radius:var(--r-xs);overflow:hidden;
  height:18px;gap:1px;margin-top:var(--sp-2);
}
.proj-seg{
  display:flex;align-items:center;justify-content:center;
  font-size:9px;font-weight:600;color:rgba(0,0,0,.55);
  min-width:0;overflow:hidden;white-space:nowrap;padding:0 4px;
  letter-spacing:.3px;
}

/* ── DIVIDER ── */
.divider{height:1px;background:var(--b1);margin:var(--sp-2) 0}

/* ── RESPONSIVE ── */
@media(max-width:700px){
  .g4{grid-template-columns:1fr 1fr}
  .g3{grid-template-columns:1fr 1fr}
  .top{gap:var(--sp-1)}
  .msel{max-width:110px}
}
@media(max-width:440px){
  .g2,.g3,.g4{grid-template-columns:1fr}
  .fr{flex-direction:column}
  .fi,.fs,.fa{width:100%!important;min-width:0}
  .page{padding:var(--sp-3)}
}

/* ── MICROINTERAÇÕES PREMIUM ── */

/* Cards — escala sutil no hover */
.card{transform:translateZ(0)}
.card:hover{border-color:var(--b2);box-shadow:0 0 0 1px var(--b2)}

/* Botões — feedback preciso */
.fa{transform:translateZ(0)}
.fa:active{transform:scale(.97);opacity:.7}
.tbtn{transform:translateZ(0)}
.ab{transform:translateZ(0)}

/* Check — spring animado */
.chk{transform:translateZ(0);will-change:background,border-color}
.chk.ok{animation:checkPop var(--dur) var(--spring) both}
@keyframes checkPop{
  0%{transform:scale(.8)}
  60%{transform:scale(1.12)}
  100%{transform:scale(1)}
}

/* Row — feedback tátil */
.crow{transform:translateZ(0)}
.crow:hover .rv{color:var(--text)}
.crow:hover .rdl{color:var(--dim)}
.crow:hover .redit{color:var(--sub)}

/* Progress fill — easing suave */
.fill{transition:width var(--dur-slow) var(--ease-out)}

/* Tab — transição suave entre abas */
.tab{position:relative}
.tab.on::after{
  content:'';position:absolute;bottom:-1px;left:0;right:0;
  height:2px;background:var(--gold);border-radius:2px 2px 0 0;
}

/* Edit panel — entrada suave */
.edit-panel{will-change:opacity,transform}

/* Focus-visible global */
:focus-visible{
  outline:2px solid rgba(198,138,20,.5);
  outline-offset:2px;
  border-radius:var(--r-xs);
}
:focus:not(:focus-visible){outline:none}

/* Input focus refinado */
.fi:focus,.inp:focus,.edit-inp:focus,.fs:focus{
  border-color:var(--gold);
  box-shadow:0 0 0 3px rgba(198,138,20,.08);
}

/* Número animado no pill */
.pill{transition:color var(--dur) var(--ease),background var(--dur) var(--ease),border-color var(--dur) var(--ease)}

/* Cblock — hover leve */
.cblock{transition:border-color var(--dur) var(--ease)}
.cblock:hover{border-color:var(--b2)}

/* Touch targets mobile */
@media(max-width:700px){
  .crow{min-height:44px}
  .ab{min-height:30px;padding:6px 12px}
  .tab{min-height:36px}
  .fa{min-height:36px}
  .chk{width:20px;height:20px}
}

/* ── METAS ── */
.meta-card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);padding:15px;transition:border-color var(--dur) var(--ease)}
.meta-card:hover{border-color:var(--b2)}
.meta-card.meta-done{border-color:rgba(26,158,110,.2);background:rgba(26,158,110,.025)}

.meta-val{font-family:'Syne',sans-serif;font-size:14px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:-.3px}
.meta-badge-done{background:rgba(26,158,110,.12);color:var(--green);border-radius:var(--r-full);font-size:10px;padding:2px 8px;font-weight:600}

<script>
/* ── UTILS ── */
const fmt=v=>isNaN(+v)?'R$0,00':(+v).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
const fmtK=v=>{const n=+v;return n>=1000?'R$'+(n/1000).toFixed(0)+'k':fmt(n)};
const pct=(a,b)=>b>0?Math.min(100,+(a/b*100).toFixed(1)):0;
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const mLabel=k=>{const[y,m]=k.split('-');const s=new Date(+y,+m-1).toLocaleDateString('pt-BR',{month:'long',year:'numeric'});return s[0].toUpperCase()+s.slice(1)};
const CHK=`<svg viewBox="0 0 12 12"><polyline points="1.5,6.5 4.5,9.5 10.5,2.5"/></svg>`;
const now=new Date();

function toast(msg,col='var(--text)'){
  const t=document.getElementById('toast');
  t.textContent=msg;t.style.color=col;t.style.opacity='1';
  clearTimeout(t._t);t._t=setTimeout(()=>t.style.opacity='0',2000);
}

/* ── CATS ── */
const CPF={moradia:{l:'Moradia',c:'#F59E0B',i:'🏠'},saude:{l:'Saúde',c:'#10B981',i:'💚'},financeiro:{l:'Financeiro',c:'#EF4444',i:'💳'},servicos:{l:'Serviços',c:'#8B5CF6',i:'⚡'},alimentacao:{l:'Alimentação',c:'#F97316',i:'🍽'},transporte:{l:'Transporte',c:'#06B6D4',i:'🚗'},lazer:{l:'Lazer',c:'#EC4899',i:'🎉'},educacao:{l:'Educação',c:'#84CC16',i:'📚'},outros:{l:'Outros',c:'#6B7280',i:'📦'}};
const CPJ={impostos:{l:'Impostos',c:'#EF4444',i:'🏛'},contabilidade:{l:'Contabilidade',c:'#8B5CF6',i:'📚'},operacional:{l:'Operacional',c:'#F97316',i:'⚙️'},folha:{l:'Folha/Sócios',c:'#F59E0B',i:'👥'},servicos_pj:{l:'Serviços PJ',c:'#06B6D4',i:'🔧'},marketing:{l:'Marketing',c:'#EC4899',i:'📣'},outros_pj:{l:'Outros',c:'#6B7280',i:'📦'}};
const CATS={...CPF,...CPJ};
const ITYPES_PF=['FII','ETF','Fundo','Renda Fixa','Ações','Crypto','Tesouro Direto','Outros'];
const ITYPES_PJ=['Fundo PJ','Renda Fixa PJ','CDB','LCI/LCA','Tesouro Direto PJ','Outros PJ'];
const CARDS=['Nubank','Santander','BB','Outro'];
const CARD_C={Nubank:'#8B5CF6',Santander:'#EF4444',BB:'#F59E0B',Outro:'#6B7280'};
/* ═══════════════════════════════════════════════
   NANO CHARTS — Canvas API nativa, zero deps
═══════════════════════════════════════════════ */
const NC={
  /* Paleta padrão */
  PAL:['#6D3AC7','#C68A14','#1A9E6E','#C94040','#3B7DE8','#DB2777','#0B85A0','#65A30D'],

  /* Formatar valor BRL */
  fmt:v=>(+v).toLocaleString('pt-BR',{style:'currency',currency:'BRL'}),

  /* Limpar canvas */
  clear(el){
    if(!el)return false;
    el.width=el.offsetWidth||el.clientWidth||300;
    el.height=el.offsetHeight||el.clientHeight||200;
    return el.getContext('2d');
  },

  /* DONUT */
  donut(id,labels,values,opts){
    const el=document.getElementById(id);
    const ctx=this.clear(el);
    if(!ctx||!values.length)return;
    const W=el.width,H=el.height;
    const cx=W*0.42,cy=H/2,r=Math.min(cx,cy)*0.82,cut=0.65;
    const total=values.reduce((a,b)=>a+b,0);
    if(!total)return;
    let angle=-Math.PI/2;
    const colors=opts&&opts.colors?opts.colors:this.PAL;

    /* Segmentos */
    values.forEach((v,i)=>{
      const sweep=v/total*Math.PI*2;
      ctx.beginPath();
      ctx.moveTo(cx,cy);
      ctx.arc(cx,cy,r,angle,angle+sweep);
      ctx.arc(cx,cy,r*cut,angle+sweep,angle,true);
      ctx.closePath();
      ctx.fillStyle=colors[i%colors.length];
      ctx.globalAlpha=0.82;
      ctx.fill();
      angle+=sweep;
    });
    ctx.globalAlpha=1;

    /* Legenda direita */
    const legX=W*0.86,legY=cy-(labels.length*14)/2;
    labels.forEach((lbl,i)=>{
      const y=legY+i*16;
      ctx.fillStyle=colors[i%colors.length];
      ctx.globalAlpha=0.9;
      ctx.beginPath();
      ctx.arc(legX-W*0.08,y,4,0,Math.PI*2);
      ctx.fill();
      ctx.globalAlpha=1;
      ctx.fillStyle='#72728a';
      ctx.font='10px DM Sans,sans-serif';
      ctx.textAlign='left';
      ctx.fillText(lbl.length>10?lbl.slice(0,9)+'…':lbl,legX-W*0.068,y+3.5);
    });
  },

  /* BAR VERTICAL */
  bar(id,labels,datasets,opts){
    const el=document.getElementById(id);
    const ctx=this.clear(el);
    if(!ctx)return;
    const W=el.width,H=el.height;
    const pad={t:12,r:12,b:28,l:46};
    const chartW=W-pad.l-pad.r;
    const chartH=H-pad.t-pad.b;
    const n=labels.length;
    const allVals=datasets.flatMap(d=>d.data);
    const maxV=Math.max(...allVals,1);

    /* Grid */
    ctx.strokeStyle='rgba(255,255,255,0.05)';
    ctx.lineWidth=1;
    [0,.25,.5,.75,1].forEach(f=>{
      const y=pad.t+chartH*(1-f);
      ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke();
      /* Tick */
      ctx.fillStyle='#4a4a62';
      ctx.font='9px DM Sans,sans-serif';
      ctx.textAlign='right';
      const val=maxV*f;
      const lbl=val>=1000?(val/1000).toFixed(0)+'k':val.toFixed(0);
      ctx.fillText('R$'+lbl,pad.l-4,y+3);
    });

    /* Barras */
    const grpW=chartW/n;
    const barW=grpW*0.32;
    datasets.forEach((ds,di)=>{
      const color=ds.color||this.PAL[di%this.PAL.length];
      ds.data.forEach((v,i)=>{
        const h=v/maxV*chartH;
        const x=pad.l+i*grpW+(di===0?grpW*0.12:grpW*0.5);
        const y=pad.t+chartH-h;
        ctx.fillStyle=color;
        ctx.globalAlpha=0.75;
        ctx.beginPath();
        ctx.roundRect?ctx.roundRect(x,y,barW,h,3):ctx.rect(x,y,barW,h);
        ctx.fill();
      });
    });
    ctx.globalAlpha=1;

    /* Labels X */
    ctx.fillStyle='#4a4a62';
    ctx.font='10px DM Sans,sans-serif';
    ctx.textAlign='center';
    labels.forEach((lbl,i)=>{
      ctx.fillText(lbl,pad.l+i*grpW+grpW/2,H-8);
    });

    /* Legenda */
    if(datasets.length>1){
      let lx=pad.l;
      datasets.forEach((ds,i)=>{
        ctx.fillStyle=ds.color||this.PAL[i];
        ctx.globalAlpha=0.85;
        ctx.fillRect(lx,4,8,6);
        ctx.globalAlpha=1;
        ctx.fillStyle='#72728a';
        ctx.font='9px DM Sans,sans-serif';
        ctx.textAlign='left';
        ctx.fillText(ds.label||'',lx+11,10);
        lx+=ds.label?(ds.label.length*5.5+20):0;
      });
    }
  },

  /* BAR HORIZONTAL */
  barH(id,labels,values,opts){
    const el=document.getElementById(id);
    const ctx=this.clear(el);
    if(!ctx||!values.length)return;
    const W=el.width,H=el.height;
    const maxV=Math.max(...values,1);
    const pad={t:8,r:60,b:8,l:80};
    const chartW=W-pad.l-pad.r;
    const barH=Math.min(18,(H-pad.t-pad.b)/values.length-6);
    const colors=opts&&opts.colors?opts.colors:this.PAL;

    values.forEach((v,i)=>{
      const y=pad.t+i*((H-pad.t-pad.b)/values.length)+4;
      const w=v/maxV*chartW;
      /* Track */
      ctx.fillStyle='rgba(255,255,255,0.05)';
      ctx.beginPath();
      ctx.roundRect?ctx.roundRect(pad.l,y,chartW,barH,3):ctx.rect(pad.l,y,chartW,barH);
      ctx.fill();
      /* Bar */
      ctx.fillStyle=colors[i%colors.length];
      ctx.globalAlpha=0.75;
      ctx.beginPath();
      ctx.roundRect?ctx.roundRect(pad.l,y,w,barH,3):ctx.rect(pad.l,y,w,barH);
      ctx.fill();
      ctx.globalAlpha=1;
      /* Label esquerda */
      ctx.fillStyle='#72728a';
      ctx.font='10px DM Sans,sans-serif';
      ctx.textAlign='right';
      const lbl=labels[i]||'';
      ctx.fillText(lbl.length>9?lbl.slice(0,9)+'…':lbl,pad.l-6,y+barH/2+3.5);
      /* Valor direita */
      ctx.fillStyle='#e8e8f0';
      ctx.font='10px DM Sans,sans-serif';
      ctx.textAlign='left';
      const vlbl=v>=1000?'R$'+(v/1000).toFixed(0)+'k':v>0?'R$'+v.toFixed(0):'';
      ctx.fillText(vlbl,pad.l+w+6,y+barH/2+3.5);
    });
  },

  /* LINE */
  line(id,labels,datasets,opts){
    const el=document.getElementById(id);
    const ctx=this.clear(el);
    if(!ctx)return;
    const W=el.width,H=el.height;
    const pad={t:16,r:16,b:28,l:46};
    const chartW=W-pad.l-pad.r;
    const chartH=H-pad.t-pad.b;
    const allVals=datasets.flatMap(d=>d.data).filter(v=>!isNaN(v));
    if(!allVals.length)return;
    let minV=Math.min(...allVals);
    let maxV=Math.max(...allVals);
    if(minV===maxV){minV=minV-1;maxV=maxV+1;}
    const range=maxV-minV||1;
    const n=labels.length;

    /* Grid */
    ctx.strokeStyle='rgba(255,255,255,0.05)';
    ctx.lineWidth=1;
    [0,.5,1].forEach(f=>{
      const y=pad.t+chartH*(1-f);
      ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke();
      ctx.fillStyle='#4a4a62';
      ctx.font='9px DM Sans,sans-serif';
      ctx.textAlign='right';
      const val=minV+range*f;
      const lbl=Math.abs(val)>=1000?(val/1000).toFixed(0)+'k':val.toFixed(0);
      ctx.fillText('R$'+lbl,pad.l-4,y+3);
    });

    /* Labels X */
    ctx.fillStyle='#4a4a62';
    ctx.font='9px DM Sans,sans-serif';
    ctx.textAlign='center';
    labels.forEach((lbl,i)=>{
      const x=pad.l+i*(chartW/(n-1||1));
      ctx.fillText(lbl,x,H-8);
    });

    /* Linhas e fill */
    datasets.forEach((ds,di)=>{
      const color=ds.color||this.PAL[di%this.PAL.length];
      const pts=ds.data.map((v,i)=>({
        x:pad.l+i*(chartW/(n-1||1)),
        y:pad.t+chartH*(1-(v-minV)/range)
      }));
      if(pts.length<2)return;

      /* Fill */
      ctx.beginPath();
      ctx.moveTo(pts[0].x,pad.t+chartH);
      pts.forEach(p=>ctx.lineTo(p.x,p.y));
      ctx.lineTo(pts[pts.length-1].x,pad.t+chartH);
      ctx.closePath();
      ctx.fillStyle=color;
      ctx.globalAlpha=0.08;
      ctx.fill();
      ctx.globalAlpha=1;

      /* Linha */
      ctx.beginPath();
      ctx.moveTo(pts[0].x,pts[0].y);
      for(let i=1;i<pts.length;i++){
        const cp1x=(pts[i-1].x+pts[i].x)/2;
        ctx.bezierCurveTo(cp1x,pts[i-1].y,cp1x,pts[i].y,pts[i].x,pts[i].y);
      }
      ctx.strokeStyle=color;
      ctx.lineWidth=1.5;
      ctx.globalAlpha=0.9;
      ctx.stroke();
      ctx.globalAlpha=1;

      /* Pontos */
      pts.forEach(p=>{
        ctx.beginPath();
        ctx.arc(p.x,p.y,2.5,0,Math.PI*2);
        ctx.fillStyle=color;
        ctx.fill();
      });
    });

    /* Legenda */
    if(datasets.length>1){
      let lx=pad.l;
      datasets.forEach((ds,i)=>{
        ctx.fillStyle=ds.color||this.PAL[i];
        ctx.globalAlpha=0.85;
        ctx.fillRect(lx,4,10,3);
        ctx.globalAlpha=1;
        ctx.fillStyle='#72728a';
        ctx.font='9px DM Sans,sans-serif';
        ctx.textAlign='left';
        ctx.fillText(ds.label||'',lx+13,9);
        lx+=ds.label?(ds.label.length*5+22):0;
      });
    }
  },

  /* RING — score circular */
  ring(id,score,color){
    const el=document.getElementById(id);
    if(!el)return;
    const size=Math.min(el.offsetWidth||88,el.offsetHeight||88);
    el.width=size; el.height=size;
    const ctx=el.getContext('2d');
    const cx=size/2,cy=size/2,r=size*0.42;
    ctx.clearRect(0,0,size,size);
    ctx.beginPath();
    ctx.arc(cx,cy,r,0,Math.PI*2);
    ctx.strokeStyle='rgba(255,255,255,0.07)';
    ctx.lineWidth=size*0.09;
    ctx.stroke();
    if(score>0){
      ctx.beginPath();
      ctx.arc(cx,cy,r,-Math.PI/2,-Math.PI/2+(score/100)*Math.PI*2);
      ctx.strokeStyle=color;
      ctx.lineWidth=size*0.09;
      ctx.lineCap='round';
      ctx.stroke();
    }
  }
};





/* ── AUTH ── */
const getPass=()=>localStorage.getItem('nmm_pass')||'1234';

/* ── TEMA DARK/LIGHT ── */
function getTheme(){return localStorage.getItem('nmm_theme')||'dark';}
function applyTheme(t){
  document.documentElement.setAttribute('data-theme', t==='light'?'light':'');
  const btn=document.getElementById('theme-btn');
  if(btn)btn.textContent=t==='light'?'☽':'☀';
}
function toggleTheme(){
  const next=getTheme()==='dark'?'light':'dark';
  localStorage.setItem('nmm_theme',next);
  applyTheme(next);
}
function login(){
  if(document.getElementById('pwd').value!==getPass()){
    document.getElementById('lerr').style.display='block';
    document.getElementById('pwd').value='';return;
  }
  document.getElementById('login').style.display='none';
  const a=document.getElementById('app');a.style.display='flex';a.style.flexDirection='column';
  applyTheme(getTheme());
  init();
}
function logout(){
  document.getElementById('login').style.display='flex';
  document.getElementById('app').style.display='none';
  document.getElementById('pwd').value='';
  document.getElementById('lerr').style.display='none';
}

/* ── DATA ── */
const load=()=>{try{return JSON.parse(localStorage.getItem('nmm_data')||'{}')}catch{return{}}};
const save=d=>localStorage.setItem('nmm_data',JSON.stringify(d));
function blank(){return{pf:{inc:[],bills:[],inv:[]},pj:{inc:[],bills:[],inv:[]},xfer:[],cards:[]};}
function getMD(k){
  const d=load();if(!d[k])d[k]=blank();
  const m=d[k];
  m.pf=m.pf||{};m.pf.inc=m.pf.inc||[];m.pf.bills=m.pf.bills||[];m.pf.inv=m.pf.inv||[];
  m.pj=m.pj||{};m.pj.inc=m.pj.inc||[];m.pj.bills=m.pj.bills||[];m.pj.inv=m.pj.inv||[];
  m.xfer=m.xfer||[];m.cards=m.cards||[];m.metas=m.metas||[];
  return m;
}
function saveMD(k,m){const d=load();d[k]=m;save(d);}
const allKeys=()=>Object.keys(load()).sort((a,b)=>b.localeCompare(a));

/* ── STATE ── */
let curM='2026-06',curAcc='PF',curTab='dash';
let CHS={};
const dC=()=>{Object.values(CHS).forEach(c=>{try{c.destroy()}catch{}});CHS={};};

/* ── INIT ── */
function init(){
  applyTheme(getTheme());
  if(!load()['2026-06'])saveMD('2026-06',blank());
  curM='2026-06';bSel();
  document.getElementById('msel').value=curM;
  checkVencimentos();render();
}
function bSel(){
  const sel=document.getElementById('msel'),prev=sel.value||curM;
  if(!allKeys().includes(curM))saveMD(curM,getMD(curM));
  const fk=allKeys();
  sel.innerHTML=fk.map(k=>`<option value="${k}">${mLabel(k)}</option>`).join('');
  if(fk.includes(prev))sel.value=prev;else sel.value=fk[0]||curM;
}
function changeMonth(v){curM=v;checkVencimentos();render();}
function setAcc(a){
  curAcc=a;
  ['PF','PJ','ALL'].forEach(x=>document.getElementById('ab-'+x.toLowerCase()).classList.toggle('on',x===a));
  render();
}
function addMonth(){
  const n=new Date();
  for(let i=0;i<24;i++){
    const d=new Date(n.getFullYear(),n.getMonth()+i);
    const k=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    if(!allKeys().includes(k)){
      // Copy recorrentes from previous month
      const prev=allKeys()[0];
      if(prev){
        const pm=getMD(prev);const nm=blank();
        pm.pf.bills.filter(b=>b.rec).forEach(b=>nm.pf.bills.push({...b,id:uid(),ok:false}));
        pm.pj.bills.filter(b=>b.rec).forEach(b=>nm.pj.bills.push({...b,id:uid(),ok:false}));
        pm.cards.filter(c=>c.rec).forEach(c=>{
          const proxParc=(c.parcAtual||1)+1;
          const total=c.parcelas||1;
          // Só copia se ainda tem parcelas restantes, ou se é recorrente sem parcelas (parcelas=1)
          if(total<=1||proxParc<=total){
            nm.cards.push({...c,id:uid(),ok:false,parcAtual:proxParc});
          }
          // Se chegou na última parcela, não copia mais — parcelamento encerrado
        });
        pm.pf.inv.filter(i=>i.rec).forEach(i=>nm.pf.inv.push({...i,id:uid(),ok:false}));
        pm.pj.inv.filter(i=>i.rec).forEach(i=>nm.pj.inv.push({...i,id:uid(),ok:false}));
        saveMD(k,nm);
      } else saveMD(k,blank());
      curM=k;bSel();document.getElementById('msel').value=k;render();
      toast('Mês criado');return;
    }
  }
}
function goTab(t,btn){
  curTab=t;document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));btn.classList.add('on');render();
}

/* ── VENCIMENTOS ── */
function checkVencimentos(){
  const m=getMD(curM);let v=0;
  const today=now.getDate();
  [...m.pf.bills,...m.pj.bills,...m.cards].forEach(b=>{
    if(!b.ok&&b.date){
      const d=parseInt(b.date);
      if(!isNaN(d)&&d-today<=3&&d>=today)v++;
    }
  });
  const tab=document.querySelector('.tab[data-t="contas"]');
  if(tab)tab.innerHTML=`Contas${v>0?` <span class="tab-badge">${v}</span>`:''}`;
}

/* ── PILL ── */
function updatePill(){
  const m=getMD(curM);
  const pfI=m.pf.inc.reduce((s,i)=>s+i.v,0);
  const pfO=m.pf.bills.reduce((s,b)=>s+b.v,0)+m.cards.reduce((s,c)=>s+c.v,0)+m.pf.inv.reduce((s,i)=>s+i.v,0);
  const pjI=m.pj.inc.reduce((s,i)=>s+i.v,0);
  const pjO=m.pj.bills.reduce((s,b)=>s+b.v,0)+m.xfer.reduce((s,x)=>s+x.v,0)+m.pj.inv.reduce((s,i)=>s+i.v,0);
  const bal=curAcc==='PF'?pfI-pfO:curAcc==='PJ'?pjI-pjO:(pfI+pjI)-(pfO+pjO);
  const pill=document.getElementById('spill');pill.style.display='';
  const pos=bal>=0;
  pill.style.cssText+=`;background:${pos?'var(--green2)':'var(--red2)'};border:1px solid ${pos?'rgba(16,185,129,.3)':'rgba(239,68,68,.3)'};color:${pos?'var(--green)':'var(--red)'}`;
  pill.textContent=fmt(bal);
}

function render(){
  dC();updatePill();
  const fns={dash:pgDash,entradas:pgEntradas,contas:pgContas,cartoes:pgCartoes,invest:pgInvest,metas:pgMetas,transf:pgTransf,cal:pgCalendario,saude:pgSaude,hist:pgHist,cfg:pgCfg};
  document.getElementById('pg').innerHTML=(fns[curTab]||pgDash)();
  document.querySelector('.scroll').scrollTop=0;
  requestAnimationFrame(()=>{
    if(curTab==='dash')drawDash();
    if(curTab==='metas')drawMetas();
    if(curTab==='saude')drawSaude();
    if(curTab==='hist')drawHist();
    if(curTab==='invest')drawInvest();
    if(curTab==='cartoes')drawCartoes();
  });
}

/* ── HELPER ── */
function cb(title,icon,items,col,rowFn,extra=''){
  const done=items.filter(i=>i.ok).length;
  const tot=items.reduce((s,i)=>s+i.v,0);
  return `<div class="cblock">
    <div class="cbh">
      <div class="cbhtl">${icon} ${title} <span class="cbct">${done}/${items.length}</span>${extra}</div>
      <div class="cbv" style="color:${col}">${fmt(tot)}</div>
    </div>
    ${items.length?items.map(rowFn).join(''):'<div class="erow">Nenhum item ainda.</div>'}
  </div>`;
}

function pgDash(){

  const pfI=m.pf.inc.reduce((s,i)=>s+i.v,0);
  const pfO=m.pf.bills.reduce((s,b)=>s+b.v,0);

  const pjI=m.pj.inc.reduce((s,i)=>s+i.v,0);
  const pjO=m.pj.bills.reduce((s,b)=>s+b.v,0);
  const pjInv=m.pj.inv.reduce((s,i)=>s+i.v,0);

  const pjBal=pjI-pjO-pjInv-xfer;
  const totalInv=allKeys().reduce((s,k)=>{const md=getMD(k);return s+md.pf.inv.reduce((a,i)=>a+i.v,0)+md.pj.inv.reduce((a,i)=>a+i.v,0)},0);

  // pending alerts
  const pending=[...m.pf.bills,...m.pj.bills,...m.cards].filter(b=>!b.ok);

  // projeção: onde vai o dinheiro
  const total=pfI||1;
  const segs=[
    {l:'Contas',v:pfO,c:'#EF4444'},{l:'Cartões',v:pfC,c:'#8B5CF6'},
    {l:'Invest',v:pfInv,c:'#10B981'},{l:'Sobra',v:Math.max(0,pfBal),c:'#F59E0B'}
  ].filter(s=>s.v>0);

  const projBar=segs.map(s=>`<div class="proj-seg" style="width:${(s.v/total*100).toFixed(1)}%;background:${s.c}">${(s.v/total*100).toFixed(0)}%</div>`).join('');

  // vencendo em breve
  const soon=[...m.pf.bills,...m.pj.bills,...m.cards].filter(b=>{
    if(b.ok||!b.date)return false;
    const d=parseInt(b.date),t=now.getDate();
    return !isNaN(d)&&d-t<=5&&d>=t;
  }).sort((a,b)=>parseInt(a.date)-parseInt(b.date));

  const soonRows=soon.slice(0,4).map(b=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)">
    <div>
      <div style="font-size:13px;font-weight:500">${b.n||b.card}</div>
      <div style="font-size:11px;color:var(--sub)">Vence dia ${b.date}</div>
    </div>
    <div style="font-weight:700;color:var(--orange)">${fmt(b.v)}</div>
  </div>`).join('');

  return `
  <!-- KPIs -->
  <div class="g4">
    <div class="card card-hi">
      <div class="sl">Receita PF</div>
      <div class="sv" style="color:var(--green)">${fmt(pfI)}</div>
      <div class="ss">${m.pf.inc.filter(i=>i.ok).length}/${m.pf.inc.length} recebidas</div>
    </div>
    <div class="card">
      <div class="sl">Gastos PF</div>
      <div class="sv" style="color:var(--red)">${fmt(pfO+pfC)}</div>
      <div class="ss">Contas + Cartões</div>
    </div>
    <div class="card">
      <div class="sl">Investido</div>
      <div class="sv" style="color:var(--purple)">${fmt(pfInv+pjInv)}</div>
      <div class="ss">PF + PJ</div>
    </div>
    <div class="card" style="border-color:var(--b2)">
      <div class="sl">Saldo livre</div>
      <div style="font-family:'Syne',sans-serif;font-size:20px;font-weight:800;letter-spacing:-.6px;font-variant-numeric:tabular-nums;color:${pfBal>=0?'var(--green)':'var(--red)'};line-height:1.1;margin:2px 0 4px">${fmt(pfBal)}</div>
      <div class="ss">${pfBal>=0?'▲ positivo':'▼ negativo'}</div>
    </div>
  </div>

  ${curAcc!=='PF'?`<div class="g4">
    <div class="card"><div class="sl">Faturamento PJ</div><div class="sv" style="color:var(--blue)">${fmt(pjI)}</div></div>
    <div class="card"><div class="sl">Saídas PJ</div><div class="sv" style="color:var(--red)">${fmt(pjO)}</div></div>
    <div class="card"><div class="sl">Investido PJ</div><div class="sv" style="color:var(--purple)">${fmt(pjInv)}</div></div>
    <div class="card"><div class="sl">Saldo PJ</div><div class="sv" style="color:${pjBal>=0?'var(--green)':'var(--red)'}">${fmt(pjBal)}</div></div>
  </div>`:''}

  <!-- PROJEÇÃO DA RENDA -->
  <div class="card">
    <div class="sh"><div class="st">Distribuição da Renda PF</div><div style="font-size:11px;color:var(--sub)">${fmt(pfI)}</div></div>
    <div class="proj-bar">${projBar||'<div style="color:var(--sub);font-size:12px;padding:8px">Lance entradas para ver a distribuição</div>'}</div>
    <div style="display:flex;gap:12px;margin-top:10px;flex-wrap:wrap">
      ${segs.map(s=>`<div style="display:flex;align-items:center;gap:5px;font-size:11px">
        <div style="width:8px;height:8px;border-radius:2px;background:${s.c}"></div>
        <span style="color:var(--sub)">${s.l}</span> <strong>${fmt(s.v)}</strong>

      <div class="st" style="margin-bottom:10px">Receita vs Gastos</div>
      <div class="ch ch-m"><canvas id="cvbar"></canvas></div>

  <!-- PENDENTES + VENCENDO EM BREVE -->
  <div class="g2">
    <div class="card">
      <div class="sh"><div class="st">⏳ Pendente</div><div style="color:var(--orange);font-weight:700">${fmt(totalPending)}</div></div>
      ${pending.slice(0,5).map(b=>`<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:12px">
        <span>${b.n||b.card||'—'}</span><span style="font-weight:700;color:var(--orange)">${fmt(b.v)}</span>
      </div>`).join('')||'<div class="erow">Tudo em dia ✓</div>'}

      <div class="sh"><div class="st">🔔 Vencendo em breve</div></div>
      ${soonRows||'<div class="erow">Nenhum vencimento próximo</div>'}
    </div>
  </div>`;
}

function drawDash(){
  const m=getMD(curM);

function renderInvSaude(histPF,histPJ,total){
  const allTypes={...histPF};
  Object.entries(histPJ).forEach(([k,v])=>allTypes[k]=(allTypes[k]||0)+v);
  const entries=Object.entries(allTypes);
  if(!entries.length)return `<div class="card"><div class="st">📊 Relatório da Carteira</div><div class="erow">Lance aportes para ver o relatório.</div></div>`;
  const bigger=entries.reduce((a,b)=>b[1]>a[1]?b:a,['',0]);
  const concPct=total>0?(bigger[1]/total*100).toFixed(0):0;
  const diversity=entries.length;

  const rows=entries.sort((a,b)=>b[1]-a[1]).map(([t,v])=>{
    const p=total>0?(v/total*100).toFixed(1):0;
    const ok=p<40;
    return `<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">
      <div style="width:7px;height:7px;border-radius:50%;background:${ok?'var(--green)':'var(--orange)'}"></div>
      <div style="flex:1;font-size:13px;font-weight:500">${t}</div>
      <div style="font-weight:700;font-size:13px">${fmt(v)}</div>
      <div style="font-size:11px;color:${ok?'var(--green)':'var(--orange)'};font-weight:700;min-width:36px;text-align:right">${p}%</div>
    </div>`;
  }).join('');

  const alerts=[];
  if(concPct>50)alerts.push({t:'red',m:`⚠️ ${bigger[0]} representa ${concPct}% da carteira — concentração alta`});
  if(diversity<3)alerts.push({t:'yellow',m:`💡 Carteira pouco diversificada (${diversity} tipo${diversity>1?'s':''})`});
  if(diversity>=4&&concPct<40)alerts.push({t:'green',m:`✅ Boa diversificação entre ${diversity} tipos de ativos`});

  return `<div class="card">
    <div class="sh"><div class="st">📊 Relatório da Carteira</div>
      <div style="font-size:11px;color:var(--sub)">${diversity} tipo${diversity>1?'s':''} · ${entries.length} ativos</div>
    </div>
    ${alerts.map(a=>`<div class="al al-${a.t}" style="margin-bottom:8px">${a.m}</div>`).join('')}
    ${rows}
  </div>`;
}

function calcInvScore(){
  const allH={};let totalH=0;
  allKeys().forEach(k=>{
    const md=getMD(k);
    [...md.pf.inv,...md.pj.inv].forEach(i=>{allH[i.t]=(allH[i.t]||0)+i.v;totalH+=i.v;});
  });
  if(!totalH)return 0;
  const types=Object.keys(allH).length;
  const maxConc=totalH>0?Math.max(...Object.values(allH))/totalH*100:100;
  const divScore=Math.min(40,types*10);
  const concScore=Math.min(40,Math.max(0,40-(maxConc-30)));
  const monthlyCnt=allKeys().filter(k=>getMD(k).pf.inv.length>0||getMD(k).pj.inv.length>0).length;
  const consScore=Math.min(20,monthlyCnt*5);
  return Math.round(divScore+concScore+consScore);
}

function pgMetas(){
  const m=getMD(curM);
  const metas=m.metas||[];
  const totalMeta=metas.reduce((s,mt)=>s+mt.alvo,0);
  const totalPoupado=metas.reduce((s,mt)=>s+(mt.poupado||0),0);
  const concluidas=metas.filter(mt=>(mt.poupado||0)>=mt.alvo).length;
  const catOpts=[
    {v:'reserva',l:'Reserva de Emergência',i:'R'},
    {v:'viagem',l:'Viagem',i:'V'},
    {v:'imovel',l:'Imóvel',i:'I'},
    {v:'veiculo',l:'Veículo',i:'A'},
    {v:'investimento',l:'Investimento',i:'$'},
    {v:'educacao',l:'Educação',i:'E'},
    {v:'outro',l:'Outro',i:'G'},
  ];
  const catMap={};catOpts.forEach(c=>catMap[c.v]=c);
  const catOps=catOpts.map(c=>'<option value="'+c.v+'">'+c.l+'</option>').join('');

  const metaRows=metas.length?metas.map(mt=>{
    const poupado=mt.poupado||0;
    const pct=mt.alvo>0?Math.min(100,(poupado/mt.alvo*100)):0;
    const falta=Math.max(0,mt.alvo-poupado);
    const cat=catMap[mt.cat]||{l:'Outro'};
    const concluida=poupado>=mt.alvo;
    const keys=allKeys();
    const avgSaldo=keys.length?keys.slice(0,3).reduce((s,k)=>{
      const md=getMD(k);
      const inc=md.pf.inc.reduce((a,i)=>a+i.v,0);
      const out=md.pf.bills.reduce((a,b)=>a+b.v,0)+md.cards.reduce((a,c)=>a+c.v,0)+md.pf.inv.reduce((a,i)=>a+i.v,0);
      return s+Math.max(0,inc-out);
    },0)/Math.min(3,keys.length):0;
    const mesesR=avgSaldo>0&&!concluida?Math.ceil(falta/avgSaldo):null;
    const prazoStr=mt.prazo?(' · prazo '+mt.prazo):'';
    const colBar=pct>=100?'var(--green)':pct>=50?'var(--gold)':'var(--blue)';
    return '<div class="meta-card'+(concluida?' meta-done':'')+'">'+
      '<div class="meta-header">'+
        '<div>'+
          '<div class="meta-title">'+mt.nome+'</div>'+
          '<div class="meta-sub">'+cat.l+prazoStr+'</div>'+
        '</div>'+
        '<div style="display:flex;align-items:center;gap:8px">'+
          (concluida?'<span class="meta-badge-done">Concluída</span>':'')+
          '<button class="rdl" onclick="delMeta(\''+mt.id+'\')">×</button>'+
        '</div>'+
      '</div>'+
      '<div class="meta-values">'+
        '<div><div class="meta-val-label">Poupado</div><div class="meta-val" style="color:var(--green)">'+fmt(poupado)+'</div></div>'+
        '<div style="text-align:center"><div class="meta-val-label">Meta</div><div class="meta-val">'+fmt(mt.alvo)+'</div></div>'+
        '<div style="text-align:right"><div class="meta-val-label">Falta</div><div class="meta-val" style="color:'+(falta>0?'var(--orange)':'var(--green)')+'">'+fmt(falta)+'</div></div>'+
      '</div>'+
      '<div style="background:rgba(255,255,255,.06);border-radius:4px;height:6px;overflow:hidden;margin:10px 0 6px">'+
        '<div style="height:100%;width:'+pct.toFixed(1)+'%;background:'+colBar+';border-radius:4px;transition:width .8s"></div>'+
      '</div>'+
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">'+
        '<div style="font-size:10px;color:var(--sub)">'+pct.toFixed(0)+'% concluído</div>'+
        (mesesR?'<div style="font-size:10px;color:var(--sub)">~'+mesesR+' '+(mesesR===1?'mês':'meses')+'</div>':
          concluida?'<div style="font-size:10px;color:var(--green)">Meta atingida</div>':
          '<div style="font-size:10px;color:var(--dim)">sem projeção</div>')+
      '</div>'+
      '<div class="meta-aportar">'+
        '<input class="fi" id="ap_'+mt.id+'" type="number" step="0.01" placeholder="Adicionar valor" style="flex:1;font-size:12px;padding:6px 9px">'+
        '<button class="fa" style="background:var(--green);color:#fff;font-size:12px;padding:6px 12px" onclick="aportarMeta(\''+mt.id+'\')">Poupar</button>'+
      '</div>'+
    '</div>';
  }).join(''):
  '<div class="erow" style="padding:32px;text-align:center">'+
    '<div style="font-size:13px;color:var(--sub)">Nenhuma meta criada ainda.</div>'+
    '<div style="font-size:11px;color:var(--dim);margin-top:4px">Defina para onde quer chegar.</div>'+
  '</div>';

  return '<div class="g3">'+
    '<div class="card"><div class="sl">Total das Metas</div><div class="sv" style="color:var(--purple)">'+fmt(totalMeta)+'</div><div class="ss">'+metas.length+' meta'+(metas.length!==1?'s':'')+' criada'+(metas.length!==1?'s':'')+'</div></div>'+
    '<div class="card"><div class="sl">Total Poupado</div><div class="sv" style="color:var(--green)">'+fmt(totalPoupado)+'</div>'+
      '<div class="track" style="margin-top:8px"><div class="fill" style="width:'+(totalMeta>0?(totalPoupado/totalMeta*100).toFixed(1):0)+'%;background:var(--green)"></div></div>'+
    '</div>'+
    '<div class="card"><div class="sl">Concluídas</div><div class="sv" style="color:var(--gold)">'+concluidas+'/'+metas.length+'</div><div class="ss">'+(metas.length-concluidas)+' em andamento</div></div>'+
  '</div>'+
  '<div class="af"><div class="aft">+ Nova Meta</div><div class="fr">'+
    '<input class="fi" id="mt-nome" placeholder="Nome da meta" style="flex:2">'+
    '<input class="fi" id="mt-alvo" type="number" step="0.01" placeholder="Valor alvo">'+
    '<select class="fs" id="mt-cat">'+catOps+'</select>'+
    '<input class="fi" id="mt-prazo" type="month" style="max-width:140px">'+
    '<button class="fa" style="background:var(--purple);color:#fff" onclick="addMeta()">Criar</button>'+
  '</div></div>'+
  '<div style="display:flex;flex-direction:column;gap:10px">'+metaRows+'</div>';
}

function addMeta(){
  const nome=document.getElementById('mt-nome').value.trim();
  const alvo=parseFloat(document.getElementById('mt-alvo').value);

  const prazo=document.getElementById('mt-prazo').value;

function aportarMeta(id){
  const inp=document.getElementById('ap_'+id);
  const v=parseFloat(inp?inp.value:'');
  if(isNaN(v)||v<=0){toast('Informe o valor','var(--red)');return;}
  const m=getMD(curM);

function delMeta(id){

}

   CALENDÁRIO FINANCEIRO
══════════════════════════════════════ */
function pgCalendario(){
  const m=getMD(curM);
  const [ano,mes]=curM.split('-').map(Number);
  const diasNoMes=new Date(ano,mes,0).getDate();
  const primeiroDia=new Date(ano,mes-1,1).getDay(); // 0=dom

  /* Coletar todos os itens com data no mês */
  const eventos=[];
  const addEv=(nome,valor,tipo,pago,dia)=>{
    const d=parseInt(dia);
    if(!isNaN(d)&&d>=1&&d<=31)eventos.push({nome,valor,tipo,pago,dia:d});
  };
  m.pf.bills.forEach(b=>addEv(b.n,b.v,'conta',b.ok,b.date));
  m.pj.bills.forEach(b=>addEv(b.n,b.v,'conta_pj',b.ok,b.date));
  m.cards.forEach(c=>addEv(c.n,c.v,'cartao',c.ok,c.vence));
  m.pf.inc.forEach(i=>addEv(i.n,i.v,'entrada',i.ok,i.date));
  m.pj.inc.forEach(i=>addEv(i.n,i.v,'entrada_pj',i.ok,i.date));
  m.xfer.forEach(x=>addEv(x.n,x.v,'transf',x.ok,x.date));

  /* Cores por tipo */
  const tipoStyle={
    conta:     {bg:'var(--red-dim)',   cor:'var(--red)',   label:'Conta PF'},
    conta_pj:  {bg:'var(--orange)',    cor:'var(--orange)',label:'Conta PJ'},
    cartao:    {bg:'var(--purple-dim)',cor:'var(--purple)',label:'Cartão'},
    entrada:   {bg:'var(--green-dim)', cor:'var(--green)', label:'Entrada PF'},
    entrada_pj:{bg:'var(--blue-dim)',  cor:'var(--blue)',  label:'Entrada PJ'},
    transf:    {bg:'var(--teal-dim)',  cor:'var(--teal)',  label:'PJ→PF'},
  };

  /* Agrupar por dia */
  const porDia={};
  eventos.forEach(ev=>{
    if(!porDia[ev.dia])porDia[ev.dia]=[];
    porDia[ev.dia].push(ev);
  });

  /* Totais do mês */
  const totalVencer=eventos.filter(e=>!e.pago&&['conta','conta_pj','cartao'].includes(e.tipo)).reduce((s,e)=>s+e.valor,0);
  const totalReceber=eventos.filter(e=>!e.pago&&['entrada','entrada_pj'].includes(e.tipo)).reduce((s,e)=>s+e.valor,0);
  const hoje=new Date().getDate();
  const mesAtual=curM===new Date().toISOString().slice(0,7);

  /* Próximos vencimentos */
  const proximos=eventos
    .filter(e=>!e.pago&&['conta','conta_pj','cartao'].includes(e.tipo))
    .sort((a,b)=>a.dia-b.dia)
    .slice(0,5);

  /* Renderizar calendário */
  const diasSemana=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  const cabecalho=diasSemana.map(d=>'<div class="cal-dow">'+d+'</div>').join('');

  let cells='';
  /* Células vazias iniciais */
  for(let i=0;i<primeiroDia;i++)cells+='<div class="cal-cell cal-empty"></div>';

  for(let d=1;d<=diasNoMes;d++){
    const evs=porDia[d]||[];
    const isHoje=mesAtual&&d===hoje;
    const temPendente=evs.some(e=>!e.pago&&['conta','conta_pj','cartao'].includes(e.tipo));
    const temReceber=evs.some(e=>!e.pago&&['entrada','entrada_pj'].includes(e.tipo));
    const tudo_pago=evs.length>0&&evs.every(e=>e.pago);

    const dots=evs.slice(0,3).map(ev=>{
      const st=tipoStyle[ev.tipo]||{cor:'var(--sub)'};
      return '<div class="cal-dot" style="background:'+st.cor+';opacity:'+(ev.pago?0.3:0.9)+'"></div>';
    }).join('');

    const cls=['cal-cell',
      isHoje?'cal-hoje':'',
      temPendente?'cal-vence':'',
      temReceber?'cal-recebe':'',
      evs.length===0?'cal-vazio':'',
    ].filter(Boolean).join(' ');

    cells+='<div class="'+cls+'" onclick="showDia('+d+')">'
      +'<div class="cal-num">'+d+'</div>'
      +(dots?'<div class="cal-dots">'+dots+'</div>':'')
      +'</div>';
  }

  /* Lista de eventos do mês */
  const listaHtml=eventos.length?eventos.sort((a,b)=>a.dia-b.dia).map(ev=>{
    const st=tipoStyle[ev.tipo]||{cor:'var(--sub)',label:'Outro'};
    return '<div class="crow" style="opacity:'+(ev.pago?0.45:1)+'">'
      +'<div style="width:3px;height:28px;border-radius:2px;background:'+st.cor+';flex-shrink:0"></div>'
      +'<div style="width:22px;text-align:center;font-size:11px;font-weight:700;color:var(--sub);flex-shrink:0">'+ev.dia+'</div>'
      +'<span class="rn">'+ev.nome+'</span>'
      +'<span class="rb" style="background:'+st.bg+';color:'+st.cor+'">'+st.label+'</span>'
      +(ev.pago?'<span style="font-size:10px;color:var(--green)">✓</span>':'')
      +'<span class="rv">'+fmt(ev.valor)+'</span>'
      +'</div>';
  }).join(''):'<div class="erow">Nenhum item com data lançada.</div>';

  return '<div class="g3">'
    +'<div class="card"><div class="sl">A Vencer</div><div class="sv" style="color:var(--red)">'+fmt(totalVencer)+'</div><div class="ss">contas pendentes</div></div>'
    +'<div class="card"><div class="sl">A Receber</div><div class="sv" style="color:var(--green)">'+fmt(totalReceber)+'</div><div class="ss">entradas pendentes</div></div>'
    +'<div class="card"><div class="sl">Eventos no Mês</div><div class="sv" style="color:var(--text)">'+eventos.length+'</div><div class="ss">com data registrada</div></div>'
    +'</div>'
    +'<div class="card">'
      +'<div class="sh" style="margin-bottom:12px"><div class="st">'+new Date(ano,mes-1).toLocaleDateString("pt-BR",{month:"long",year:"numeric"}).replace(/^\w/,c=>c.toUpperCase())+'</div>'
      +'<div style="display:flex;gap:10px;font-size:10px;color:var(--sub);align-items:center">'
        +'<span style="display:flex;align-items:center;gap:4px"><span style="width:6px;height:6px;border-radius:50%;background:var(--red);display:inline-block"></span>Conta</span>'
        +'<span style="display:flex;align-items:center;gap:4px"><span style="width:6px;height:6px;border-radius:50%;background:var(--green);display:inline-block"></span>Entrada</span>'
        +'<span style="display:flex;align-items:center;gap:4px"><span style="width:6px;height:6px;border-radius:50%;background:var(--purple);display:inline-block"></span>Cartão</span>'
      +'</div></div>'
      +'<div class="cal-grid-dow">'+cabecalho+'</div>'
      +'<div class="cal-grid">'+cells+'</div>'
    +'</div>'
    +(proximos.length?'<div class="card"><div class="st" style="margin-bottom:10px">Próximos Vencimentos</div>'
      +proximos.map(ev=>{
        const st=tipoStyle[ev.tipo]||{};
        const diasRestantes=ev.dia-hoje;
        const urgente=mesAtual&&diasRestantes>=0&&diasRestantes<=3;
        return '<div class="crow">'
          +'<div style="width:3px;height:28px;border-radius:2px;background:'+(urgente?'var(--red)':st.cor||'var(--sub)')+';flex-shrink:0"></div>'
          +'<div style="width:22px;text-align:center;font-size:11px;font-weight:700;color:'+(urgente?'var(--red)':'var(--sub)')+';flex-shrink:0">'+ev.dia+'</div>'
          +'<span class="rn">'+ev.nome+'</span>'
          +(urgente&&mesAtual?'<span class="rb" style="background:var(--red-dim);color:var(--red)">Urgente</span>':'')
          +'<span class="rv">'+fmt(ev.valor)+'</span>'
          +'</div>';
      }).join('')
    +'</div>':'')
    +'<div class="cblock"><div class="cbh"><div class="cbhtl">Todos os Eventos</div></div>'+listaHtml+'</div>';
}

/* ══════════════════════════════════
   SAÚDE FINANCEIRA
══════════════════════════════════ */
function calcScore(k){
  const m=getMD(k);
  const inc=m.pf.inc.reduce((s,i)=>s+i.v,0);
  if(!inc)return 0;
  const out=m.pf.bills.reduce((s,b)=>s+b.v,0)+m.cards.reduce((s,c)=>s+c.v,0);
  const inv=m.pf.inv.reduce((s,i)=>s+i.v,0)+m.pj.inv.reduce((s,i)=>s+i.v,0);
  const savR=(inc-out)/inc*100;
  const invR=inv/inc*100;
  const paidR=m.pf.bills.length?m.pf.bills.filter(b=>b.ok).length/m.pf.bills.length*100:100;
  return Math.round(Math.min(100,Math.max(0,Math.min(40,savR)+Math.min(30,invR*2)+paidR*.3)));
}

function pgSaude(){
  const score=calcScore(curM);
  const iScore=calcInvScore();
  const col=score>=70?'var(--green)':score>=40?'var(--gold)':'var(--red)';
  const iCol=iScore>=70?'var(--green)':iScore>=40?'var(--gold)':'var(--red)';
  const lbl=score>=70?'Ótima 🟢':score>=40?'Regular 🟡':'Atenção 🔴';
  const m=getMD(curM);
  const inc=m.pf.inc.reduce((s,i)=>s+i.v,0);
  const out=m.pf.bills.reduce((s,b)=>s+b.v,0);
  const cards=m.cards.reduce((s,c)=>s+c.v,0);
  const inv=m.pf.inv.reduce((s,i)=>s+i.v,0)+m.pj.inv.reduce((s,i)=>s+i.v,0);
  const pjI=m.pj.inc.reduce((s,i)=>s+i.v,0);
  const pjO=m.pj.bills.reduce((s,b)=>s+b.v,0);
  const xfer=m.xfer.reduce((s,x)=>s+x.v,0);
  const totalOut=out+cards;
  const savR=inc>0?((inc-totalOut)/inc*100).toFixed(1):0;
  const invR=inc>0?(inv/inc*100).toFixed(1):0;
  const cardR=inc>0?(cards/inc*100).toFixed(1):0;
  const paidR=m.pf.bills.length?(m.pf.bills.filter(b=>b.ok).length/m.pf.bills.length*100).toFixed(0):100;

  // Projeção 3 meses
  const keys=allKeys();
  const avgInc=keys.length?keys.slice(0,3).reduce((s,k)=>s+getMD(k).pf.inc.reduce((a,i)=>a+i.v,0),0)/Math.min(3,keys.length):0;
  const avgOut=keys.length?keys.slice(0,3).reduce((s,k)=>s+getMD(k).pf.bills.reduce((a,b)=>a+b.v,0)+getMD(k).cards.reduce((a,c)=>a+c.v,0),0)/Math.min(3,keys.length):0;
  const avgInv=keys.length?keys.slice(0,3).reduce((s,k)=>s+getMD(k).pf.inv.reduce((a,i)=>a+i.v,0)+getMD(k).pj.inv.reduce((a,i)=>a+i.v,0),0)/Math.min(3,keys.length):0;
  const proj3=((avgInc-avgOut-avgInv)*3).toFixed(0);

  const alerts=[];
  if(+cardR>30)alerts.push({t:'red',m:`⚠️ Cartões = ${cardR}% da renda (ideal <30%)`});
  if(+savR<10)alerts.push({t:'red',m:`⚠️ Taxa de economia baixa: ${savR}% (meta: >20%)`});
  if(+savR>=20)alerts.push({t:'green',m:`✅ Economia saudável: ${savR}% da renda`});
  if(+invR<5)alerts.push({t:'yellow',m:`💡 Invista mais: apenas ${invR}% da renda investida`});
  if(+invR>=10)alerts.push({t:'green',m:`✅ Bom ritmo de investimento: ${invR}% da renda`});
  if(pjI>0&&pjI-pjO-xfer<0)alerts.push({t:'red',m:`⚠️ Caixa PJ negativo — revise saídas`});
  if(+proj3>0)alerts.push({t:'blue',m:`📈 Projeção 3 meses: acumular +${fmt(+proj3)} (média atual)`});

  const metrics=[
    {l:'Taxa de Economia',v:`${savR}%`,ok:+savR>=20,tip:'Meta: >20% da renda'},
    {l:'Taxa de Investimento',v:`${invR}%`,ok:+invR>=10,tip:'Meta: >10% da renda'},
    {l:'Peso dos Cartões',v:`${cardR}%`,ok:+cardR<=30,tip:'Ideal: <30% da renda'},
    {l:'Contas em Dia',v:`${paidR}%`,ok:+paidR>=80,tip:'Meta: 100%'},
    {l:'Saldo PF',v:fmt(inc-totalOut-inv),ok:(inc-totalOut-inv)>=0,tip:'Renda − Tudo'},
    {l:'Caixa PJ',v:fmt(pjI-pjO-xfer),ok:(pjI-pjO-xfer)>=0,tip:'PJ após custos e repasses'},
    {l:'Score Investimentos',v:`${iScore}/100`,ok:iScore>=60,tip:'Diversificação e constância'},
  ];

  return `${alerts.map(a=>`<div class="al al-${a.t}">${a.m}</div>`).join('')}
  <div class="g2">
    <div class="card" style="display:flex;align-items:center;gap:18px">
      <div style="position:relative;width:90px;height:90px;flex-shrink:0">
        <canvas id="cvscore" width="90" height="90"></canvas>
        <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column">
          <div style="font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:${col}">${score}</div>
          <div style="font-size:9px;color:var(--sub);letter-spacing:1px">SCORE</div>
        </div>
      </div>
      <div>
        <div class="sl">Saúde Financeira</div>
        <div style="font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:${col}">${lbl}</div>
        <div class="ss">Score investimentos: <strong style="color:${iCol}">${iScore}/100</strong></div>
      </div>
    </div>
    <div class="card"><div class="st" style="margin-bottom:9px">Evolução do Score</div><div class="ch ch-s"><canvas id="cvsl"></canvas></div></div>
  </div>
  <div style="display:flex;flex-direction:column;gap:7px">${metrics.map(it=>`
    <div class="mr">
      <div class="md" style="background:${it.ok?'var(--green)':'var(--red)'}"></div>
      <div class="mi"><div class="mt">${it.l}</div><div class="ms">${it.tip}</div></div>
      <div class="mv" style="color:${it.ok?'var(--green)':'var(--orange)'}">${it.v}</div>
    </div>`).join('')}
  </div>
  <div class="g2">
    <div class="card"><div class="st" style="margin-bottom:9px">Onde vai o dinheiro</div><div class="ch ch-m"><canvas id="cvdist"></canvas></div></div>
    <div class="card"><div class="st" style="margin-bottom:9px">Patrimônio acumulado</div><div class="ch ch-m"><canvas id="cvia"></canvas></div></div>
  </div>`;
}

function drawSaude(){
  const score=calcScore(curM);
  const col=score>=70?'#1A9E6E':score>=40?'#C68A14':'#C94040';
  NC.ring('cvscore',score,col);
  const keys=allKeys().slice(0,6).reverse();
  const sLabels=keys.map(k=>{const[y,mo]=k.split('-');return new Date(+y,+mo-1).toLocaleDateString('pt-BR',{month:'short'})});
  NC.line('cvsl',sLabels,[{label:'Score',data:keys.map(k=>calcScore(k)),color:'#C68A14'}]);
  const m=getMD(curM);
  const inc=m.pf.inc.reduce((s,i)=>s+i.v,0);
  const out=m.pf.bills.reduce((s,b)=>s+b.v,0);
  const c=m.cards.reduce((s,c)=>s+c.v,0);
  const inv=m.pf.inv.reduce((s,i)=>s+i.v,0);
  const sob=Math.max(0,inc-out-c-inv);
  if(inc>0)NC.donut('cvdist',
    ['Contas','Cartões','Invest','Sobra'],
    [out,c,inv,sob],
    {colors:['#C94040','#6D3AC7','#1A9E6E','#C68A14']}
  );
  const allInv={};
  allKeys().forEach(k=>{getMD(k).pf.inv.forEach(i=>allInv[i.t]=(allInv[i.t]||0)+i.v);getMD(k).pj.inv.forEach(i=>allInv[i.t]=(allInv[i.t]||0)+i.v);});
  const entries=Object.entries(allInv);
  const colors=['#6D3AC7','#C68A14','#1A9E6E','#C94040','#3B7DE8','#DB2777','#0B85A0','#65A30D'];
  if(entries.length)NC.barH('cvia',entries.map(([k])=>k),entries.map(([,v])=>v),{colors});
}

/* ══════════════════════════════════
   HISTÓRICO
══════════════════════════════════ */
function pgHist(){
  const keys=allKeys();
  const rows=keys.map(k=>{
    const m=getMD(k);
    const pfI=m.pf.inc.reduce((s,i)=>s+i.v,0);
    const pfO=m.pf.bills.reduce((s,b)=>s+b.v,0)+m.cards.reduce((s,c)=>s+c.v,0);
    const pfInv=m.pf.inv.reduce((s,i)=>s+i.v,0)+m.pj.inv.reduce((s,i)=>s+i.v,0);
    const pjI=m.pj.inc.reduce((s,i)=>s+i.v,0);
    const pjO=m.pj.bills.reduce((s,b)=>s+b.v,0);
    const xfer=m.xfer.reduce((s,x)=>s+x.v,0);
    const pfBal=pfI-pfO-pfInv,pjBal=pjI-pjO-xfer,sc=calcScore(k);
    return `<tr>
      <td style="font-weight:600;white-space:nowrap">${mLabel(k)}</td>
      <td style="color:var(--green)">${fmt(pfI)}</td>
      <td style="color:var(--red)">${fmt(pfO)}</td>
      <td style="color:var(--purple)">${fmt(pfInv)}</td>
      <td style="color:var(--blue)">${fmt(pjI)}</td>
      <td style="color:${pjBal>=0?'var(--green)':'var(--red)'}">${fmt(pjBal)}</td>
      <td style="color:${pfBal>=0?'var(--green)':'var(--red)'};font-weight:700">${fmt(pfBal)}</td>
      <td><span style="font-weight:800;color:${sc>=70?'var(--green)':sc>=40?'var(--gold)':'var(--red)'}">${sc}</span></td>
      <td><button onclick="jumpTo('${k}')" style="background:none;border:1px solid var(--border);color:var(--sub);border-radius:6px;padding:2px 8px;font-size:11px;cursor:pointer">Ver</button></td>
    </tr>`;
  }).join('');
  return `<div class="card" style="overflow-x:auto">
    <div class="st" style="margin-bottom:12px">Resumo Mensal</div>
    <table class="htbl">
      <thead><tr><th>Mês</th><th>Ent.PF</th><th>Gastos</th><th>Invest</th><th>Fat.PJ</th><th>Saldo PJ</th><th>Saldo PF</th><th>Score</th><th></th></tr></thead>
      <tbody>${rows||'<tr><td colspan="9" style="color:var(--sub);padding-top:12px">Nenhum dado ainda.</td></tr>'}</tbody>
    </table>
  </div>
  <div class="card"><div class="st" style="margin-bottom:10px">Evolução dos Saldos</div><div class="ch ch-l"><canvas id="cvhist"></canvas></div></div>`;
}
function drawHist(){
  const keys=allKeys().slice(0,12).reverse();
  const el=document.getElementById('cvhist');if(!el)return;
  const labels=keys.map(k=>{const[y,mo]=k.split('-');return new Date(+y,+mo-1).toLocaleDateString('pt-BR',{month:'short',year:'2-digit'})});
  const pfBals=keys.map(k=>{const m=getMD(k);return m.pf.inc.reduce((s,i)=>s+i.v,0)-m.pf.bills.reduce((s,b)=>s+b.v,0)-m.cards.reduce((s,c)=>s+c.v,0)-m.pf.inv.reduce((s,i)=>s+i.v,0);});
  const pjBals=keys.map(k=>{const m=getMD(k);return m.pj.inc.reduce((s,i)=>s+i.v,0)-m.pj.bills.reduce((s,b)=>s+b.v,0)-m.xfer.reduce((s,x)=>s+x.v,0);});
  NC.line('cvhist',labels,[
    {label:'Saldo PF',data:pfBals,color:'#C68A14'},
    {label:'Saldo PJ',data:pjBals,color:'#3B7DE8'},
  ]);
}
function jumpTo(k){curM=k;document.getElementById('msel').value=k;curTab='dash';
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  document.querySelector('.tab[data-t="dash"]').classList.add('on');render();}

/* ══════════════════════════════════
   CONFIG
══════════════════════════════════ */
function pgCfg(){
  return `<div class="card">
    <div class="st" style="margin-bottom:12px">🔒 Alterar Senha</div>
    <div style="display:flex;flex-direction:column;gap:9px;max-width:280px">
      <div><div class="lbl">Atual</div><input class="fi" id="so" type="password" style="width:100%"></div>
      <div><div class="lbl">Nova</div><input class="fi" id="sn" type="password" style="width:100%"></div>
      <div><div class="lbl">Confirmar</div><input class="fi" id="sc" type="password" style="width:100%"></div>
      <div id="pmsg" style="font-size:12px;display:none;margin-top:2px"></div>
      <button class="fa" style="background:var(--gold);color:#000;align-self:flex-start" onclick="chPass()">Salvar</button>
    </div>
  </div>
  <div class="card">
    <div class="st" style="margin-bottom:5px">📦 Backup</div>
    <div class="ss" style="margin-bottom:12px">Exporte mensalmente. Para sincronizar: exporte em um dispositivo e importe no outro.</div>
    <div style="display:flex;gap:7px;flex-wrap:wrap">
      <button class="fa" style="background:var(--s2);border:1px solid var(--border);color:var(--text)" onclick="expData()">⬇ Exportar JSON</button>
      <button class="fa" style="background:var(--s2);border:1px solid var(--border);color:var(--text)" onclick="document.getElementById('fimp').click()">⬆ Importar JSON</button>
      <input type="file" id="fimp" accept=".json" style="display:none" onchange="impData(this)">
      <button class="fa" style="background:var(--red2);border:1px solid rgba(239,68,68,.2);color:var(--red)" onclick="clrAll()">🗑 Apagar Tudo</button>
    </div>
  </div>
  <div class="card" style="font-size:12px;color:var(--sub);line-height:1.9">
    <div style="font-weight:700;color:var(--text);margin-bottom:6px">💡 O que posso ainda incluir:</div>
    🎯 Metas financeiras (ex: "juntar R$10k até dezembro")<br>
    📤 Exportar relatório em PDF<br>
    🔔 Lembretes de vencimento via notificação<br>
    📊 Comparativo entre meses lado a lado<br>
    💱 Simulador de independência financeira<br>
    🏦 Integração com Open Finance (futuramente)
  </div>`;
}
function chPass(){
  const o=document.getElementById('so').value,n=document.getElementById('sn').value,c=document.getElementById('sc').value;
  const msg=document.getElementById('pmsg');msg.style.display='block';
  if(o!==getPass()){msg.style.color='var(--red)';msg.textContent='Senha incorreta.';return;}
  if(n.length<3){msg.style.color='var(--red)';msg.textContent='Mínimo 3 caracteres.';return;}
  if(n!==c){msg.style.color='var(--red)';msg.textContent='Senhas não coincidem.';return;}
  localStorage.setItem('nmm_pass',n);msg.style.color='var(--green)';msg.textContent='Senha alterada.';
}
function expData(){
  const b=new Blob([JSON.stringify(load(),null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);
  a.download=`naomemath_${new Date().toISOString().slice(0,10)}.json`;a.click();toast('Backup exportado');
}
function impData(inp){
  const f=inp.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=e=>{try{save(JSON.parse(e.target.result));bSel();render();toast('Dados importados');}catch{toast('Arquivo inválido','var(--red)');}};
  r.readAsText(f);
}
function clrAll(){
  if(!confirm('Apagar TODOS os dados permanentemente?'))return;
  if(!confirm('Última confirmação.'))return;
  localStorage.removeItem('nmm_data');localStorage.removeItem('nmm_pass');location.reload();
}
</script>
</body>

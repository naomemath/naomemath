<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>naomemath · finanças</title>
<script>(function(){var t=localStorage.getItem('nmm_theme');if(t==='light')document.documentElement.setAttribute('data-theme','light');})()</script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#09090f;--s1:#0f0f1a;--s2:#131320;--s3:#17172a;--s4:#1c1c2e;
  --b1:rgba(255,255,255,.06);--b2:rgba(255,255,255,.10);--b3:rgba(255,255,255,.16);
  --gold:#C68A14;--gold-dim:rgba(198,138,20,.10);--gold-soft:rgba(198,138,20,.05);--gold2:rgba(198,138,20,.15);
  --green:#1A9E6E;--green-dim:rgba(26,158,110,.10);--green-soft:rgba(26,158,110,.05);--green2:rgba(26,158,110,.15);
  --red:#C94040;--red-dim:rgba(201,64,64,.10);--red-soft:rgba(201,64,64,.05);--red2:rgba(201,64,64,.15);
  --blue:#3B7DE8;--blue-dim:rgba(59,125,232,.10);--blue2:rgba(59,125,232,.15);
  --purple:#6D3AC7;--purple-dim:rgba(109,58,199,.10);--purple2:rgba(109,58,199,.15);
  --teal:#0B85A0;--teal-dim:rgba(11,133,160,.10);--teal2:rgba(11,133,160,.15);
  --orange:#EA580C;--pink:#DB2777;
  --text:#e8e8f0;--sub:#72728a;--dim:#38384e;--muted:#2a2a3e;
  --fs-2xs:10px;--fs-xs:11px;--fs-sm:12px;--fs-base:13px;--fs-md:14px;
  --fs-lg:16px;--fs-xl:20px;--fs-2xl:26px;
  --sp-1:4px;--sp-2:8px;--sp-3:12px;--sp-4:16px;--sp-5:20px;--sp-6:24px;
  --r-xs:6px;--r-sm:8px;--r:12px;--r-lg:16px;--r-xl:20px;--r-full:999px;
  --sh-xs:0 1px 2px rgba(0,0,0,.18);
  --sh-sm:0 1px 3px rgba(0,0,0,.2);
  --sh:0 2px 10px rgba(0,0,0,.25),0 1px 2px rgba(0,0,0,.15);
  --sh-md:0 4px 16px rgba(0,0,0,.28),0 1px 4px rgba(0,0,0,.15);
  --sh-lg:0 8px 32px rgba(0,0,0,.32);
  --ease:cubic-bezier(.4,0,.2,1);--ease-out:cubic-bezier(0,.6,.4,1);
  --spring:cubic-bezier(.34,1.4,.64,1);
  --dur-fast:100ms;--dur:180ms;--dur-slow:320ms;
  --glass:rgba(9,9,15,.88);--glass-border:rgba(255,255,255,.07);
  --shadow:var(--sh-sm);--shadow-md:var(--sh-md);--shadow-sm:var(--sh-xs);--shadow-lg:var(--sh-lg);
}
[data-theme="light"]{
  --bg:#f5f5f7;--s1:#ffffff;--s2:#f0f0f5;--s3:#e8e8f0;--s4:#e0e0eb;
  --b1:rgba(0,0,0,.08);--b2:rgba(0,0,0,.13);--b3:rgba(0,0,0,.20);
  --gold:#B07D10;--gold-dim:rgba(176,125,16,.10);--gold-soft:rgba(176,125,16,.05);--gold2:rgba(176,125,16,.15);
  --green:#0A7A52;--green-dim:rgba(10,122,82,.10);--green-soft:rgba(10,122,82,.05);--green2:rgba(10,122,82,.15);
  --red:#B02020;--red-dim:rgba(176,32,32,.09);--red-soft:rgba(176,32,32,.04);--red2:rgba(176,32,32,.12);
  --blue:#1D4ED8;--blue-dim:rgba(29,78,216,.09);--blue2:rgba(29,78,216,.12);
  --purple:#5B21B6;--purple-dim:rgba(91,33,182,.09);--purple2:rgba(91,33,182,.12);
  --teal:#0369A1;--teal-dim:rgba(3,105,161,.09);--teal2:rgba(3,105,161,.12);
  --text:#111118;--sub:#6b6b7a;--dim:#c0c0cc;--muted:#e0e0eb;
  --sh-xs:0 1px 2px rgba(0,0,0,.06);
  --sh-sm:0 1px 4px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
  --sh:0 2px 8px rgba(0,0,0,.10),0 1px 2px rgba(0,0,0,.06);
  --sh-md:0 4px 16px rgba(0,0,0,.10),0 1px 4px rgba(0,0,0,.06);
  --sh-lg:0 8px 32px rgba(0,0,0,.12);
  --glass:rgba(255,255,255,.90);--glass-border:rgba(0,0,0,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow:hidden;font-size:13px;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--s4);border-radius:99px}
button,input,select,textarea{font-family:inherit;font-size:inherit}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}

/* LOGIN */
#login{position:fixed;inset:0;z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;
  background:radial-gradient(ellipse 60% 30% at 50% -20%,rgba(198,138,20,.06),transparent 55%),var(--bg)}
.brand{text-align:center}
.brand h1{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;letter-spacing:-1.5px;line-height:1}
.brand h1 em{color:var(--gold);font-style:normal}
.brand p{font-size:10px;color:var(--sub);letter-spacing:3px;text-transform:uppercase;margin-top:8px;opacity:.7}
.lbox{background:var(--s1);border:1px solid var(--b2);border-radius:var(--r-xl);padding:28px;width:296px;max-width:90vw;display:flex;flex-direction:column;gap:14px;box-shadow:var(--sh-md)}
.lbl{display:block;font-size:10px;color:var(--sub);font-weight:600;letter-spacing:.8px;text-transform:uppercase;margin-bottom:4px}
.inp{width:100%;background:var(--s2);border:1px solid var(--b2);border-radius:var(--r-sm);padding:10px 12px;color:var(--text);font-size:14px;outline:none;transition:border-color var(--dur) var(--ease)}
.inp:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(198,138,20,.08)}
.inp::placeholder{color:var(--dim)}
.btn-g{width:100%;background:var(--gold);color:#000;border:none;border-radius:var(--r-sm);padding:11px;font-size:13px;font-weight:700;cursor:pointer;margin-top:2px;transition:opacity var(--dur) var(--ease)}
.btn-g:hover{opacity:.85}
.btn-g:active{opacity:.7;transform:scale(.99)}
.lerr{color:var(--red);font-size:11px;text-align:center;display:none}
.lhint{font-size:11px;color:var(--sub);text-align:center;line-height:1.7}

/* SHELL */
#app{display:none;height:100vh;flex-direction:column}

/* TOPBAR */
.top{display:flex;align-items:center;gap:8px;padding:0 16px;height:44px;border-bottom:1px solid var(--b1);
  background:rgba(9,9,15,.92);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);
  flex-shrink:0;position:sticky;top:0;z-index:200}
[data-theme="light"] .top{background:rgba(255,255,255,.92)}
.tlogo{font-family:'Syne',sans-serif;font-size:14px;font-weight:800;letter-spacing:-.3px;color:var(--text);flex-shrink:0}
.tlogo em{color:var(--gold);font-style:normal}
.sp{flex:1;min-width:0}
.msel{background:var(--s2);border:1px solid var(--b1);color:var(--text);border-radius:var(--r-sm);padding:4px 8px;font-size:11px;outline:none;cursor:pointer;max-width:130px;flex-shrink:0}
.tbtn{border:none;border-radius:var(--r-sm);padding:5px 11px;font-size:11px;font-weight:600;cursor:pointer;flex-shrink:0;transition:opacity var(--dur-fast) var(--ease);letter-spacing:.1px;white-space:nowrap}
.tbtn:hover{opacity:.8}
.pill{border-radius:var(--r-full);padding:3px 9px;font-size:10px;font-weight:600;white-space:nowrap;flex-shrink:0;font-variant-numeric:tabular-nums;letter-spacing:-.2px;border:1px solid}

/* TABS — simplificadas: só 6 abas principais */
.tabs-wrap{position:relative;flex-shrink:0;background:var(--s1);border-bottom:1px solid var(--b1)}
.tabs-wrap::before,.tabs-wrap::after{content:'';position:absolute;top:0;bottom:0;width:20px;z-index:10;pointer-events:none}
.tabs-wrap::before{left:0;background:linear-gradient(90deg,var(--s1),transparent)}
.tabs-wrap::after{right:0;background:linear-gradient(-90deg,var(--s1),transparent)}
.tabs{display:flex;gap:1px;padding:0 16px;overflow-x:auto;background:transparent;height:38px;align-items:center}
.tabs::-webkit-scrollbar{display:none}
.tab{background:transparent;border:none;color:var(--sub);border-radius:var(--r-sm);padding:5px 12px;font-size:11px;font-weight:500;cursor:pointer;white-space:nowrap;transition:color var(--dur-fast) var(--ease),background var(--dur-fast) var(--ease);height:30px;display:flex;align-items:center;gap:5px;position:relative;flex-shrink:0}
.tab:hover{color:var(--text);background:var(--s2)}
.tab.on{color:var(--text);font-weight:700}
.tab.on::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:2px;background:var(--gold);border-radius:2px 2px 0 0}
.tab-badge{background:var(--red);color:#fff;border-radius:var(--r-full);font-size:9px;padding:1px 4px;font-weight:700}

/* SCROLL & PAGE */
.scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.page{padding:14px 16px;max-width:960px;margin:0 auto;display:flex;flex-direction:column;gap:10px}

/* GRID */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}

/* CARD */
.card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);padding:14px 16px;transition:border-color var(--dur) var(--ease)}
.card:hover{border-color:var(--b2)}
.card-hi{border-color:var(--b2)}
[data-theme="light"] .card{box-shadow:var(--sh-sm)}

/* KPI */
.sl{font-size:10px;color:var(--sub);font-weight:500;letter-spacing:.5px;text-transform:uppercase;margin-bottom:4px;opacity:.9}
.sv{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;line-height:1.15;font-variant-numeric:tabular-nums;letter-spacing:-.4px}
.sv-lg{font-size:22px}
.ss{font-size:10px;color:var(--sub);margin-top:4px;opacity:.8}
.st{font-weight:600;font-size:13px;color:var(--text);letter-spacing:-.1px}
.sh{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}

/* TRACK */
.track{background:var(--s3);border-radius:var(--r-full);height:2px;overflow:hidden;margin-top:8px}
.fill{height:100%;border-radius:var(--r-full);transition:width .8s var(--ease-out)}

/* CBLOCK */
.cblock{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);overflow:hidden;transition:border-color var(--dur) var(--ease)}
.cblock:hover{border-color:var(--b2)}
[data-theme="light"] .cblock{box-shadow:var(--sh-sm)}
.cbh{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;border-bottom:1px solid var(--b1);background:var(--s2)}
.cbhtl{font-weight:600;font-size:13px;display:flex;align-items:center;gap:6px;color:var(--text)}
.cbct{font-size:10px;color:var(--sub);background:var(--s3);border-radius:var(--r-full);padding:1px 7px;font-weight:600;letter-spacing:.3px}
.cbv{font-weight:700;font-size:13px;font-variant-numeric:tabular-nums}

/* ROW */
.crow{display:flex;align-items:center;gap:8px;padding:8px 14px;border-bottom:1px solid var(--b1);transition:background var(--dur-fast) var(--ease);cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none;min-height:40px}
.crow:last-child{border-bottom:none}
.crow:hover{background:var(--s2)}
.crow:active{background:var(--s3)}
.crow.done{opacity:.4}
.crow.done .rn{text-decoration:line-through}

/* CHECK */
.chk{width:18px;height:18px;min-width:18px;border-radius:50%;border:1.5px solid var(--b3);display:flex;align-items:center;justify-content:center;transition:all var(--dur) var(--ease);flex-shrink:0;background:transparent;cursor:pointer;will-change:background,border-color}
.chk.ok{border-color:currentColor;background:currentColor;animation:checkPop var(--dur) var(--spring) both}
@keyframes checkPop{0%{transform:scale(.8)}60%{transform:scale(1.15)}100%{transform:scale(1)}}
.chk svg{width:9px;height:9px;stroke:#000;stroke-width:2.5;fill:none;display:none;stroke-linecap:round;stroke-linejoin:round}
.chk.ok svg{display:block}

/* ROW ELEMENTS */
.rn{flex:1;font-size:13px;font-weight:400;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rb{font-size:10px;padding:2px 6px;border-radius:var(--r-xs);font-weight:600;white-space:nowrap;flex-shrink:0;letter-spacing:.2px}
.rd{font-size:11px;color:var(--sub);white-space:nowrap;flex-shrink:0}
.rv{font-weight:600;font-size:13px;white-space:nowrap;min-width:68px;text-align:right;flex-shrink:0;font-variant-numeric:tabular-nums;letter-spacing:-.3px}
.rdl{background:none;border:none;color:var(--dim);cursor:pointer;font-size:14px;padding:0 2px;line-height:1;transition:color var(--dur-fast) var(--ease);flex-shrink:0}
.rdl:hover{color:var(--red)}
.redit{background:none;border:none;color:var(--dim);cursor:pointer;font-size:11px;padding:0 2px;line-height:1;transition:color var(--dur-fast) var(--ease);flex-shrink:0}
.redit:hover{color:var(--text)}
.erow{padding:20px 14px;color:var(--dim);font-size:11px;text-align:center;opacity:.6}

/* EDIT PANEL */
.edit-panel{background:var(--s2);border-bottom:1px solid var(--b1);padding:10px 14px;display:flex;flex-direction:column;gap:8px;animation:slideDown 120ms var(--ease-out)}
@keyframes slideDown{from{opacity:0;transform:translateY(-3px)}to{opacity:1;transform:translateY(0)}}
.edit-row{display:flex;gap:6px;flex-wrap:wrap;align-items:flex-end}
.edit-lbl{font-size:10px;color:var(--sub);font-weight:600;letter-spacing:.5px;text-transform:uppercase;margin-bottom:2px;display:block}
.edit-inp{background:var(--s1);border:1px solid var(--b2);border-radius:var(--r-xs);padding:6px 9px;color:var(--text);font-size:12px;outline:none;transition:border-color var(--dur) var(--ease);min-width:70px}
.edit-inp:focus{border-color:var(--gold)}
.edit-sel{background:var(--s1);border:1px solid var(--b2);color:var(--text);border-radius:var(--r-xs);padding:6px 9px;font-size:12px;outline:none;cursor:pointer}
.edit-save{background:var(--green);color:#fff;border:none;border-radius:var(--r-xs);padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer}
.edit-cancel{background:var(--s3);color:var(--sub);border:none;border-radius:var(--r-xs);padding:6px 10px;font-size:12px;cursor:pointer}

/* FORM */
.af{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);padding:11px 14px}
[data-theme="light"] .af{box-shadow:var(--sh-sm)}
.aft{font-weight:600;font-size:10px;color:var(--sub);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
.fr{display:flex;gap:6px;flex-wrap:wrap;align-items:flex-end}
.fi{flex:1;min-width:80px;background:var(--s2);border:1px solid var(--b1);border-radius:var(--r-xs);padding:7px 10px;color:var(--text);font-size:13px;outline:none;transition:border-color var(--dur) var(--ease)}
.fi:focus{border-color:var(--gold)}
.fi::placeholder{color:var(--dim)}
.fs{background:var(--s2);border:1px solid var(--b1);color:var(--text);border-radius:var(--r-xs);padding:7px 10px;font-size:13px;outline:none;cursor:pointer;flex-shrink:0}
.fa{border:none;border-radius:var(--r-xs);padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:opacity var(--dur-fast) var(--ease)}
.fa:hover{opacity:.82}
.fa:active{opacity:.65;transform:scale(.98)}

/* CHARTS */
.ch{position:relative}
.ch-s{height:160px}.ch-m{height:210px}.ch-l{height:250px}

/* ALERTS */
.al{border-radius:var(--r-sm);padding:9px 12px;font-size:12px;font-weight:500;display:flex;align-items:flex-start;gap:8px;border:1px solid;line-height:1.5}
.al-r{background:var(--red-soft);border-color:var(--red-dim);color:var(--red)}
.al-y{background:var(--gold-soft);border-color:var(--gold-dim);color:var(--gold)}
.al-g{background:var(--green-soft);border-color:var(--green-dim);color:var(--green)}
.al-b{background:var(--blue-dim);border-color:rgba(59,125,232,.2);color:var(--blue)}

/* METRIC ROW */
.mr{display:flex;align-items:center;gap:12px;padding:11px 14px;background:var(--s1);border:1px solid var(--b1);border-radius:var(--r-sm)}
.md{width:6px;height:6px;min-width:6px;border-radius:50%}
.mi{flex:1;min-width:0}
.mt{font-weight:500;font-size:13px;color:var(--text)}
.ms{font-size:11px;color:var(--sub);margin-top:1px}
.mv{font-weight:700;font-size:13px;white-space:nowrap;font-variant-numeric:tabular-nums}

/* TABLE */
.htbl{width:100%;border-collapse:collapse;font-size:12px}
.htbl th{text-align:left;font-size:10px;color:var(--sub);font-weight:600;letter-spacing:.6px;text-transform:uppercase;padding:0 8px 8px 0;border-bottom:1px solid var(--b1)}
.htbl td{padding:8px 8px 8px 0;border-bottom:1px solid var(--b1);vertical-align:middle}
.htbl tr:last-child td{border:none}

/* TOAST */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(4px);background:var(--s2);border:1px solid var(--b2);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-radius:var(--r);padding:8px 16px;font-size:12px;font-weight:600;z-index:9999;opacity:0;transition:opacity var(--dur) var(--ease),transform var(--dur) var(--ease);pointer-events:none;white-space:nowrap;box-shadow:var(--sh-md)}

/* METAS */
.meta-card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);padding:15px;transition:border-color var(--dur) var(--ease)}
.meta-card:hover{border-color:var(--b2)}
.meta-card.meta-done{border-color:rgba(26,158,110,.2);background:rgba(26,158,110,.025)}
.meta-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:11px}
.meta-title{font-size:13px;font-weight:600;color:var(--text)}
.meta-sub{font-size:10px;color:var(--sub);margin-top:2px}
.meta-values{display:flex;justify-content:space-between;margin-bottom:4px}
.meta-val-label{font-size:10px;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
.meta-val{font-family:'Syne',sans-serif;font-size:14px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:-.3px}
.meta-badge-done{background:rgba(26,158,110,.12);color:var(--green);border-radius:var(--r-full);font-size:10px;padding:2px 8px;font-weight:600}
.meta-aportar{display:flex;gap:6px;padding-top:10px;border-top:1px solid var(--b1);margin-top:8px}

/* XFER */
.xrow{border-left:2px solid rgba(11,133,160,.2)}

/* PROJ BAR */
.proj-bar{display:flex;border-radius:var(--r-xs);overflow:hidden;height:18px;gap:1px;margin-top:8px}
.proj-seg{display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;color:rgba(0,0,0,.55);min-width:0;overflow:hidden;white-space:nowrap;padding:0 4px;letter-spacing:.3px}

/* CALENDÁRIO */
.cal-grid-dow{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:4px}
.cal-dow{text-align:center;font-size:10px;font-weight:600;color:var(--sub);padding:4px 0;letter-spacing:.3px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-cell{min-height:48px;border-radius:var(--r-xs);padding:5px 4px;cursor:pointer;transition:background var(--dur-fast) var(--ease);display:flex;flex-direction:column;align-items:center;gap:3px}
.cal-cell:hover{background:var(--s2)}
.cal-cell.cal-empty{cursor:default}
.cal-cell.cal-empty:hover{background:transparent}
.cal-num{font-size:11px;font-weight:500;color:var(--sub);width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:50%}
.cal-cell.cal-hoje .cal-num{background:var(--gold);color:#000;font-weight:700}
.cal-dots{display:flex;gap:2px;flex-wrap:wrap;justify-content:center;max-width:32px}
.cal-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}

/* FOCUS */
:focus-visible{outline:2px solid rgba(198,138,20,.5);outline-offset:2px;border-radius:var(--r-xs)}
:focus:not(:focus-visible){outline:none}

/* PRINT */
@media print{
  body{background:#fff!important;color:#111!important;overflow:visible!important}
  .top,.tabs-wrap,#login,.tbtn,.fa,.rdl,.redit,.edit-panel,.af,.meta-aportar{display:none!important}
  #app{height:auto!important;overflow:visible!important}
  .scroll{overflow:visible!important;height:auto!important}
  .page{padding:0!important;max-width:100%!important}
  .card,.cblock,.meta-card{background:#fff!important;border:1px solid #ddd!important;box-shadow:none!important;break-inside:avoid;margin-bottom:8px}
  .g2,.g3,.g4{gap:8px!important}
}

/* RESPONSIVE */
@media(max-width:700px){.g4{grid-template-columns:1fr 1fr}.g3{grid-template-columns:1fr 1fr}}
@media(max-width:440px){
  .g2,.g3,.g4{grid-template-columns:1fr}
  .fr{flex-direction:column}.fi,.fs,.fa{width:100%!important;min-width:0}
  .page{padding:10px 12px}
  .crow{min-height:44px}
}

/* ANIM */
@keyframes up{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.page>*{animation:up .2s ease both}
.page>*:nth-child(2){animation-delay:.04s}.page>*:nth-child(3){animation-delay:.07s}
.page>*:nth-child(4){animation-delay:.10s}.page>*:nth-child(5){animation-delay:.13s}

/* ── MONTH NAV ── */
.month-nav{display:flex;align-items:center;gap:2px;background:var(--s2);border:1px solid var(--b1);border-radius:var(--r-sm);padding:2px;flex-shrink:0}
.mnav-btn{background:transparent;border:none;color:var(--sub);width:26px;height:26px;border-radius:6px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background var(--dur-fast) var(--ease),color var(--dur-fast) var(--ease);line-height:1}
.mnav-btn:hover{background:var(--s3);color:var(--text)}
.mnav-sel{background:transparent;border:none;color:var(--text);font-size:12px;font-weight:600;outline:none;cursor:pointer;padding:2px 4px;max-width:130px;letter-spacing:-.2px}
.mnav-add{background:var(--gold);border:none;color:#000;width:22px;height:22px;border-radius:5px;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-left:2px;transition:opacity var(--dur-fast) var(--ease)}
.mnav-add:hover{opacity:.82}
/* Saldo badge */
.spill-badge{border-radius:var(--r-full);padding:3px 10px;font-size:11px;font-weight:700;white-space:nowrap;flex-shrink:0;font-variant-numeric:tabular-nums;letter-spacing:-.2px;border:1px solid}
/* Top icon buttons */
.top-icon-btn{border:none;background:transparent;color:var(--sub);font-size:13px;cursor:pointer;padding:4px 6px;border-radius:var(--r-xs);transition:color var(--dur-fast) var(--ease);flex-shrink:0}
.top-icon-btn:hover{color:var(--text)}

<body>
<div id="toast"></div>

<script>
/* ── UTILS ── */
const fmt=v=>isNaN(+v)?'R$0,00':(+v).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
const fmtK=v=>{const n=+v;return n>=1000?'R$'+(n/1000).toFixed(0)+'k':fmt(n)};
const pct=(a,b)=>b>0?Math.min(100,+(a/b*100).toFixed(1)):0;
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const mLabel=k=>{const[y,m]=k.split('-');const s=new Date(+y,+m-1).toLocaleDateString('pt-BR',{month:'long',year:'numeric'});return s[0].toUpperCase()+s.slice(1)};
const san=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const CHK=`<svg viewBox="0 0 12 12"><polyline points="1.5,6.5 4.5,9.5 10.5,2.5"/></svg>`;
let editingId=null;

function clearForm(...ids){ids.forEach(id=>{const el=document.getElementById(id);if(!el)return;if(el.type==='checkbox')el.checked=false;else el.value='';})}

function toast(msg,col){
  const t=document.getElementById('toast');
  const isErr=col&&(col.includes('red')||col.includes('EF'));
  t.textContent=msg;
  t.style.color=isErr?'var(--red)':'var(--green)';
  t.style.borderColor=isErr?'rgba(201,64,64,.3)':'rgba(26,158,110,.3)';
  t.style.opacity='1';t.style.transform='translateX(-50%) translateY(0)';
  clearTimeout(t._t);
  t._t=setTimeout(()=>{t.style.opacity='0';t.style.transform='translateX(-50%) translateY(4px)';},2200);
}

/* ── CATS ── */
const CPF={moradia:{l:'Moradia',c:'#C68A14',i:'🏠'},saude:{l:'Saúde',c:'#1A9E6E',i:'💚'},financeiro:{l:'Financeiro',c:'#C94040',i:'💳'},servicos:{l:'Serviços',c:'#6D3AC7',i:'⚡'},alimentacao:{l:'Alimentação',c:'#EA580C',i:'🍽'},transporte:{l:'Transporte',c:'#0B85A0',i:'🚗'},lazer:{l:'Lazer',c:'#DB2777',i:'🎉'},educacao:{l:'Educação',c:'#65A30D',i:'📚'},outros:{l:'Outros',c:'#72728a',i:'📦'}};
const CPJ={impostos:{l:'Impostos',c:'#C94040',i:'🏛'},contabilidade:{l:'Contabilidade',c:'#6D3AC7',i:'📚'},operacional:{l:'Operacional',c:'#EA580C',i:'⚙️'},folha:{l:'Folha/Sócios',c:'#C68A14',i:'👥'},servicos_pj:{l:'Serviços PJ',c:'#0B85A0',i:'🔧'},marketing:{l:'Marketing',c:'#DB2777',i:'📣'},outros_pj:{l:'Outros',c:'#72728a',i:'📦'}};
const CATS={...CPF,...CPJ};
const ITYPES=['FII','ETF','Fundo','Renda Fixa','Ações','Crypto','Tesouro Direto','CDB','LCI/LCA','Outros'];
const CARDS=['Nubank','Itaú','Bradesco','Santander','BB','C6','XP','Outro'];
const CARD_C={Nubank:'#6D3AC7',Itaú:'#EA580C',Bradesco:'#C94040',Santander:'#C94040',BB:'#C68A14',C6:'#1A9E6E',XP:'#1A1A2E',Outro:'#72728a'};

/* ── AUTH ── */
const hashStr=s=>{let h=5381;for(let i=0;i<s.length;i++)h=(h*33^s.charCodeAt(i))>>>0;return h.toString(36);}
const getPass=()=>localStorage.getItem('nmm_passh')||hashStr('1234');
const setPass=s=>localStorage.setItem('nmm_passh',hashStr(s));

function login(){
  const now=Date.now();
  const attempts=JSON.parse(sessionStorage.getItem('_la')||'[]').filter(t=>now-t<30000);
  if(attempts.length>=5){document.getElementById('lerr').textContent='Muitas tentativas. Aguarde 30s.';document.getElementById('lerr').style.display='block';return;}
  if(hashStr(document.getElementById('pwd').value)!==getPass()){
    attempts.push(now);sessionStorage.setItem('_la',JSON.stringify(attempts));
    document.getElementById('lerr').style.display='block';document.getElementById('pwd').value='';return;
  }
  sessionStorage.removeItem('_la');
  document.getElementById('login').style.display='none';
  const a=document.getElementById('app');a.style.display='flex';a.style.flexDirection='column';
  applyTheme(getTheme());resetSessionTimer();init();syncFromCloud();
}

function logout(){
  document.getElementById('login').style.display='flex';
  document.getElementById('app').style.display='none';
  document.getElementById('pwd').value='';document.getElementById('lerr').style.display='none';
  clearTimeout(_sessionTimer);
}

/* ── SESSÃO ── */
let _sessionTimer=null;
function resetSessionTimer(){
  clearTimeout(_sessionTimer);
  _sessionTimer=setTimeout(()=>{toast('Sessão encerrada por inatividade');setTimeout(logout,1500);},30*60*1000);
}
['click','keydown','touchstart'].forEach(ev=>document.addEventListener(ev,resetSessionTimer,{passive:true}));

/* ── TEMA ── */
function getTheme(){return localStorage.getItem('nmm_theme')||'dark';}
function applyTheme(t){
  document.documentElement.setAttribute('data-theme',t==='light'?'light':'');
  const btn=document.getElementById('theme-btn');
  if(btn)btn.textContent=t==='light'?'🌙':'☀️';
}
function toggleTheme(){const next=getTheme()==='dark'?'light':'dark';localStorage.setItem('nmm_theme',next);applyTheme(next);}

/* ── DATA ── */
let _cache=null;
const load=()=>{if(_cache)return _cache;try{_cache=JSON.parse(localStorage.getItem('nmm_data')||'{}')}catch{_cache={};}return _cache;};
const save=d=>{_cache=d;localStorage.setItem('nmm_data',JSON.stringify(d));scheduleSync();};
function blank(){return{inc:[],bills:[],cards:[],inv:[],xfer:[]};}
function getMD(k){
  const d=load();if(!d[k])d[k]=blank();
  const m=d[k];
  m.inc=m.inc||[];m.bills=m.bills||[];m.cards=m.cards||[];
  m.inv=m.inv||[];m.xfer=m.xfer||[];
  return m;
}
function saveMD(k,m){const d=load();d[k]=m;save(d);}
const allKeys=()=>Object.keys(load()).filter(k=>/^\d{4}-\d{2}$/.test(k)).sort((a,b)=>b.localeCompare(a));

/* Dados globais */
function loadGlobal(){const d=load();return d.__global||{metas:[]};}
function saveGlobal(g){const d=load();d.__global=g;save(d);}

/* ── SUPABASE SYNC ── */
const SB_URL='https://fsdagfpykwfhjiqqahcp.supabase.co/rest/v1/';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZzZGFnZnB5a3dmaGppcXFhaGNwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1MDA4NDUsImV4cCI6MjA5NTA3Njg0NX0.G1lluyG10pAG-yINTIFImnS9Q66q_y4U_agIdPFAdPs';
let _syncTimer=null;

function setSyncStatus(s){
  const el=document.getElementById('sync-indicator');if(!el)return;
  const icons={idle:'',syncing:'⟳',ok:'✓',error:'!'};
  const cols={idle:'var(--sub)',syncing:'var(--sub)',ok:'var(--green)',error:'var(--red)'};
  el.textContent=icons[s]||'';el.style.color=cols[s]||'var(--sub)';
  el.title={idle:'',syncing:'Sincronizando...',ok:'Sincronizado',error:'Sem conexão'}[s]||'';
}
async function sbFetch(method,path,body){
  try{
    const res=await fetch(SB_URL+path,{method,headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':method==='POST'?'resolution=merge-duplicates,return=minimal':''},body:body?JSON.stringify(body):undefined});
    if(!res.ok)throw new Error('HTTP '+res.status);
    return method==='GET'?res.json():true;
  }catch(e){console.warn('[sync]',e.message);return null;}
}
async function syncToCloud(){
  if(!navigator.onLine){setSyncStatus('error');return;}
  setSyncStatus('syncing');
  const ok=await sbFetch('POST','dados',{chave:'nmm_main',valor:JSON.stringify(load()),atualizado_em:new Date().toISOString()});
  setSyncStatus(ok?'ok':'error');
}
async function syncFromCloud(){
  if(!navigator.onLine){setSyncStatus('idle');return;}
  setSyncStatus('syncing');
  const rows=await sbFetch('GET','dados?chave=eq.nmm_main&select=valor,atualizado_em');
  if(!rows||!rows.length){setSyncStatus('idle');return;}
  try{
    const cloud=JSON.parse(rows[0].valor);
    const local=load();
    const cK=Object.keys(cloud).filter(k=>/^\d{4}-\d{2}$/.test(k)).length;
    const lK=Object.keys(local).filter(k=>/^\d{4}-\d{2}$/.test(k)).length;
    if(cK>lK){_cache=cloud;localStorage.setItem('nmm_data',rows[0].valor);render();}
    setSyncStatus('ok');
  }catch(e){setSyncStatus('error');}
}
function scheduleSync(){clearTimeout(_syncTimer);_syncTimer=setTimeout(syncToCloud,2000);}
window.addEventListener('online',()=>syncFromCloud());
window.addEventListener('offline',()=>setSyncStatus('error'));

/* ── STATE ── */
let curM='2026-06',curTab='dash';
let CHS={};
const dC=()=>{CHS={};};

/* ── INIT ── */
function init(){
  applyTheme(getTheme());
  /* Migração: schema v2 */
  const d=load();
  if(!d.__version||d.__version<2){
    const g=loadGlobal();
    allKeys().forEach(k=>{if(d[k]&&d[k].metas&&d[k].metas.length){g.metas=[...(g.metas||[]),...d[k].metas];delete d[k].metas;}});
    /* Migrar pf/pj antigo para estrutura unificada */
    allKeys().forEach(k=>{
      const m=d[k];
      if(m&&(m.pf||m.pj)){
        const novo=blank();
        if(m.pf){novo.inc=[...(m.pf.inc||[]),...(m.pj&&m.pj.inc||[])];novo.bills=[...(m.pf.bills||[]),...(m.pj&&m.pj.bills||[])];novo.inv=[...(m.pf.inv||[]),...(m.pj&&m.pj.inv||[])];}
        novo.cards=m.cards||[];novo.xfer=m.xfer||[];
        d[k]=novo;
      }
    });
    d.__version=2;d.__global=g;_cache=d;localStorage.setItem('nmm_data',JSON.stringify(d));
  }
  if(!load()['2026-06'])saveMD('2026-06',blank());
  curM='2026-06';bSel();
  const sel=document.getElementById('msel');if(sel)sel.value=curM;
  checkVenc();render();
}


function navMonth(dir){
  const keys=allKeys();
  const idx=keys.indexOf(curM);
  const next=idx+(-dir); /* dir=-1 = mês anterior (índice maior), dir=1 = próximo (índice menor) */
  if(next>=0&&next<keys.length){
    curM=keys[next];
    document.getElementById('msel').value=curM;
    editingId=null;checkVenc();render();
  }
}
function bSel(){
  const sel=document.getElementById('msel');if(!sel)return;
  const prev=sel.value||curM;
  const fk=allKeys();
  if(!fk.includes(curM))saveMD(curM,getMD(curM));
  sel.innerHTML=allKeys().map(k=>`<option value="${k}">${mLabel(k)}</option>`).join('');
  sel.value=allKeys().includes(prev)?prev:(allKeys()[0]||curM);
  curM=sel.value;
}

function changeMonth(v){curM=v;editingId=null;checkVenc();render();}

function addMonth(){
  const n=new Date();
  for(let i=0;i<24;i++){
    const d=new Date(n.getFullYear(),n.getMonth()+i);
    const k=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    if(!allKeys().includes(k)){
      const prev=allKeys()[0];
      if(prev){
        const pm=getMD(prev);const nm=blank();
        pm.inc.filter(i=>i.rec).forEach(i=>nm.inc.push({...i,id:uid(),ok:false}));
        pm.bills.filter(b=>b.rec).forEach(b=>nm.bills.push({...b,id:uid(),ok:false}));
        pm.cards.filter(c=>c.rec).forEach(c=>{
          const prox=(c.parcAtual||1)+1,tot=c.parcelas||1;
          if(tot<=1||prox<=tot)nm.cards.push({...c,id:uid(),ok:false,parcAtual:prox});
        });
        pm.inv.filter(i=>i.rec).forEach(i=>nm.inv.push({...i,id:uid(),ok:false}));
        saveMD(k,nm);
      }else saveMD(k,blank());
      curM=k;bSel();document.getElementById('msel').value=k;render();
      toast('Mês criado com recorrências copiadas');return;
    }
  }
}

function goTab(t,btn){
  curTab=t;editingId=null;
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  if(btn)btn.classList.add('on');render();
}

function checkVenc(){
  const m=getMD(curM);let v=0;const today=new Date().getDate();
  [...m.bills,...m.cards].forEach(b=>{
    if(!b.ok&&b.date){const d=parseInt(b.date);if(!isNaN(d)&&d-today<=3&&d>=today)v++;}
  });
  const tab=document.querySelector('.tab[data-t="lancamentos"]');
  if(tab)tab.innerHTML=`Lançamentos${v>0?` <span class="tab-badge">${v}</span>`:''}`;
}

function updatePill(){
  const m=getMD(curM);
  const inc=m.inc.reduce((s,i)=>s+i.v,0);
  const xfer=m.xfer.reduce((s,x)=>s+x.v,0);
  const out=m.bills.reduce((s,b)=>s+b.v,0)+m.cards.reduce((s,c)=>s+c.v,0)+m.inv.reduce((s,i)=>s+i.v,0);
  const bal=(inc+xfer)-out;
  const pill=document.getElementById('spill');pill.style.display='';
  const pos=bal>=0;
  pill.style.background=pos?'rgba(26,158,110,.08)':'rgba(201,64,64,.08)';
  pill.style.borderColor=pos?'rgba(26,158,110,.25)':'rgba(201,64,64,.25)';
  pill.style.color=pos?'var(--green)':'var(--red)';
  pill.textContent=(pos?'+':'')+fmt(bal);
}

function render(){
  dC();updatePill();
  const fns={dash:pgDash,lancamentos:pgLancamentos,invest:pgInvest,metas:pgMetas,proj:pgProjecao,analise:pgAnalise,cfg:pgCfg};
  document.getElementById('pg').innerHTML=(fns[curTab]||pgDash)();
  document.querySelector('.scroll').scrollTop=0;
  requestAnimationFrame(()=>{
    /* Aguardar 1 frame extra para garantir que o canvas tem dimensões */
    setTimeout(()=>{
      if(curTab==='dash')drawDash();
      if(curTab==='invest'){drawInvest();renderContasList();}
      if(curTab==='analise')drawAnalise();
      if(curTab==='proj')drawProjecao();
    },16);
  });
}

/* ── HELPER BLOCK ── */
function cb(title,items,col,rowFn){
  const done=items.filter(i=>i.ok).length;
  const tot=items.reduce((s,i)=>s+i.v,0);
  return `<div class="cblock">
    <div class="cbh">
      <div class="cbhtl">${title} <span class="cbct">${done}/${items.length}</span></div>
      <div class="cbv" style="color:${col}">${fmt(tot)}</div>
    </div>
    ${items.length?items.map(rowFn).join(''):'<div class="erow">Nenhum item ainda.</div>'}
  </div>`;
}

/* ── NANO CHARTS ── */
const NC={
  PAL:['#6D3AC7','#C68A14','#1A9E6E','#C94040','#3B7DE8','#DB2777','#0B85A0','#65A30D'],

  /* Resolver largura real do canvas */
  size(el){
    if(!el)return null;
    let w=0,p=el.parentElement;
    while(p&&!w){w=p.clientWidth||p.offsetWidth||0;p=p.parentElement;}
    const h=parseInt(el.getAttribute('height')||200);
    el.width=w||320; el.height=h;
    return el.getContext('2d');
  },

  /* Texto vazio elegante */
  empty(ctx,W,H,msg='Sem dados'){
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle='rgba(114,114,138,.08)';
    const r=Math.min(W,H)*.22;
    ctx.beginPath();ctx.arc(W/2,H/2,r,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(114,114,138,.4)';
    ctx.font='11px DM Sans,sans-serif';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(msg,W/2,H/2);
  },

  /* Formatar tick do eixo Y */
  tick(v){
    const a=Math.abs(v);
    if(a>=1000000)return(v/1000000).toFixed(1)+'M';
    if(a>=1000)return'R$'+(v/1000).toFixed(0)+'k';
    return'R$'+v.toFixed(0);
  },

  /* ── DONUT ── */
  donut(id,labels,values,opts){
    const el=document.getElementById(id);
    const ctx=this.size(el);if(!ctx)return;
    const W=el.width,H=el.height;
    ctx.clearRect(0,0,W,H);

    /* Filtrar zeros — manter índices sincronizados */
    const idxs=values.map((v,i)=>i).filter(i=>values[i]>0);
    if(!idxs.length){this.empty(ctx,W,H);return;}
    const vals=idxs.map(i=>values[i]);
    const lbls=idxs.map(i=>labels[i]);
    const colors=opts&&opts.colors?idxs.map(i=>opts.colors[i]):this.PAL;
    const total=vals.reduce((a,b)=>a+b,0);

    /* Layout */
    const legW=Math.min(120,W*.36);
    const chartW=W-legW;
    const cx=chartW/2,cy=H/2;
    const r=Math.min(cx*.9,cy*.9);
    const cut=.62; /* Buraco moderno */

    /* Segmentos com gap sutil */
    let angle=-Math.PI/2;
    vals.forEach((v,i)=>{
      const sweep=v/total*Math.PI*2;
      const gap=.018;
      ctx.beginPath();
      ctx.arc(cx,cy,r,angle+gap,angle+sweep-gap);
      ctx.arc(cx,cy,r*cut,angle+sweep-gap,angle+gap,true);
      ctx.closePath();
      ctx.fillStyle=colors[i%colors.length];
      ctx.globalAlpha=.9;
      ctx.fill();
      angle+=sweep;
    });
    ctx.globalAlpha=1;

    /* Legenda à direita — limpa */
    const itemH=Math.min(18,(H-20)/lbls.length);
    const startY=cy-(lbls.length*itemH)/2+itemH*.5;
    lbls.forEach((lbl,i)=>{
      const y=startY+i*itemH;
      const col=colors[i%colors.length];
      const pct=Math.round(vals[i]/total*100);

      /* Dot */
      ctx.fillStyle=col;ctx.globalAlpha=.85;
      ctx.beginPath();ctx.arc(chartW+10,y,4,0,Math.PI*2);ctx.fill();
      ctx.globalAlpha=1;

      /* Label */
      ctx.fillStyle='rgba(114,114,138,.85)';
      ctx.font='10px DM Sans,sans-serif';
      ctx.textAlign='left';
      const short=lbl.length>11?lbl.slice(0,10)+'…':lbl;
      ctx.fillText(short,chartW+18,y+3.5);

      /* Pct */
      ctx.fillStyle='rgba(232,232,240,.7)';
      ctx.font='bold 10px DM Sans,sans-serif';
      ctx.textAlign='right';
      ctx.fillText(pct+'%',W-2,y+3.5);
    });
  },

  /* ── BAR VERTICAL ── */
  bar(id,labels,datasets,opts){
    const el=document.getElementById(id);
    const ctx=this.size(el);if(!ctx)return;
    const W=el.width,H=el.height;
    ctx.clearRect(0,0,W,H);

    const allV=datasets.flatMap(d=>d.data||[]).filter(v=>typeof v==='number'&&v>=0);
    if(!allV.length||!labels.length){this.empty(ctx,W,H);return;}

    const maxV=Math.max(...allV)||1;
    /* Escala arredondada */
    const mag=Math.pow(10,Math.floor(Math.log10(maxV)));
    const topV=Math.ceil(maxV/mag)*mag;

    const pad={t:22,r:10,b:26,l:52};
    const cW=W-pad.l-pad.r;const cH=H-pad.t-pad.b;
    const n=labels.length;const nD=datasets.length;
    const grpW=cW/n;
    const bW=Math.min(Math.max(grpW*.28,8),20);
    const bGap=2;

    /* Grid */
    const steps=4;
    for(let i=0;i<=steps;i++){
      const f=i/steps;const y=pad.t+cH*(1-f);
      ctx.strokeStyle=`rgba(114,114,138,${i===0?.12:.06})`;
      ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke();
      ctx.fillStyle='rgba(114,114,138,.55)';
      ctx.font='9px DM Sans,sans-serif';ctx.textAlign='right';
      ctx.fillText(this.tick(topV*f),pad.l-4,y+3);
    }

    /* Barras */
    datasets.forEach((ds,di)=>{
      const col=ds.color||this.PAL[di%this.PAL.length];
      (ds.data||[]).forEach((v,i)=>{
        if(!v||v<=0)return;
        const h=Math.max(v/topV*cH,2);
        const totalBW=nD*bW+(nD-1)*bGap;
        const x=pad.l+i*grpW+(grpW-totalBW)/2+di*(bW+bGap);
        const y=pad.t+cH-h;
        ctx.fillStyle=col;ctx.globalAlpha=.82;
        ctx.beginPath();
        const radius=Math.min(3,h/2);
        if(ctx.roundRect)ctx.roundRect(x,y,bW,h,radius);
        else ctx.rect(x,y,bW,h);
        ctx.fill();
      });
    });
    ctx.globalAlpha=1;

    /* Labels X */
    ctx.fillStyle='rgba(114,114,138,.6)';
    ctx.font='9px DM Sans,sans-serif';ctx.textAlign='center';
    labels.forEach((lbl,i)=>{
      ctx.fillText(lbl,pad.l+i*grpW+grpW/2,H-7);
    });

    /* Legenda */
    if(datasets.length>1){
      let lx=pad.l;
      datasets.forEach((ds,i)=>{
        const col=ds.color||this.PAL[i];
        ctx.fillStyle=col;ctx.globalAlpha=.82;
        ctx.beginPath();ctx.roundRect?ctx.roundRect(lx,6,10,4,2):ctx.fillRect(lx,6,10,4);
        ctx.fill();ctx.globalAlpha=1;
        ctx.fillStyle='rgba(114,114,138,.7)';
        ctx.font='9px DM Sans,sans-serif';ctx.textAlign='left';
        ctx.fillText(ds.label||'',lx+13,11);
        lx+=ctx.measureText(ds.label||'').width+22;
      });
    }
  },

  /* ── BAR HORIZONTAL ── */
  barH(id,labels,values,opts){
    const el=document.getElementById(id);
    const ctx=this.size(el);if(!ctx)return;
    const W=el.width,H=el.height;
    ctx.clearRect(0,0,W,H);
    if(!values.length){this.empty(ctx,W,H);return;}
    const maxV=Math.max(...values,1);
    const colors=(opts&&opts.colors)||this.PAL;
    const n=values.length;
    const rowH=(H-8)/n;
    const bH=Math.min(rowH*.55,16);
    const labW=Math.min(80,W*.28);
    const cW=W-labW-52;

    values.forEach((v,i)=>{
      const y=4+i*rowH+(rowH-bH)/2;
      const w=v/maxV*cW;
      const col=colors[i%colors.length];

      /* Track */
      ctx.fillStyle='rgba(114,114,138,.07)';
      ctx.beginPath();
      if(ctx.roundRect)ctx.roundRect(labW,y,cW,bH,3);else ctx.fillRect(labW,y,cW,bH);
      ctx.fill();

      /* Bar */
      if(w>1){
        ctx.fillStyle=col;ctx.globalAlpha=.78;
        ctx.beginPath();
        if(ctx.roundRect)ctx.roundRect(labW,y,w,bH,3);else ctx.fillRect(labW,y,w,bH);
        ctx.fill();ctx.globalAlpha=1;
      }

      /* Label esq */
      ctx.fillStyle='rgba(114,114,138,.8)';
      ctx.font='10px DM Sans,sans-serif';ctx.textAlign='right';
      const lbl=(labels[i]||'').slice(0,10);
      ctx.fillText(lbl,labW-6,y+bH/2+3.5);

      /* Valor dir */
      ctx.fillStyle='rgba(232,232,240,.8)';ctx.textAlign='left';
      ctx.fillText(this.tick(v),labW+w+6,y+bH/2+3.5);
    });
  },

  /* ── LINE ── */
  line(id,labels,datasets,opts){
    const el=document.getElementById(id);
    const ctx=this.size(el);if(!ctx)return;
    const W=el.width,H=el.height;
    ctx.clearRect(0,0,W,H);

    const allV=datasets.flatMap(d=>d.data||[]).filter(v=>typeof v==='number'&&!isNaN(v));
    if(!allV.length){this.empty(ctx,W,H);return;}

    let minV=Math.min(...allV),maxV=Math.max(...allV);
    /* Padding visual no range */
    const rng=maxV-minV||Math.abs(maxV)||100;
    minV-=rng*.08;maxV+=rng*.12;
    const range=maxV-minV;
    const n=Math.max(labels.length,1);

    const pad={t:18,r:14,b:26,l:54};
    const cW=W-pad.l-pad.r;const cH=H-pad.t-pad.b;
    const xOf=i=>pad.l+(n>1?i*(cW/(n-1)):cW/2);
    const yOf=v=>pad.t+cH*(1-(v-minV)/range);

    /* Grid */
    const steps=4;
    for(let i=0;i<=steps;i++){
      const f=i/steps;const y=pad.t+cH*(1-f);
      ctx.strokeStyle=`rgba(114,114,138,${i===0?.1:.05})`;
      ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke();
      ctx.fillStyle='rgba(114,114,138,.55)';
      ctx.font='9px DM Sans,sans-serif';ctx.textAlign='right';
      ctx.fillText(this.tick(minV+range*f),pad.l-4,y+3);
    }

    /* Labels X */
    ctx.fillStyle='rgba(114,114,138,.6)';
    ctx.font='9px DM Sans,sans-serif';ctx.textAlign='center';
    labels.forEach((lbl,i)=>ctx.fillText(lbl,xOf(i),H-7));

    /* Linhas + fill */
    datasets.forEach((ds,di)=>{
      const col=ds.color||this.PAL[di%this.PAL.length];
      const pts=(ds.data||[]).map((v,i)=>({x:xOf(i),y:yOf(v)}));
      if(pts.length<2){
        if(pts.length===1){ctx.beginPath();ctx.arc(pts[0].x,pts[0].y,4,0,Math.PI*2);ctx.fillStyle=col;ctx.fill();}
        return;
      }

      /* Fill */
      ctx.beginPath();
      ctx.moveTo(pts[0].x,pad.t+cH);
      pts.forEach(p=>ctx.lineTo(p.x,p.y));
      ctx.lineTo(pts[pts.length-1].x,pad.t+cH);
      ctx.closePath();
      const grad=ctx.createLinearGradient(0,pad.t,0,pad.t+cH);
      grad.addColorStop(0,col+'28');grad.addColorStop(1,col+'04');
      ctx.fillStyle=grad;ctx.fill();

      /* Linha */
      ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);
      for(let i=1;i<pts.length;i++){
        const cpx=(pts[i-1].x+pts[i].x)/2;
        ctx.bezierCurveTo(cpx,pts[i-1].y,cpx,pts[i].y,pts[i].x,pts[i].y);
      }
      ctx.strokeStyle=col;ctx.lineWidth=1.8;ctx.globalAlpha=.9;ctx.stroke();ctx.globalAlpha=1;

      /* Pontos */
      pts.forEach(p=>{
        ctx.beginPath();ctx.arc(p.x,p.y,3,0,Math.PI*2);
        ctx.fillStyle=col;ctx.fill();
        ctx.strokeStyle='rgba(9,9,15,.8)';ctx.lineWidth=1.5;ctx.stroke();
      });
    });

    /* Legenda */
    if(datasets.length>1){
      let lx=pad.l;
      datasets.forEach((ds,i)=>{
        const col=ds.color||this.PAL[i];
        ctx.strokeStyle=col;ctx.lineWidth=2;ctx.globalAlpha=.85;
        ctx.beginPath();ctx.moveTo(lx,8);ctx.lineTo(lx+14,8);ctx.stroke();
        ctx.globalAlpha=1;
        ctx.fillStyle=col;ctx.beginPath();ctx.arc(lx+7,8,2.5,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='rgba(114,114,138,.75)';
        ctx.font='9px DM Sans,sans-serif';ctx.textAlign='left';
        ctx.fillText(ds.label||'',lx+18,11);
        lx+=ctx.measureText(ds.label||'').width+26;
      });
    }
  }
};

      <button class="edit-save" onclick="saveEdit('${item.id}','${tipo}')">Salvar</button>
      <button class="edit-cancel" onclick="startEdit(null)">×</button>

  if(tipo==='cards'){

function saveEdit(id,tipo){
  const m=getMD(curM);
  const list=m[tipo];const item=list.find(x=>x.id===id);if(!item)return;
  const n=document.getElementById('e-n');if(n)item.n=n.value.trim()||item.n;
  const v=document.getElementById('e-v');if(v)item.v=parseFloat(v.value)||item.v;
  const d=document.getElementById('e-d');if(d)item.date=d.value.trim();
  const c=document.getElementById('e-c');if(c)item.c=c.value;
  const rec=document.getElementById('e-rec');if(rec)item.rec=rec.checked;
  const card=document.getElementById('e-card');if(card)item.card=card.value;
  const p=document.getElementById('e-p');if(p)item.parcelas=parseInt(p.value)||1;
  const pi=document.getElementById('e-pi');if(pi)item.parcAtual=parseInt(pi.value)||1;
  const vence=document.getElementById('e-vence');if(vence)item.vence=vence.value.trim();
  saveMD(curM,m);editingId=null;toast('Atualizado');render();
}

function calcInvScore(){
  const allH={};let tot=0;
  allKeys().forEach(k=>getMD(k).inv.forEach(i=>{allH[i.t]=(allH[i.t]||0)+i.v;tot+=i.v;}));
  if(!tot)return 0;
  const types=Object.keys(allH).length;
  const maxC=Math.max(...Object.values(allH))/tot*100;
  return Math.round(Math.min(40,types*10)+Math.min(40,Math.max(0,40-(maxC-30)))+Math.min(20,allKeys().filter(k=>getMD(k).inv.length>0).length*5));
}

/* ── METAS (GLOBAIS) ── */
function pgMetas(){
  const metas=loadGlobal().metas||[];
  const totalMeta=metas.reduce((s,mt)=>s+mt.alvo,0);
  const totalPoup=metas.reduce((s,mt)=>s+(mt.poupado||0),0);
  const concluidas=metas.filter(mt=>(mt.poupado||0)>=mt.alvo).length;
  const catOpts=[
    {v:'reserva',l:'Reserva de Emergência'},{v:'viagem',l:'Viagem'},{v:'imovel',l:'Imóvel'},
    {v:'veiculo',l:'Veículo'},{v:'investimento',l:'Investimento'},{v:'educacao',l:'Educação'},{v:'outro',l:'Outro'},
  ];
  const catMap={};catOpts.forEach(c=>catMap[c.v]=c);
  const catOps=catOpts.map(c=>`<option value="${c.v}">${c.l}</option>`).join('');

  const keys=allKeys();
  const avgSaldo=keys.length?keys.slice(0,3).reduce((s,k)=>{
    const md=getMD(k);const inc=md.inc.reduce((a,i)=>a+i.v,0);
    const out=md.bills.reduce((a,b)=>a+b.v,0)+md.cards.reduce((a,c)=>a+c.v,0)+md.inv.reduce((a,i)=>a+i.v,0);
    return s+Math.max(0,inc-out);
  },0)/Math.min(3,keys.length):0;

  const metaCards=metas.length?metas.map(mt=>{
    const poupado=mt.poupado||0;
    const p=mt.alvo>0?Math.min(100,(poupado/mt.alvo*100)):0;
    const falta=Math.max(0,mt.alvo-poupado);
    const done=poupado>=mt.alvo;
    const col=p>=100?'var(--green)':p>=50?'var(--gold)':'var(--blue)';
    const mesesR=avgSaldo>0&&!done?Math.ceil(falta/avgSaldo):null;
    const cat=catMap[mt.cat]||{l:'Outro'};
    return `<div class="meta-card${done?' meta-done':''}">
      <div class="meta-header">
        <div><div class="meta-title">${san(mt.nome)}</div><div class="meta-sub">${cat.l}${mt.prazo?' · prazo '+mt.prazo:''}</div></div>
        <div style="display:flex;align-items:center;gap:6px">
          ${done?'<span class="meta-badge-done">Concluída</span>':''}
          <button class="redit" style="font-size:12px" onclick="editarAlvo('${mt.id}')" title="Editar meta">✎</button>
          <button class="redit" style="font-size:11px;font-weight:700" onclick="editarPoupado('${mt.id}')" title="Editar poupado">R$</button>
          <button class="rdl" onclick="delMeta('${mt.id}')">×</button>
        </div>
      </div>
      <div class="meta-values">
        <div><div class="meta-val-label">Poupado</div><div class="meta-val" style="color:var(--green)">${fmt(poupado)}</div></div>
        <div style="text-align:center"><div class="meta-val-label">Meta</div><div class="meta-val">${fmt(mt.alvo)}</div></div>
        <div style="text-align:right"><div class="meta-val-label">Falta</div><div class="meta-val" style="color:${falta>0?'var(--orange)':'var(--green)'}">${fmt(falta)}</div></div>
      </div>
      <div style="background:rgba(128,128,180,.1);border-radius:4px;height:6px;overflow:hidden;margin:10px 0 6px">
        <div style="height:100%;width:${p.toFixed(1)}%;background:${col};border-radius:4px;transition:width .8s"></div>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <div style="font-size:10px;color:var(--sub)">${p.toFixed(0)}% concluído</div>
        ${mesesR?`<div style="font-size:10px;color:var(--sub)">~${mesesR} ${mesesR===1?'mês':'meses'} no ritmo atual</div>`:done?'<div style="font-size:10px;color:var(--green)">Meta atingida 🎉</div>':'<div style="font-size:10px;color:var(--dim)">—</div>'}
      </div>
      <div class="meta-aportar">
        <input class="fi" id="ap_${mt.id}" type="number" step="0.01" placeholder="Adicionar valor" style="flex:1;font-size:12px;padding:6px 9px">
        <button class="fa" style="background:var(--green);color:#fff;font-size:12px;padding:6px 12px" onclick="aportarMeta('${mt.id}')">Poupar</button>
      </div>
    </div>`;
  }).join(''):`<div class="erow" style="padding:32px">Nenhuma meta criada ainda. Defina para onde quer chegar.</div>`;

  return `
  <div class="g3">
    <div class="card"><div class="sl">Total das Metas</div><div class="sv" style="color:var(--purple)">${fmt(totalMeta)}</div><div class="ss">${metas.length} meta${metas.length!==1?'s':''}</div></div>
    <div class="card"><div class="sl">Total Poupado</div><div class="sv" style="color:var(--green)">${fmt(totalPoup)}</div>
      <div class="track"><div class="fill" style="width:${pct(totalPoup,totalMeta)}%;background:var(--green)"></div></div>
    </div>
    <div class="card"><div class="sl">Concluídas</div><div class="sv" style="color:var(--gold)">${concluidas}/${metas.length}</div><div class="ss">${metas.length-concluidas} em andamento</div></div>
  </div>
  <div class="af"><div class="aft">+ Nova Meta</div>
    <div class="fr">
      <input class="fi" id="mt-nome" placeholder="Nome da meta" style="flex:2">
      <input class="fi" id="mt-alvo" type="number" step="0.01" placeholder="Valor alvo">
      <select class="fs" id="mt-cat">${catOps}</select>
      <input class="fi" id="mt-prazo" type="month" style="max-width:140px">
      <button class="fa" style="background:var(--purple);color:#fff" onclick="addMeta()">Criar</button>
    </div>
  </div>
  <div style="display:flex;flex-direction:column;gap:10px">${metaCards}</div>`;
}

function addMeta(){
  const nome=document.getElementById('mt-nome').value.trim();
  const alvo=parseFloat(document.getElementById('mt-alvo').value);
  const cat=document.getElementById('mt-cat').value;
  const prazo=document.getElementById('mt-prazo').value;
  if(!nome||isNaN(alvo)||alvo<=0){toast('Preencha nome e valor','err');return;}
  const g=loadGlobal();if(!g.metas)g.metas=[];
  g.metas.push({id:uid(),nome,alvo,cat,prazo,poupado:0,criada:curM});
  saveGlobal(g);clearForm('mt-nome','mt-alvo','mt-prazo');toast('Meta criada');render();
}
function aportarMeta(id){
  const inp=document.getElementById('ap_'+id);
  const v=parseFloat(inp?inp.value:'');
  if(isNaN(v)||v<=0){toast('Informe o valor','err');return;}
  const g=loadGlobal();const mt=(g.metas||[]).find(x=>x.id===id);
  if(mt){mt.poupado=(mt.poupado||0)+v;saveGlobal(g);toast('Valor adicionado');render();}
}
function delMeta(id){
  if(!confirm('Remover esta meta?'))return;
  const g=loadGlobal();g.metas=(g.metas||[]).filter(x=>x.id!==id);
  saveGlobal(g);toast('Meta removida');render();
}
function editarPoupado(id){
  const g=loadGlobal();const mt=(g.metas||[]).find(x=>x.id===id);if(!mt)return;
  const novo=parseFloat(prompt('Valor total poupado nesta meta:',mt.poupado||0));
  if(isNaN(novo)||novo<0)return;mt.poupado=novo;saveGlobal(g);toast('Meta atualizada');render();
}
function editarAlvo(id){
  const g=loadGlobal();const mt=(g.metas||[]).find(x=>x.id===id);if(!mt)return;
  const novo=parseFloat(prompt('Novo valor alvo:',mt.alvo));
  if(isNaN(novo)||novo<=0)return;mt.alvo=novo;saveGlobal(g);toast('Meta atualizada');render();
}

/* ── PROJEÇÃO ── */
function pgProjecao(){
  const keys=allKeys();
  const ultimos=keys.slice(0,3);
  const avg=fn=>ultimos.length?ultimos.reduce((s,k)=>s+fn(getMD(k)),0)/ultimos.length:0;
  const avgInc=avg(m=>m.inc.reduce((s,i)=>s+i.v,0)+m.xfer.reduce((s,x)=>s+x.v,0));
  const avgOut=avg(m=>m.bills.reduce((s,b)=>s+b.v,0)+m.cards.reduce((s,c)=>s+c.v,0));
  const avgInv=avg(m=>m.inv.reduce((s,i)=>s+i.v,0));
  const avgSaldo=Math.max(0,avgInc-avgOut-avgInv);
  const patrimonioAtual=keys.reduce((s,k)=>s+getMD(k).inv.reduce((a,i)=>a+i.v,0),0)+(loadGlobal().contas||[]).reduce((s,c)=>s+c.saldo,0);
  const gastosAnuais=avgOut*12;
  const metaIF=gastosAnuais*25;
  const pctIF=metaIF>0?Math.min(100,(patrimonioAtual/metaIF*100)):0;
  const faltaIF=Math.max(0,metaIF-patrimonioAtual);
  let simPat=patrimonioAtual,mesesIF=0;
  if(avgInv>0||simPat>0){while(simPat<metaIF&&mesesIF<600){simPat=simPat*1.008+avgInv;mesesIF++;}}
  const anosIF=mesesIF>0&&mesesIF<600?(mesesIF/12).toFixed(1):null;
  let p1=patrimonioAtual,p2=patrimonioAtual;
  const projLabels=[],projVals=[],projJurosVals=[];
  for(let i=1;i<=12;i++){
    const d=new Date();d.setMonth(d.getMonth()+i);
    projLabels.push(d.toLocaleDateString('pt-BR',{month:'short'}));
    p1+=avgInv;projVals.push(Math.round(p1));
    p2=p2*1.008+avgInv;projJurosVals.push(Math.round(p2));
  }
  return `
  <div class="g4">
    <div class="card"><div class="sl">Renda Média/mês</div><div class="sv" style="color:var(--green)">${fmt(avgInc)}</div><div class="ss">últimos ${ultimos.length} meses</div></div>
    <div class="card"><div class="sl">Gasto Médio/mês</div><div class="sv" style="color:var(--red)">${fmt(avgOut)}</div><div class="ss">contas + cartões</div></div>
    <div class="card"><div class="sl">Aporte Médio/mês</div><div class="sv" style="color:var(--purple)">${fmt(avgInv)}</div><div class="ss">${avgInc>0?(avgInv/avgInc*100).toFixed(1):'0'}% da renda</div></div>
    <div class="card"><div class="sl">Sobra Média/mês</div><div class="sv" style="color:${avgSaldo>0?'var(--green)':'var(--red)'}">${fmt(avgSaldo)}</div></div>
  </div>
  <div class="card">
    <div class="sh" style="margin-bottom:12px">
      <div><div class="st">Independência Financeira</div><div class="ss" style="margin-top:2px">Regra dos 4% — precisar de 25× gastos anuais investidos</div></div>
      ${anosIF?`<div style="text-align:right"><div class="sl">Estimativa</div><div style="font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:var(--gold)">${anosIF} anos</div></div>`:''}
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:14px">
      <div><div class="meta-val-label">Patrimônio Atual</div><div class="meta-val" style="color:var(--purple)">${fmt(patrimonioAtual)}</div></div>
      <div><div class="meta-val-label">Meta IF</div><div class="meta-val">${fmt(metaIF)}</div><div style="font-size:10px;color:var(--sub)">25× ${fmt(gastosAnuais)}/ano</div></div>
      <div><div class="meta-val-label">Falta</div><div class="meta-val" style="color:var(--orange)">${fmt(faltaIF)}</div></div>
    </div>
    <div style="background:var(--s3);border-radius:4px;height:8px;overflow:hidden;margin-bottom:6px">
      <div style="height:100%;width:${pctIF.toFixed(1)}%;background:linear-gradient(90deg,var(--purple),var(--green));border-radius:4px;transition:width .8s"></div>
    </div>
    <div style="font-size:10px;color:var(--sub)">${pctIF.toFixed(1)}% do caminho para IF${metaIF===0?' — lance gastos para calcular':''}</div>
  </div>
  <div class="card">
    <div class="sh" style="margin-bottom:10px">
      <div class="st">Projeção 12 Meses</div>
      <div style="display:flex;gap:14px;font-size:11px;color:var(--sub)">
        <span>Sem juros: <strong style="color:var(--text)">${fmt(p1)}</strong></span>
        <span>Com 0,8%/mês: <strong style="color:var(--green)">${fmt(p2)}</strong></span>
      </div>
    </div>
    <div class="ch ch-m"><canvas id="cvproj"></canvas></div>
  </div>
  <div class="card"><div class="sl" style="margin-bottom:10px">Cenários de Aporte</div>
    ${[50,100,150].map(p=>{
      const extra=avgInc*p/100;let sp=patrimonioAtual,m=0;
      while(sp<metaIF&&m<600){sp=sp*1.008+extra;m++;}
      return `<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--b1)">
        <div style="font-size:13px">Investir <strong>${p}%</strong> da renda</div>
        <div style="text-align:right"><div style="font-weight:700;color:var(--purple)">${fmt(extra)}/mês</div>
        ${m<600&&m>0?`<div style="font-size:10px;color:var(--sub)">IF em ${(m/12).toFixed(1)} anos</div>`:'<div style="font-size:10px;color:var(--dim)">— lance dados</div>'}</div>
      </div>`;
    }).join('')}
  </div>`;
}

/* ── ANÁLISE (unifica Comparativo + Anual + Saúde) ── */
function pgAnalise(){
  const keys=allKeys();
  const score=calcScore(curM);
  const col=score>=70?'var(--green)':score>=40?'var(--gold)':'var(--red)';
  const lbl=score>=70?'Ótima':'Regular';
  const m=getMD(curM);
  const inc=m.inc.reduce((s,i)=>s+i.v,0);
  const xfer=m.xfer.reduce((s,x)=>s+x.v,0);
  const renda=inc+xfer;
  const out=m.bills.reduce((s,b)=>s+b.v,0)+m.cards.reduce((s,c)=>s+c.v,0);
  const inv=m.inv.reduce((s,i)=>s+i.v,0);
  const savR=renda>0?((renda-out)/renda*100).toFixed(1):0;
  const invR=renda>0?(inv/renda*100).toFixed(1):0;
  const cardR=renda>0?(m.cards.reduce((s,c)=>s+c.v,0)/renda*100).toFixed(1):0;

  /* Comparativo últimos 6 meses */
  const ultimos=keys.slice(0,6).reverse();
  const dados=ultimos.map(k=>{
    const md=getMD(k);
    const i=md.inc.reduce((s,i)=>s+i.v,0);
    const o=md.bills.reduce((s,b)=>s+b.v,0)+md.cards.reduce((s,c)=>s+c.v,0);
    const inv2=md.inv.reduce((s,i)=>s+i.v,0);
    const[y,mo]=k.split('-');
    return {k,label:new Date(+y,+mo-1).toLocaleDateString('pt-BR',{month:'short',year:'2-digit'}),inc:i,out:o,inv:inv2,saldo:i-o-inv2,sc:calcScore(k)};
  });
  const delta=(arr,i,key)=>{if(i===0)return null;const p=arr[i-1][key];const c=arr[i][key];if(p===0)return null;return((c-p)/Math.abs(p)*100).toFixed(0);};
  const deltaEl=d=>{if(d===null)return '';const pos=+d>=0;return `<span style="font-size:9px;font-weight:700;color:${pos?'var(--green)':'var(--red)'}">${pos?'▲':'▼'}${Math.abs(d)}%</span>`;};

  /* Alertas financeiros */
  const alertas=[];
  if(+cardR>30)alertas.push({t:'r',m:'Cartões representam '+cardR+'% da renda — ideal abaixo de 30%'});
  if(+savR<10)alertas.push({t:'r',m:'Taxa de economia baixa: '+savR+'% — meta é >20%'});
  else if(+savR>=20)alertas.push({t:'g',m:'Boa taxa de economia: '+savR+'% da renda'});
  if(+invR<5)alertas.push({t:'y',m:'Investindo apenas '+invR+'% da renda — tente chegar a 10%'});
  else if(+invR>=10)alertas.push({t:'g',m:'Bom ritmo de investimento: '+invR+'% da renda'});
  if(m.bills.filter(b=>!b.ok).length>0&&renda===0)alertas.push({t:'r',m:'Contas pendentes sem receita lançada neste mês'});

  return `
  ${alertas.length?`<div style="display:flex;flex-direction:column;gap:6px">${alertas.map(a=>`<div class="al al-${a.t}">${a.m}</div>`).join('')}</div>`:''}
  <div class="g3">
    <div class="card" style="display:flex;align-items:center;gap:16px">
      <div style="position:relative;width:72px;height:72px;flex-shrink:0">
        <canvas id="cvscore" width="72" height="72"></canvas>
        <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column">
          <div style="font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:${col}">${score}</div>
        </div>
      </div>
      <div><div class="sl">Saúde Financeira</div><div style="font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:${col}">${lbl}</div><div class="ss">score do mês</div></div>
    </div>
    <div class="card">
      <div class="sl">Taxa de Economia</div><div class="sv" style="color:${+savR>=20?'var(--green)':+savR>=10?'var(--gold)':'var(--red)'}">${savR}%</div>
      <div class="ss">meta: >20% da renda</div>
      <div class="track"><div class="fill" style="width:${Math.min(100,+savR)}%;background:var(--green)"></div></div>
    </div>
    <div class="card">
      <div class="sl">Taxa de Investimento</div><div class="sv" style="color:${+invR>=10?'var(--green)':+invR>=5?'var(--gold)':'var(--red)'}">${invR}%</div>
      <div class="ss">meta: >10% da renda</div>
      <div class="track"><div class="fill" style="width:${Math.min(100,+invR*5)}%;background:var(--purple)"></div></div>
    </div>
  </div>

  <div class="card">
    <div class="sh" style="margin-bottom:10px"><div class="st">Comparativo — últimos meses</div></div>
    <div class="ch ch-m"><canvas id="cvcomp"></canvas></div>
  </div>

  <div class="card" style="overflow-x:auto">
    <div class="st" style="margin-bottom:12px">Detalhe por Mês <span style="font-size:10px;color:var(--sub);font-weight:400">▲▼ vs mês anterior</span></div>
    <table class="htbl">
      <thead><tr><th>Mês</th><th>Receita</th><th>Gastos</th><th>Investido</th><th>Saldo</th><th>Score</th></tr></thead>
      <tbody>${dados.map((d,i)=>`<tr>
        <td style="font-weight:600;white-space:nowrap">${d.label}</td>
        <td style="color:var(--green)">${fmt(d.inc)} ${deltaEl(delta(dados,i,'inc'))}</td>
        <td style="color:var(--red)">${fmt(d.out)} ${deltaEl(delta(dados,i,'out'))}</td>
        <td style="color:var(--purple)">${fmt(d.inv)}</td>
        <td style="font-weight:700;color:${d.saldo>=0?'var(--green)':'var(--red)'}">${fmt(d.saldo)}</td>
        <td><span style="font-weight:800;color:${d.sc>=70?'var(--green)':d.sc>=40?'var(--gold)':'var(--red)'}">${d.sc}</span></td>
      </tr>`).join('')}</tbody>
    </table>
  </div>`;
}

function calcScore(k){
  const m=getMD(k);
  const inc=m.inc.reduce((s,i)=>s+i.v,0);
  const xfer=m.xfer.reduce((s,x)=>s+x.v,0);
  const renda=inc+xfer;
  if(!renda)return 0;
  const out=m.bills.reduce((s,b)=>s+b.v,0)+m.cards.reduce((s,c)=>s+c.v,0);
  const inv=m.inv.reduce((s,i)=>s+i.v,0);
  const savR=(renda-out)/renda*100;const invR=inv/renda*100;
  const paidR=m.bills.length?m.bills.filter(b=>b.ok).length/m.bills.length*100:100;
  return Math.round(Math.min(100,Math.max(0,Math.min(40,savR)+Math.min(30,invR*2)+paidR*.3)));
}

function drawAnalise(){
  const score=calcScore(curM);
  const col=score>=70?'#1A9E6E':score>=40?'#C68A14':'#C94040';
  /* Ring */
  const el=document.getElementById('cvscore');
  if(el){
    el.width=72;el.height=72;const ctx=el.getContext('2d');
    const cx=36,cy=36,r=28;
    ctx.clearRect(0,0,72,72);
    ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.strokeStyle='rgba(128,128,180,.12)';ctx.lineWidth=7;ctx.stroke();
    if(score>0){ctx.beginPath();ctx.arc(cx,cy,r,-Math.PI/2,-Math.PI/2+(score/100)*Math.PI*2);ctx.strokeStyle=col;ctx.lineWidth=7;ctx.lineCap='round';ctx.stroke();}
  }
  /* Comparativo bar */
  const keys=allKeys().slice(0,6).reverse();
  const labels=keys.map(k=>{const[y,mo]=k.split('-');return new Date(+y,+mo-1).toLocaleDateString('pt-BR',{month:'short'})});
  NC.bar('cvcomp',labels,[
    {label:'Receita',data:keys.map(k=>getMD(k).inc.reduce((s,i)=>s+i.v,0)),color:'rgba(26,158,110,.75)'},
    {label:'Gastos',data:keys.map(k=>{const m=getMD(k);return m.bills.reduce((s,b)=>s+b.v,0)+m.cards.reduce((s,c)=>s+c.v,0);}),color:'rgba(201,64,64,.7)'},
    {label:'Investido',data:keys.map(k=>getMD(k).inv.reduce((s,i)=>s+i.v,0)),color:'rgba(109,58,199,.7)'},
  ]);
}

/* ── CONFIG ── */
function pgCfg(){
  return `
  <div class="card">
    <div class="st" style="margin-bottom:14px">🔒 Alterar Senha</div>
    <div style="display:flex;flex-direction:column;gap:10px;max-width:280px">
      <div><label class="lbl">Atual</label><input class="inp" type="password" id="pw-a" style="font-size:13px;padding:8px 10px"></div>
      <div><label class="lbl">Nova</label><input class="inp" type="password" id="pw-n" style="font-size:13px;padding:8px 10px"></div>
      <div><label class="lbl">Confirmar</label><input class="inp" type="password" id="pw-c" style="font-size:13px;padding:8px 10px"></div>
      <div id="pw-msg" style="font-size:11px;min-height:16px"></div>
      <button class="fa" style="background:var(--gold);color:#000;font-size:13px;padding:8px" onclick="changePass()">Salvar senha</button>
    </div>
  </div>
  <div class="card">
    <div class="st" style="margin-bottom:10px">💾 Backup</div>
    <div style="font-size:12px;color:var(--sub);margin-bottom:12px">Exporte mensalmente. Para sincronizar entre dispositivos manualmente: exporte em um e importe no outro.</div>
    <div class="fr" style="flex-wrap:wrap;gap:8px">
      <button class="fa" style="background:var(--s2);border:1px solid var(--b1);color:var(--text)" onclick="expData()">⬇ Exportar JSON</button>
      <button class="fa" style="background:var(--s2);border:1px solid var(--b1);color:var(--text)" onclick="expPDF()">📄 Exportar PDF</button>
      <button class="fa" style="background:var(--blue-dim);border:1px solid var(--blue-dim);color:var(--blue)" onclick="syncToCloud().then(()=>toast('Sincronizado!'))">⟳ Sincronizar agora</button>
      <label class="fa" style="background:var(--s2);border:1px solid var(--b1);color:var(--text);cursor:pointer">⬆ Importar JSON<input type="file" accept=".json" style="display:none" onchange="impData(this)"></label>
      <button class="fa" style="background:var(--red-dim);border:1px solid var(--red-dim);color:var(--red)" onclick="clearAll()">🗑 Apagar Tudo</button>
    </div>
  </div>
  <div class="card">
    <div class="sl" style="margin-bottom:6px">Sessão</div>
    <div style="font-size:12px;color:var(--sub);margin-bottom:10px">Timeout automático em 30 minutos de inatividade.</div>
    <button class="fa" style="background:var(--red-dim);border:1px solid var(--red-dim);color:var(--red)" onclick="logout()">Encerrar sessão</button>
  </div>`;
}

function changePass(){
  const a=document.getElementById('pw-a').value;
  const n=document.getElementById('pw-n').value;
  const c=document.getElementById('pw-c').value;
  const msg=document.getElementById('pw-msg');
  if(hashStr(a)!==getPass()){msg.style.color='var(--red)';msg.textContent='Senha atual incorreta.';return;}
  if(n.length<3){msg.style.color='var(--red)';msg.textContent='Mínimo 3 caracteres.';return;}
  if(n!==c){msg.style.color='var(--red)';msg.textContent='Senhas não coincidem.';return;}
  setPass(n);msg.style.color='var(--green)';msg.textContent='Senha alterada.';
  clearForm('pw-a','pw-n','pw-c');toast('Senha alterada');
}
function expData(){
  const a=document.createElement('a');
  a.href='data:application/json,'+encodeURIComponent(JSON.stringify(load(),null,2));
  a.download=`naomemath-backup-${new Date().toISOString().slice(0,10)}.json`;
  a.click();toast('Backup exportado');
}
function expPDF(){
  const el=document.getElementById('print-mes');
  if(el){const[y,mo]=curM.split('-');const l=new Date(+y,+mo-1).toLocaleDateString('pt-BR',{month:'long',year:'numeric'});el.textContent=l.charAt(0).toUpperCase()+l.slice(1);}
  toast('Abrindo impressão...');setTimeout(()=>window.print(),300);
}
function impData(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{try{const d=JSON.parse(e.target.result);_cache=d;localStorage.setItem('nmm_data',JSON.stringify(d));bSel();render();toast('Dados importados');}catch{toast('Arquivo inválido','err');}};
  reader.readAsText(file);
}
function clearAll(){
  if(!confirm('Apagar TODOS os dados? Esta ação é irreversível.'))return;
  _cache=null;localStorage.removeItem('nmm_data');bSel();render();toast('Dados apagados');
}


/* ── CONTAS BANCÁRIAS / SALDOS ── */
function getContas(){return loadGlobal().contas||[];}
function saveContas(contas){const g=loadGlobal();g.contas=contas;saveGlobal(g);}

function addConta(){
  const nome=document.getElementById('cb-nome').value.trim();
  const saldo=parseFloat(document.getElementById('cb-saldo').value);
  const tipo=document.getElementById('cb-tipo').value;
  const data=document.getElementById('cb-data').value;
  if(!nome||isNaN(saldo)){toast('Preencha nome e saldo','err');return;}
  const contas=getContas();
  const existing=contas.find(c=>c.nome.toLowerCase()===nome.toLowerCase());
  if(existing){
    /* Atualizar saldo existente */
    existing.saldo=saldo;existing.data=data||existing.data;
    saveContas(contas);toast('Saldo atualizado');render();return;
  }
  contas.push({id:uid(),nome,saldo,tipo,data:data||new Date().toISOString().slice(0,10)});
  saveContas(contas);clearForm('cb-nome','cb-saldo','cb-data');toast('Conta adicionada');render();
}

function delConta(id){
  if(!confirm('Remover esta conta?'))return;
  saveContas(getContas().filter(c=>c.id!==id));toast('Conta removida');render();
}

function atualizarSaldo(id){
  const contas=getContas();const c=contas.find(x=>x.id===id);if(!c)return;
  const novo=parseFloat(prompt('Novo saldo de '+c.nome+':',c.saldo));
  if(isNaN(novo))return;
  c.saldo=novo;c.data=new Date().toISOString().slice(0,10);
  saveContas(contas);toast('Saldo atualizado');render();
}

/* ── ERROR BOUNDARY ── */
window.addEventListener('error',function(e){
  console.error('[naomemath]',e.error);
  const pg=document.getElementById('pg');
  if(pg&&!pg.innerHTML){
    pg.innerHTML='<div class="card" style="margin:20px;padding:24px;text-align:center"><div style="font-size:13px;font-weight:600;color:var(--red);margin-bottom:8px">Algo deu errado</div><button class="fa" style="background:var(--gold);color:#000;margin-top:8px" onclick="render()">Tentar novamente</button></div>';
  }
});

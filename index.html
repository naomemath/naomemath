<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>naomemath</title>
<script>(function(){if(localStorage.getItem('nmm_theme')==='light')document.documentElement.setAttribute('data-theme','light')})()</script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a12;--s1:#0f0f1c;--s2:#141421;--s3:#1a1a2a;--s4:#1f1f32;
  --b1:rgba(255,255,255,.06);--b2:rgba(255,255,255,.10);--b3:rgba(255,255,255,.16);
  --gold:#C68A14;--gold-dim:rgba(198,138,20,.12);--gold-glow:rgba(198,138,20,.06);
  --green:#1A9E6E;--green-dim:rgba(26,158,110,.12);--green-soft:rgba(26,158,110,.06);
  --red:#C94040;--red-dim:rgba(201,64,64,.12);--red-soft:rgba(201,64,64,.06);
  --blue:#3B7DE8;--blue-dim:rgba(59,125,232,.12);
  --purple:#6D3AC7;--purple-dim:rgba(109,58,199,.12);
  --teal:#0B85A0;--teal-dim:rgba(11,133,160,.12);
  --orange:#EA580C;
  --text:#eaeaf4;--sub:#6e6e8a;--dim:#38384e;--muted:#24243a;
  --fs-2xs:10px;--fs-xs:11px;--fs-sm:12px;--fs-base:13px;--fs-md:14px;
  --fs-lg:16px;--fs-xl:20px;--fs-2xl:26px;--fs-3xl:34px;
  --r-xs:6px;--r-sm:8px;--r:12px;--r-lg:16px;--r-xl:20px;--r-full:999px;
  --sh-sm:0 1px 3px rgba(0,0,0,.2);
  --sh:0 2px 12px rgba(0,0,0,.28),0 1px 2px rgba(0,0,0,.16);
  --sh-md:0 4px 20px rgba(0,0,0,.32),0 1px 4px rgba(0,0,0,.16);
  --sh-lg:0 8px 40px rgba(0,0,0,.38);
  --ease:cubic-bezier(.4,0,.2,1);--ease-out:cubic-bezier(0,.6,.4,1);
  --spring:cubic-bezier(.34,1.4,.64,1);
  --fast:100ms;--dur:180ms;--slow:320ms;
  --glass:rgba(10,10,18,.88);
  --sidebar-w:224px;
}
[data-theme="light"]{
  --bg:#f3f3f8;--s1:#fff;--s2:#f0f0f6;--s3:#e8e8f2;--s4:#e0e0ec;
  --b1:rgba(0,0,0,.07);--b2:rgba(0,0,0,.12);--b3:rgba(0,0,0,.18);
  --gold:#a67010;--gold-dim:rgba(166,112,16,.10);--gold-glow:rgba(166,112,16,.05);
  --green:#0a7a52;--green-dim:rgba(10,122,82,.10);--green-soft:rgba(10,122,82,.05);
  --red:#b02020;--red-dim:rgba(176,32,32,.10);--red-soft:rgba(176,32,32,.05);
  --blue:#1d4ed8;--blue-dim:rgba(29,78,216,.10);
  --purple:#5b21b6;--purple-dim:rgba(91,33,182,.10);
  --teal:#0369a1;--teal-dim:rgba(3,105,161,.10);
  --text:#111120;--sub:#6a6a80;--dim:#c0c0d0;--muted:#e8e8f0;
  --glass:rgba(255,255,255,.9);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:var(--fs-base);-webkit-font-smoothing:antialiased;overflow:hidden}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:var(--s4);border-radius:99px}
::-webkit-scrollbar-track{background:transparent}
button,input,select,textarea{font-family:inherit;font-size:inherit}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
:focus-visible{outline:2px solid rgba(198,138,20,.5);outline-offset:2px;border-radius:var(--r-xs)}
:focus:not(:focus-visible){outline:none}

/* LOGIN */
#login-screen{position:fixed;inset:0;z-index:999;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(ellipse 60% 40% at 50% 0%,rgba(198,138,20,.06),transparent 60%),var(--bg)}
.lbox{background:var(--s1);border:1px solid var(--b2);border-radius:var(--r-xl);padding:36px;
  width:320px;max-width:90vw;box-shadow:var(--sh-lg);display:flex;flex-direction:column;gap:20px}
.lbrand{text-align:center}
.lbrand h1{font-family:'Syne',sans-serif;font-size:var(--fs-2xl);font-weight:800;letter-spacing:-1.5px}
.lbrand h1 em{color:var(--gold);font-style:normal}
.lbrand p{font-size:10px;color:var(--sub);letter-spacing:3px;text-transform:uppercase;margin-top:6px;opacity:.7}
.lfield label{display:block;font-size:10px;color:var(--sub);font-weight:600;letter-spacing:.8px;text-transform:uppercase;margin-bottom:5px}
.lfield input{width:100%;background:var(--s2);border:1px solid var(--b2);border-radius:var(--r-sm);
  padding:11px 13px;color:var(--text);font-size:var(--fs-md);outline:none;
  transition:border-color var(--dur) var(--ease),box-shadow var(--dur) var(--ease)}
.lfield input:focus{border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-glow)}
.lfield input::placeholder{color:var(--dim)}
.lbtn{width:100%;background:var(--gold);color:#000;border:none;border-radius:var(--r-sm);
  padding:12px;font-size:var(--fs-base);font-weight:700;cursor:pointer;transition:opacity var(--dur) var(--ease)}
.lbtn:hover{opacity:.88}
.lerr{color:var(--red);font-size:11px;text-align:center;display:none}
.lhint{font-size:11px;color:var(--sub);text-align:center;line-height:1.8}

/* APP SHELL */
#app{display:none;height:100vh;flex-direction:row}

/* SIDEBAR */
.sidebar{width:var(--sidebar-w);flex-shrink:0;background:var(--s1);border-right:1px solid var(--b1);
  display:flex;flex-direction:column;height:100vh;overflow-y:auto;overflow-x:hidden;position:relative;z-index:100}
.sb-logo{padding:20px 18px 14px;font-family:'Syne',sans-serif;font-size:15px;font-weight:800;letter-spacing:-.4px;flex-shrink:0}
.sb-logo em{color:var(--gold);font-style:normal}
.sb-logo span{font-size:9px;color:var(--sub);display:block;letter-spacing:2px;text-transform:uppercase;margin-top:1px;opacity:.6}
.sb-month{margin:0 10px 8px;padding:8px 10px;background:var(--s2);border:1px solid var(--b1);
  border-radius:var(--r-sm);display:flex;align-items:center;gap:4px}
.sb-month button{background:none;border:none;color:var(--sub);cursor:pointer;font-size:16px;padding:0 3px;line-height:1;transition:color var(--fast) var(--ease)}
.sb-month button:hover{color:var(--text)}
.sb-month select{flex:1;background:none;border:none;color:var(--text);font-size:11px;font-weight:600;outline:none;cursor:pointer;font-family:inherit}
.sb-month .sb-add{background:var(--gold);color:#000;border:none;border-radius:4px;font-size:13px;font-weight:700;width:20px;height:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.sb-balance{margin:0 10px 12px;padding:12px;background:var(--gold-dim);border:1px solid rgba(198,138,20,.2);border-radius:var(--r-sm)}
.sb-balance .bal-lbl{font-size:9px;color:var(--gold);font-weight:700;letter-spacing:.8px;text-transform:uppercase;opacity:.8}
.sb-balance .bal-val{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:-.4px;margin-top:3px}
.sb-balance .bal-sub{font-size:9px;color:var(--sub);margin-top:2px}
.sb-sec{padding:0 10px 2px;margin-top:8px}
.sb-sec-lbl{font-size:9px;color:var(--sub);font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:0 8px 6px;opacity:.55}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--r-sm);
  font-size:var(--fs-sm);font-weight:500;color:var(--sub);cursor:pointer;
  transition:all var(--fast) var(--ease);text-decoration:none;border:none;background:none;width:100%;position:relative}
.nav-item:hover{background:var(--s2);color:var(--text)}
.nav-item.active{background:var(--gold-dim);color:var(--gold);font-weight:600}
.nav-icon{font-size:14px;width:18px;text-align:center;flex-shrink:0;opacity:.7}
.nav-item.active .nav-icon{opacity:1}
.nav-badge{background:var(--red);color:#fff;border-radius:var(--r-full);font-size:9px;padding:1px 5px;font-weight:700;margin-left:auto}
.sb-footer{margin-top:auto;padding:12px 10px;border-top:1px solid var(--b1);display:flex;align-items:center;gap:8px}
.sb-user{flex:1;min-width:0}
.sb-user-name{font-size:12px;font-weight:600}
.sb-user-sub{font-size:10px;color:var(--sub)}
.sb-footer-btns{display:flex;gap:4px}
.icon-btn{background:none;border:none;color:var(--sub);cursor:pointer;font-size:14px;padding:5px;border-radius:var(--r-xs);transition:color var(--fast),background var(--fast)}
.icon-btn:hover{color:var(--text);background:var(--s2)}

/* MAIN */
.main{flex:1;min-width:0;display:flex;flex-direction:column;background:var(--bg);overflow:hidden}
.main-hdr{padding:14px 24px;border-bottom:1px solid var(--b1);background:var(--glass);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);display:flex;align-items:center;gap:12px;flex-shrink:0}
.main-title{font-family:'Syne',sans-serif;font-size:var(--fs-xl);font-weight:800;letter-spacing:-.4px;flex:1}
.main-sub{font-size:var(--fs-xs);color:var(--sub);margin-top:1px}
.hdr-actions{display:flex;gap:8px;align-items:center}
.main-scroll{flex:1;overflow-y:auto;overflow-x:hidden;padding:20px 24px}

/* COMPONENTS */
.card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);padding:16px;transition:border-color var(--dur) var(--ease)}
.card:hover{border-color:var(--b2)}
[data-theme="light"] .card{box-shadow:var(--sh-sm)}
.card-green{border-left:3px solid var(--green)}
.card-red{border-left:3px solid var(--red)}
.card-blue{border-left:3px solid var(--blue)}
.card-purple{border-left:3px solid var(--purple)}
.card-gold{border-left:3px solid var(--gold)}
.card-teal{border-left:3px solid var(--teal)}

.kpi-lbl{font-size:10px;color:var(--sub);font-weight:600;letter-spacing:.5px;text-transform:uppercase;margin-bottom:4px}
.kpi-val{font-family:'Syne',sans-serif;font-size:var(--fs-xl);font-weight:800;letter-spacing:-.4px;font-variant-numeric:tabular-nums;line-height:1.1}
.kpi-val.lg{font-size:var(--fs-3xl)}
.kpi-sub{font-size:var(--fs-xs);color:var(--sub);margin-top:4px}

.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.g-auto{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px}

.sec-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.sec-title{font-size:var(--fs-md);font-weight:700;letter-spacing:-.2px}

.btn{border:none;border-radius:var(--r-sm);padding:8px 16px;font-size:var(--fs-sm);font-weight:600;cursor:pointer;transition:opacity var(--fast),transform var(--fast);display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
.btn:hover{opacity:.85}
.btn:active{opacity:.65;transform:scale(.98)}
.btn-primary{background:var(--gold);color:#000}
.btn-ghost{background:var(--s2);color:var(--text);border:1px solid var(--b1)}
.btn-green{background:var(--green-dim);color:var(--green);border:1px solid var(--green-dim)}
.btn-red{background:var(--red-dim);color:var(--red);border:1px solid var(--red-dim)}
.btn-sm{padding:5px 11px;font-size:var(--fs-xs)}

.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:10px;color:var(--sub);font-weight:600;letter-spacing:.6px;text-transform:uppercase}
.inp{background:var(--s2);border:1px solid var(--b1);border-radius:var(--r-sm);padding:9px 12px;color:var(--text);font-size:var(--fs-base);outline:none;width:100%;transition:border-color var(--dur),box-shadow var(--dur);font-family:inherit}
.inp:focus{border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-glow)}
.inp::placeholder{color:var(--dim)}
.sel{background:var(--s2);border:1px solid var(--b1);border-radius:var(--r-sm);padding:9px 12px;color:var(--text);font-size:var(--fs-base);outline:none;cursor:pointer;font-family:inherit;width:100%}
.sel:focus{border-color:var(--gold)}
.textarea{background:var(--s2);border:1px solid var(--b1);border-radius:var(--r-sm);padding:9px 12px;color:var(--text);font-size:var(--fs-base);outline:none;width:100%;resize:vertical;min-height:64px;font-family:inherit;transition:border-color var(--dur)}
.textarea:focus{border-color:var(--gold)}
.inp-row{display:flex;gap:10px;flex-wrap:wrap}
.inp-row .field{flex:1;min-width:110px}

.toggle{display:flex;align-items:center;gap:8px;cursor:pointer;font-size:var(--fs-sm)}
.toggle input[type=checkbox]{width:0;opacity:0;position:absolute}
.toggle-track{width:32px;height:18px;background:var(--s3);border-radius:99px;position:relative;transition:background var(--dur);flex-shrink:0;border:1px solid var(--b2)}
.toggle input:checked+.toggle-track{background:var(--green);border-color:var(--green)}
.toggle-track::after{content:'';position:absolute;left:2px;top:2px;width:12px;height:12px;background:#fff;border-radius:50%;transition:transform var(--dur) var(--spring)}
.toggle input:checked+.toggle-track::after{transform:translateX(14px)}

.badge{border-radius:var(--r-full);padding:2px 8px;font-size:10px;font-weight:700;display:inline-flex;align-items:center;white-space:nowrap}
.bg-green{background:var(--green-dim);color:var(--green)}
.bg-red{background:var(--red-dim);color:var(--red)}
.bg-gold{background:var(--gold-dim);color:var(--gold)}
.bg-blue{background:var(--blue-dim);color:var(--blue)}
.bg-purple{background:var(--purple-dim);color:var(--purple)}
.bg-teal{background:var(--teal-dim);color:var(--teal)}
.bg-sub{background:var(--s3);color:var(--sub)}
.ent-pf{background:var(--blue-dim);color:var(--blue);font-size:9px;font-weight:800;letter-spacing:1px;text-transform:uppercase;padding:1px 6px;border-radius:3px}
.ent-pj{background:var(--purple-dim);color:var(--purple);font-size:9px;font-weight:800;letter-spacing:1px;text-transform:uppercase;padding:1px 6px;border-radius:3px}

/* TRANSACTION LIST */
.tx-list{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);overflow:hidden}
[data-theme="light"] .tx-list{box-shadow:var(--sh-sm)}
.tx-hdr{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;border-bottom:1px solid var(--b1);background:var(--s2)}
.tx-hdr-title{font-weight:700;font-size:var(--fs-base);display:flex;align-items:center;gap:8px}
.tx-hdr-total{font-weight:700;font-size:var(--fs-base);font-variant-numeric:tabular-nums}
.tx-item{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--b1);transition:background var(--fast);cursor:pointer;min-height:48px}
.tx-item:last-child{border-bottom:none}
.tx-item:hover{background:var(--s2)}
.tx-item.done{opacity:.38}
.tx-item.done .tx-desc{text-decoration:line-through}
.tx-check{width:20px;height:20px;min-width:20px;border-radius:50%;border:1.5px solid var(--b3);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all var(--dur);flex-shrink:0}
.tx-check.ok{border-color:currentColor;background:currentColor;animation:chkPop .2s var(--spring) both}
@keyframes chkPop{0%{transform:scale(.7)}60%{transform:scale(1.15)}100%{transform:scale(1)}}
.tx-check svg{width:9px;height:9px;stroke:#000;stroke-width:2.5;fill:none;display:none;stroke-linecap:round;stroke-linejoin:round}
.tx-check.ok svg{display:block}
.tx-pill{width:4px;height:32px;border-radius:99px;flex-shrink:0}
.tp-receita{background:var(--green);opacity:.7}
.tp-despesa{background:var(--red);opacity:.7}
.tp-transferencia{background:var(--teal);opacity:.7}
.tp-investimento{background:var(--purple);opacity:.7}
.tx-info{flex:1;min-width:0}
.tx-desc{font-size:var(--fs-base);font-weight:500;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tx-meta{font-size:10px;color:var(--sub);margin-top:3px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.tx-amt{font-weight:700;font-size:var(--fs-base);white-space:nowrap;font-variant-numeric:tabular-nums;letter-spacing:-.2px}
.tx-acts{display:flex;gap:2px;opacity:0;transition:opacity var(--fast)}
.tx-item:hover .tx-acts{opacity:1}
.tx-act{background:none;border:none;color:var(--dim);cursor:pointer;font-size:13px;padding:3px 5px;border-radius:4px;transition:color var(--fast)}
.tx-act:hover{color:var(--text)}
.tx-act.del:hover{color:var(--red)}
.tx-empty{padding:24px;text-align:center;color:var(--dim);font-size:var(--fs-sm)}

/* ACCOUNT CARD */
.acct-card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);padding:16px;cursor:pointer;transition:border-color var(--dur),transform var(--dur)}
.acct-card:hover{border-color:var(--b2);transform:translateY(-1px)}
[data-theme="light"] .acct-card{box-shadow:var(--sh-sm)}
.acct-ent{font-size:9px;font-weight:800;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.acct-ent.pf{color:var(--blue)}
.acct-ent.pj{color:var(--purple)}
.acct-name{font-size:var(--fs-md);font-weight:700;margin-bottom:2px}
.acct-type{font-size:10px;color:var(--sub);margin-bottom:10px}
.acct-bal-lbl{font-size:9px;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
.acct-bal{font-family:'Syne',sans-serif;font-size:var(--fs-xl);font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:-.3px}

/* MODAL */
.overlay{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;padding:20px}
.overlay.open{display:flex}
.modal{background:var(--s1);border:1px solid var(--b2);border-radius:var(--r-xl);padding:28px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:var(--sh-lg);animation:mIn var(--slow) var(--spring) both}
@keyframes mIn{from{opacity:0;transform:scale(.95) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px}
.modal-title{font-family:'Syne',sans-serif;font-size:var(--fs-lg);font-weight:800;letter-spacing:-.3px}
.modal-close{background:none;border:none;color:var(--sub);cursor:pointer;font-size:20px;padding:2px 6px;border-radius:var(--r-xs)}
.modal-close:hover{color:var(--text);background:var(--s2)}
.modal-body{display:flex;flex-direction:column;gap:14px}
.modal-ftr{display:flex;gap:10px;justify-content:flex-end;margin-top:22px}

/* PROGRESS */
.prog-track{background:var(--s3);border-radius:99px;height:4px;overflow:hidden;margin-top:8px}
.prog-fill{height:100%;border-radius:99px;transition:width .8s var(--ease-out)}

/* ALERTS */
.alert{border-radius:var(--r-sm);padding:10px 14px;font-size:var(--fs-sm);font-weight:500;display:flex;align-items:flex-start;gap:8px;border:1px solid;line-height:1.5;margin-bottom:10px}
.alert-red{background:var(--red-soft);border-color:var(--red-dim);color:var(--red)}
.alert-gold{background:var(--gold-glow);border-color:var(--gold-dim);color:var(--gold)}
.alert-green{background:var(--green-soft);border-color:var(--green-dim);color:var(--green)}

/* TABLE */
.tbl-wrap{overflow-x:auto}
table.dtbl{width:100%;border-collapse:collapse;font-size:var(--fs-sm)}
table.dtbl th{text-align:left;font-size:10px;color:var(--sub);font-weight:700;letter-spacing:.6px;text-transform:uppercase;padding:0 12px 10px 0;border-bottom:1px solid var(--b1)}
table.dtbl td{padding:10px 12px 10px 0;border-bottom:1px solid var(--b1);vertical-align:middle}
table.dtbl tr:last-child td{border:none}

/* CHART */
.chart-wrap{position:relative;width:100%}
.ch-sm{height:160px}.ch-md{height:210px}.ch-lg{height:260px}

/* TOAST */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(6px);background:var(--s2);border:1px solid var(--b2);border-radius:var(--r);padding:9px 18px;font-size:var(--fs-sm);font-weight:600;z-index:9999;opacity:0;pointer-events:none;white-space:nowrap;box-shadow:var(--sh-md);transition:opacity var(--dur),transform var(--dur)}

/* RESPONSIVE */
@media(max-width:768px){
  :root{--sidebar-w:0px}
  .sidebar{position:fixed;left:-240px;width:240px;z-index:400;transition:left var(--slow);box-shadow:var(--sh-lg)}
  .sidebar.open{left:0}
  .main-scroll{padding:16px}

<script>
'use strict';
/* ════════════════════════════════════════
   NAOMEMATH v3 — SISTEMA PF + PJ
════════════════════════════════════════ */

/* ── UTILS ── */
const fmt=v=>isNaN(+v)?'R$ 0,00':(+v).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
const fmtK=v=>{const n=+v;if(n>=1e6)return'R$'+(n/1e6).toFixed(1)+'M';if(n>=1000)return'R$'+(n/1000).toFixed(0)+'k';return fmt(n)};
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const san=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const CHK=`<svg viewBox="0 0 12 12"><polyline points="1.5,6.5 4.5,9.5 10.5,2.5"/></svg>`;
const mLabel=k=>{const[y,m]=k.split('-');const s=new Date(+y,+m-1).toLocaleDateString('pt-BR',{month:'long',year:'numeric'});return s[0].toUpperCase()+s.slice(1)};
const today=()=>new Date().toISOString().slice(0,10);
const curMonthKey=()=>{const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`};

/* ── AUTH ── */
const hashStr=s=>{let h=5381;for(let i=0;i<s.length;i++)h=(h*33^s.charCodeAt(i))>>>0;return h.toString(36)};
const getPassHash=()=>localStorage.getItem('nmm_passh')||hashStr('1234');
const setPassHash=s=>localStorage.setItem('nmm_passh',hashStr(s));

function doLogin(){
  const now=Date.now();
  const att=JSON.parse(sessionStorage.getItem('_la')||'[]').filter(t=>now-t<30000);
  if(att.length>=5){showLerr('Muitas tentativas. Aguarde 30s.');return;}
  if(hashStr(document.getElementById('pwd').value)!==getPassHash()){
    att.push(now);sessionStorage.setItem('_la',JSON.stringify(att));
    showLerr('Senha incorreta.');document.getElementById('pwd').value='';return;
  }
  sessionStorage.removeItem('_la');
  document.getElementById('login-screen').style.display='none';
  const a=document.getElementById('app');a.style.display='flex';
  applyTheme(getTheme());startSession();initApp();syncFromCloud();
}
function showLerr(m){const e=document.getElementById('lerr');e.textContent=m;e.style.display='block'}
function doLogout(){
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('app').style.display='none';
  document.getElementById('pwd').value='';
  document.getElementById('lerr').style.display='none';
  clearTimeout(_sessTimer);
}

/* ── SESSÃO ── */
let _sessTimer=null;
function startSession(){
  clearTimeout(_sessTimer);
  _sessTimer=setTimeout(()=>{toast('Sessão encerrada por inatividade','warn');setTimeout(doLogout,1500)},30*60*1000);
}
['click','keydown','touchstart'].forEach(e=>document.addEventListener(e,startSession,{passive:true}));

/* ── TEMA ── */
function getTheme(){return localStorage.getItem('nmm_theme')||'dark'}
function applyTheme(t){
  document.documentElement.setAttribute('data-theme',t==='light'?'light':'');
  const b=document.getElementById('theme-btn');if(b)b.textContent=t==='light'?'☽':'☀';
}
function toggleTheme(){const n=getTheme()==='dark'?'light':'dark';localStorage.setItem('nmm_theme',n);applyTheme(n)}

/* ════════════════════════════════════════
   DADOS
   
   __global: { contas:[], metas:[] }
   
   YYYY-MM: { lancamentos:[] }
   
   lancamento: {
     id, tipo: receita|despesa|transferencia|investimento,
     descricao, valor, data,
     conta_id,         ← conta de origem/destino
     conta_dest_id,    ← só em transferencia (conta que recebe)
     entidade: PF|PJ,
     categoria,
     recorrente, parcelas_total, parcela_atual,
     notas, ok,
     espelho_id        ← id do lançamento par (transferência)
   }
   
   conta: { id, nome, tipo, entidade:PF|PJ, saldo_inicial, cor, ativa }
   meta:  { id, nome, alvo, poupado, categoria, prazo, criada }
════════════════════════════════════════ */

let _cache=null;
let _saldoCache={}; // cache de saldos por conta+mês
let _totaisCache={}; // cache de totais por mês

function invalidarCache(){_saldoCache={};_totaisCache={}}
const loadData=()=>{if(_cache)return _cache;try{_cache=JSON.parse(localStorage.getItem('nmm_v3')||'{}')}catch{_cache={}}return _cache};
const saveData=d=>{_cache=d;localStorage.setItem('nmm_v3',JSON.stringify(d));scheduleSync()};

function getGlobal(){const d=loadData();if(!d.__global)d.__global={contas:[],metas:[]};return d.__global}
function saveGlobal(g){const d=loadData();d.__global=g;saveData(d)}

function getMonthData(k){const d=loadData();if(!d[k])d[k]={lancamentos:[]};if(!d[k].lancamentos)d[k].lancamentos=[];return d[k]}
function saveMonthData(k,m){const d=loadData();d[k]=m;saveData(d)}

const allMonthKeys=()=>Object.keys(loadData()).filter(k=>/^\d{4}-\d{2}$/.test(k)).sort((a,b)=>b.localeCompare(a));
const getLancs=k=>getMonthData(k).lancamentos||[];

function addLanc(k,l){const m=getMonthData(k);m.lancamentos=[...(m.lancamentos||[]),l];saveMonthData(k,m)}
function updateLanc(k,id,ch){const m=getMonthData(k);const i=m.lancamentos.findIndex(l=>l.id===id);if(i>=0){m.lancamentos[i]={...m.lancamentos[i],...ch};saveMonthData(k,m)}}
function deleteLanc(k,id){
  const m=getMonthData(k);
  const l=m.lancamentos.find(x=>x.id===id);
  // Remover par de transferência também
  if(l&&l.espelho_id)m.lancamentos=m.lancamentos.filter(x=>x.id!==id&&x.id!==l.espelho_id);
  else m.lancamentos=m.lancamentos.filter(x=>x.id!==id&&x.espelho_id!==id);
  saveMonthData(k,m);
}

/* ── CÁLCULOS ── */
function calcSaldoConta(cid,ateM){
  const ckey=cid+'|'+(ateM||'all');
  if(_saldoCache[ckey]!==undefined)return _saldoCache[ckey];
  const g=getGlobal();const c=g.contas.find(x=>x.id===cid);if(!c)return 0;
  let s=c.saldo_inicial||0;
  const meses=ateM?allMonthKeys().filter(k=>k<=ateM):allMonthKeys();
  meses.forEach(k=>getLancs(k).forEach(l=>{
    if(l.espelho_id)return;
    if(l.conta_id===cid){
      if(l.tipo==='receita')s+=l.valor;
      else if(l.tipo==='despesa'||l.tipo==='investimento')s-=l.valor;
      else if(l.tipo==='transferencia')s-=l.valor;
    }
    if(l.conta_dest_id===cid&&l.tipo==='transferencia')s+=l.valor;
  }));
  _saldoCache[ckey]=s;
  return s;
}

function calcTotaisMes(k){
  const lancs=getLancs(k);
  const t={receita:0,despesa:0,transf:0,inv:0,recPF:0,recPJ:0};
  lancs.filter(l=>!l.espelho_id).forEach(l=>{
    if(l.tipo==='receita'){t.receita+=l.valor;if(l.entidade==='PJ')t.recPJ+=l.valor;else t.recPF+=l.valor}
    else if(l.tipo==='despesa')t.despesa+=l.valor;
    else if(l.tipo==='transferencia')t.transf+=l.valor;
    else if(l.tipo==='investimento')t.inv+=l.valor;
  });
  _totaisCache[k]=t;
  return t;
}

function calcSaldoMes(k){
  let s=0;
  getLancs(k).filter(l=>!l.espelho_id).forEach(l=>{
    if(l.tipo==='receita')s+=l.valor;
    else if(l.tipo==='despesa'||l.tipo==='investimento')s-=l.valor;
    // transferência interna não afeta saldo consolidado
  });
  return s;
}

function calcSaldoEntidade(ent,ateM){
  const g=getGlobal();
  return g.contas.filter(c=>c.entidade===ent&&c.ativa!==false).reduce((s,c)=>s+calcSaldoConta(c.id,ateM),0);
}

/* ════════════════════════════════════════
   SUPABASE SYNC

const SB_URL='https://fsdagfpykwfhjiqqahcp.supabase.co/rest/v1/';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZzZGFnZnB5a3dmaGppcXFhaGNwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1MDA4NDUsImV4cCI6MjA5NTA3Njg0NX0.G1lluyG10pAG-yINTIFImnS9Q66q_y4U_agIdPFAdPs';
let _syncTimer=null;

function setSyncUI(s){
  const e=document.getElementById('sync-st');if(!e)return;
  e.textContent={ok:'✓ sincronizado',syncing:'⟳ sincronizando...',error:'⚠ offline',idle:''}[s]||'';
}
async function sbFetch(m,p,b){
  try{
    const r=await fetch(SB_URL+p,{method:m,headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':m==='POST'?'resolution=merge-duplicates,return=minimal':''},body:b?JSON.stringify(b):undefined});
    if(!r.ok)throw new Error(r.status);return m==='GET'?r.json():true;
  }catch(e){console.warn('[sync]',e.message);return null}
}
async function syncToCloud(){
  if(!navigator.onLine){setSyncUI('error');return}
  setSyncUI('syncing');
  const ok=await sbFetch('POST','dados',{chave:'nmm_v3',valor:JSON.stringify(loadData()),atualizado_em:new Date().toISOString()});
  setSyncUI(ok?'ok':'error');
}
async function syncFromCloud(){
  if(!navigator.onLine)return;setSyncUI('syncing');
  const rows=await sbFetch('GET','dados?chave=eq.nmm_v3&select=valor,atualizado_em');
  if(!rows||!rows.length){setSyncUI('idle');return}
  try{
    const cloud=JSON.parse(rows[0].valor);const local=loadData();
    const cK=Object.keys(cloud).filter(k=>/^\d{4}-\d{2}$/.test(k)).length;
    const lK=Object.keys(local).filter(k=>/^\d{4}-\d{2}$/.test(k)).length;
    if(cK>lK){_cache=cloud;localStorage.setItem('nmm_v3',rows[0].valor);renderPage()}
    setSyncUI('ok');
  }catch{setSyncUI('error')}
}
function scheduleSync(){clearTimeout(_syncTimer);_syncTimer=setTimeout(syncToCloud,2000)}
window.addEventListener('online',()=>syncFromCloud());
window.addEventListener('offline',()=>setSyncUI('error'));

/* ════════════════════════════════════════
   APP STATE + NAV
════════════════════════════════════════ */
let curPage='dashboard',curMonth=curMonthKey(),editLancId=null;

function initApp(){
  applyTheme(getTheme());
  // Schema versioning
  const d=loadData();
  if(!d.__version){
    d.__version=1;
    if(!d.__global)d.__global={contas:[],metas:[]};
    _cache=d;localStorage.setItem('nmm_v3',JSON.stringify(d));
  }
  if(!allMonthKeys().includes(curMonth))saveMonthData(curMonth,{lancamentos:[]});
  const g=getGlobal();
  if(!g.contas.length){
    g.contas=[
      {id:uid(),nome:'Nubank PF',tipo:'digital',entidade:'PF',saldo_inicial:0,cor:'#6D3AC7',ativa:true},
      {id:uid(),nome:'Santander PF',tipo:'corrente',entidade:'PF',saldo_inicial:0,cor:'#C94040',ativa:true},
      {id:uid(),nome:'Conta PJ',tipo:'pj',entidade:'PJ',saldo_inicial:0,cor:'#3B7DE8',ativa:true},
    ];
    saveGlobal(g);
  }
  buildMonthSel();updateSidebar();goPage('dashboard');
}

function buildMonthSel(){
  const sel=document.getElementById('msel');if(!sel)return;
  const keys=allMonthKeys();if(!keys.includes(curMonth))keys.unshift(curMonth);
  sel.innerHTML=keys.map(k=>`<option value="${k}" ${k===curMonth?'selected':''}>${mLabel(k)}</option>`).join('');
}
function changeMonth(v){curMonth=v;updateSidebar();renderPage()}
function navMonth(dir){
  const keys=allMonthKeys();const i=keys.indexOf(curMonth);const n=i+(-dir);
  if(n>=0&&n<keys.length){curMonth=keys[n];document.getElementById('msel').value=curMonth;updateSidebar();renderPage()}
}
function addMonth(){
  const keys=allMonthKeys();
  for(let i=0;i<24;i++){
    const d=new Date();d.setMonth(d.getMonth()+i);
    const k=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    if(!keys.includes(k)){
      const prev=keys[0];
      if(prev){
        const rec=getLancs(prev).filter(l=>l.recorrente&&!l.espelho_id).map(l=>({
          ...l,id:uid(),ok:false,data:(l.data&&l.data.length>=8)?k+'-'+l.data.slice(8):k+'-01',
          parcela_atual:l.parcelas_total>1?(l.parcela_atual||1)+1:l.parcela_atual
        })).filter(l=>!l.parcelas_total||l.parcela_atual<=l.parcelas_total);
        saveMonthData(k,{lancamentos:rec});
      }else saveMonthData(k,{lancamentos:[]});
      curMonth=k;buildMonthSel();document.getElementById('msel').value=k;
      updateSidebar();renderPage();toast('Mês criado com recorrências');return;
    }
  }
}

function updateSidebar(){
  const s=calcSaldoMes(curMonth);
  const v=document.getElementById('sb-val');if(v){v.textContent=fmt(s);v.style.color=s>=0?'var(--green)':'var(--red)'}

/* ── TOAST ── */
function toast(msg,type){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.style.color=type==='err'?'var(--red)':type==='warn'?'var(--gold)':'var(--green)';
  t.style.borderColor=type==='err'?'rgba(201,64,64,.3)':type==='warn'?'rgba(198,138,20,.3)':'rgba(26,158,110,.3)';
  t.style.opacity='1';t.style.transform='translateX(-50%) translateY(0)';
  clearTimeout(t._t);t._t=setTimeout(()=>{t.style.opacity='0';t.style.transform='translateX(-50%) translateY(6px)'},2400);
}

function openLanc(tipo,contaId,existing){
  tipo=tipo||'despesa';editLancId=existing?existing.id:null;
  const g=getGlobal();const contas=g.contas.filter(c=>c.ativa!==false);
  const cPF=contas.filter(c=>c.entidade==='PF');
  const cPJ=contas.filter(c=>c.entidade==='PJ');
  const allOpts=(sel)=>[
    cPF.length?`<optgroup label="— PF —">${cPF.map(c=>`<option value="${c.id}" ${c.id===sel?'selected':''}>${san(c.nome)}</option>`).join('')}</optgroup>`:'',
    cPJ.length?`<optgroup label="— PJ —">${cPJ.map(c=>`<option value="${c.id}" ${c.id===sel?'selected':''}>${san(c.nome)}</option>`).join('')}</optgroup>`:'',
  ].join('');
  const pfOpts=(sel)=>cPF.map(c=>`<option value="${c.id}" ${c.id===sel?'selected':''}>${san(c.nome)}</option>`).join('');
  const ttls={receita:'Receita',despesa:'Despesa',transferencia:'Transferência PJ → PF',investimento:'Investimento'};
  document.getElementById('m-lanc-ttl').textContent=(existing?'Editar ':'Nova ')+(ttls[tipo]||'Lançamento');
  const ex=existing||{};
  const defConta=contaId||ex.conta_id||(tipo==='transferencia'?cPJ[0]?.id:cPF[0]?.id)||contas[0]?.id||'';
  const defDest=ex.conta_dest_id||cPF[0]?.id||'';
  const catsPF=Object.entries(CATS_PF).map(([k,v])=>`<option value="${k}" ${ex.categoria===k?'selected':''}>${v}</option>`).join('');
  const catsPJ=Object.entries(CATS_PJ).map(([k,v])=>`<option value="${k}" ${ex.categoria===k?'selected':''}>${v}</option>`).join('');
  const catsInv=Object.entries(CATS_INV).map(([k,v])=>`<option value="${k}" ${ex.categoria===k?'selected':''}>${v}</option>`).join('');
  const catsAll=catsPF+catsPJ;

  let body=`
    <div class="inp-row">
      <div class="field" style="flex:2"><label>Descrição *</label><input class="inp" id="ml-desc" placeholder="Ex: Aluguel, Salário..." value="${san(ex.descricao||'')}"></div>
      <div class="field"><label>Valor (R$) *</label><input class="inp" id="ml-val" type="number" step="0.01" min="0" placeholder="0,00" value="${ex.valor||''}"></div>
    </div>
    <div class="inp-row">
      <div class="field"><label>Data</label><input class="inp" id="ml-data" type="date" value="${ex.data||today()}"></div>
      <div class="field"><label>Conta ${tipo==='transferencia'?'de Origem (PJ)':''} *</label><select class="sel" id="ml-conta">${tipo==='transferencia'?allOpts(defConta):allOpts(defConta)}</select></div>
    </div>`;

  if(tipo==='transferencia'){
    body+=`<div class="field"><label>Conta de Destino (PF) *</label><select class="sel" id="ml-dest">${pfOpts(defDest)}</select></div>`;
  }

  body+=`
    <div class="inp-row">
      <div class="field"><label>Categoria</label><select class="sel" id="ml-cat">${tipo==='investimento'?catsInv:catsAll}</select></div>
      <div class="field"><label>Entidade</label><select class="sel" id="ml-ent">
        <option value="PF" ${(ex.entidade||'PF')==='PF'?'selected':''}>Pessoa Física (PF)</option>
        <option value="PJ" ${ex.entidade==='PJ'?'selected':''}>Pessoa Jurídica (PJ)</option>
      </select></div>
    </div>
    <div class="inp-row">
      <div class="field"><label>Total de Parcelas</label><input class="inp" id="ml-parcs" type="number" min="1" value="${ex.parcelas_total||1}"></div>
      <div class="field"><label>Parcela Atual</label><input class="inp" id="ml-parc" type="number" min="1" value="${ex.parcela_atual||1}"></div>
    </div>
    <div class="field"><label>Notas</label><textarea class="textarea" id="ml-notas" placeholder="Observações...">${san(ex.notas||'')}</textarea></div>
    <div style="display:flex;gap:20px;flex-wrap:wrap">
      <label class="toggle"><input type="checkbox" id="ml-rec" ${ex.recorrente?'checked':''}><div class="toggle-track"></div><span>Recorrente 🔁</span></label>
      <label class="toggle"><input type="checkbox" id="ml-ok" ${ex.ok?'checked':''}><div class="toggle-track"></div><span>Já realizado ✓</span></label>
    </div>`;

  document.getElementById('m-lanc-body').innerHTML=body;
  document.getElementById('m-lanc-save').dataset.tipo=tipo;
  openModal('m-lanc');
}

function saveLanc(){
  const tipo=document.getElementById('m-lanc-save').dataset.tipo;
  const desc=document.getElementById('ml-desc').value.trim();
  const val=parseFloat(document.getElementById('ml-val').value);
  const data=document.getElementById('ml-data').value;
  const conta_id=document.getElementById('ml-conta').value;
  const cat=document.getElementById('ml-cat').value;
  const ent=document.getElementById('ml-ent').value;
  const rec=document.getElementById('ml-rec').checked;
  const ok=document.getElementById('ml-ok').checked;
  const notas=document.getElementById('ml-notas').value.trim();
  const parcs=parseInt(document.getElementById('ml-parcs').value)||1;
  const parc=parseInt(document.getElementById('ml-parc').value)||1;
  if(!desc){toast('Informe a descrição','err');return}
  if(isNaN(val)||val<=0){toast('Informe o valor','err');return}
  if(!conta_id){toast('Selecione a conta','err');return}

  const lanc={
    id:editLancId||uid(),tipo,descricao:desc,valor:val,data,conta_id,
    categoria:cat,entidade:ent,recorrente:rec,ok,notas,
    parcelas_total:parcs>1?parcs:null,parcela_atual:parcs>1?parc:null,
    conta_dest_id:null, // limpo por padrão
  };

  if(tipo==='transferencia'){
    const dest=document.getElementById('ml-dest')?.value;
    if(!dest){toast('Selecione a conta de destino','err');return}
    if(dest===conta_id){toast('Origem e destino iguais','err');return}
    lanc.conta_dest_id=dest;
    if(!editLancId){
      // Criar lançamento espelho na conta destino (entrada PF)
      const espId=uid();
      const esp={...lanc,id:espId,espelho_id:lanc.id,conta_id:dest,conta_dest_id:null,entidade:'PF'};
      addLanc(curMonth,esp);
    }
  }

  if(editLancId)updateLanc(curMonth,editLancId,lanc);
  else addLanc(curMonth,lanc);

  closeModal('m-lanc');editLancId=null;
  updateSidebar();renderPage();
  toast(editLancId?'Atualizado':'Lançamento salvo');
}

function aportarMeta(id){

  overlay.innerHTML=`<div style="background:var(--s1);border:1px solid var(--b2);border-radius:var(--r-xl);padding:24px;width:100%;max-width:360px;box-shadow:var(--sh-lg)">

      style="margin-bottom:16px;font-size:18px;text-align:center;font-weight:700"
      onkeydown="if(event.key==='Enter')_doAportar('${id}',this.closest('.ap-overlay'))">

      <button class="btn btn-ghost btn-sm" style="flex:1" onclick="this.closest('[style]').remove()">Cancelar</button>

function _doAportar(id,overlay){
  const inp=overlay?.querySelector('#_ap-inp');if(!inp)return;
  const v=parseFloat(inp.value);if(isNaN(v)||v<=0){inp.style.borderColor='var(--red)';return}

  if(m){m.poupado=(m.poupado||0)+v;saveGlobal(g);if(overlay)overlay.remove();renderPage();toast('Aporte adicionado')}
}
function delMeta(id){
  if(!confirm('Excluir meta?'))return;
  const g=getGlobal();g.metas=(g.metas||[]).filter(m=>m.id!==id);saveGlobal(g);renderPage();toast('Meta excluída');
}

/* ── TX ROW ── */
function txRow(l,k){
  const g=getGlobal();
  const conta=g.contas.find(c=>c.id===l.conta_id);
  const dest=l.conta_dest_id?g.contas.find(c=>c.id===l.conta_dest_id):null;
  const col=l.tipo==='receita'?'var(--green)':l.tipo==='despesa'||l.tipo==='investimento'?'var(--red)':'var(--teal)';
  const sign=l.tipo==='receita'?'+':l.tipo==='transferencia'?'⇄':'-';
  return `<div class="tx-item ${l.ok?'done':''}" onclick="tgOk('${l.id}','${k}')">
    <div class="tx-check ${l.ok?'ok':''}" style="color:${col}" onclick="event.stopPropagation();tgOk('${l.id}','${k}')">${l.ok?CHK:''}</div>
    <div class="tx-pill tp-${l.tipo}"></div>
    <div class="tx-info">
      <div class="tx-desc">${san(l.descricao||'—')}</div>
      <div class="tx-meta">
        ${l.data?`<span>${l.data}</span>`:''}
        ${conta?`<span class="badge bg-sub">${san(conta.nome)}${dest?` → ${san(dest.nome)}`:''}</span>`:''}
        ${l.categoria&&CATS_ALL[l.categoria]?`<span class="badge bg-sub">${CATS_ALL[l.categoria]}</span>`:''}
        ${l.entidade?`<span class="ent-${l.entidade.toLowerCase()}">${l.entidade}</span>`:''}
        ${l.parcelas_total>1?`<span class="badge bg-blue">${l.parcela_atual||1}/${l.parcelas_total}x</span>`:''}
        ${l.recorrente&&!l.parcelas_total?'<span class="badge bg-sub">🔁</span>':''}
        ${l.notas?`<span style="font-style:italic;opacity:.7">${san(l.notas.slice(0,30))}</span>`:''}
      </div>
    </div>
    <div class="tx-amt" style="color:${col}">${sign} ${fmt(l.valor)}</div>
    <div class="tx-acts">
      <button class="tx-act" onclick="event.stopPropagation();editLanc('${l.id}','${k}')">✎</button>
      <button class="tx-act del" onclick="event.stopPropagation();rmLanc('${l.id}','${k}')">×</button>
    </div>
  </div>`;

function drawDash(){
  // Gerar insights
  const keys=allMonthKeys();
  const cur=calcTotaisMes(curMonth);
  const saldo=calcSaldoMes(curMonth);
  const renda=cur.receita+cur.transf;
  const insights=[];
  
  // Comparar com mês anterior
  if(keys.length>=2){
    const prev=calcTotaisMes(keys[1]);
    const prevSaldo=calcSaldoMes(keys[1]);
    if(saldo<prevSaldo&&prevSaldo>0){
      const diff=((saldo-prevSaldo)/Math.abs(prevSaldo)*100).toFixed(0);
      insights.push({t:'gold',m:`Saldo ${Math.abs(diff)}% menor que ${mLabel(keys[1]).split(' ')[0]}`});
    }
    if(cur.despesa>prev.despesa*1.15){
      insights.push({t:'red',m:`Despesas ${((cur.despesa/prev.despesa-1)*100).toFixed(0)}% acima do mês anterior`});
    }
  }
  
  // Taxa de economia
  if(renda>0){
    const eco=(renda-cur.despesa)/renda*100;
    if(eco<10)insights.push({t:'red',m:`Taxa de economia: ${eco.toFixed(0)}% — abaixo do mínimo recomendado (20%)`});
    else if(eco>=30)insights.push({t:'green',m:`Excelente! Economia de ${eco.toFixed(0)}% da renda este mês`});
  }
  
  // Patrimônio total vs mês anterior
  const patAtual=getGlobal().contas.filter(c=>c.ativa!==false).reduce((s,c)=>s+calcSaldoConta(c.id,curMonth),0);
  
  const el=document.getElementById('dash-insights');
  if(el&&insights.length){
    el.innerHTML=`<div style="display:flex;flex-direction:column;gap:6px">${insights.map(i=>`<div class="alert alert-${i.t}" style="margin-bottom:0">💡 ${i.m}</div>`).join('')}</div>`;
  }

  const lancs=getLancs(curMonth).filter(l=>!l.espelho_id&&l.tipo==='despesa');
  const byCat={};lancs.forEach(l=>byCat[l.categoria||'outros']=(byCat[l.categoria||'outros']||0)+l.valor);
  const e=Object.entries(byCat).sort((a,b)=>b[1]-a[1]);
  NC.donut('cv-pie',e.map(([k])=>CATS_ALL[k]||k),e.map(([,v])=>v),{colors:e.map(([k])=>CAT_COLOR[k]||NC.PAL[0])});
  const months=allMonthKeys().slice(0,6).reverse();
  const ml=months.map(k=>{const[y,mo]=k.split('-');return new Date(+y,+mo-1).toLocaleDateString('pt-BR',{month:'short'})});
  NC.bar('cv-hist',ml,[
    {label:'Receita',data:months.map(k=>calcTotaisMes(k).receita+calcTotaisMes(k).transf),color:'rgba(26,158,110,.75)'},
    {label:'Despesa',data:months.map(k=>calcTotaisMes(k).despesa),color:'rgba(201,64,64,.7)'},
  ]);
}

        movs.push({...l,_mes:k});

  const cbody=document.createElement('div');
  cbody.style.cssText='overflow-y:auto;flex:1';
  const clist=document.createElement('div');
  clist.className='tx-list';clist.style.cssText='border:none;border-radius:0';
  clist.innerHTML=movs.length?movs.map(mkMovRow).join(''):'<div class="tx-empty" style="padding:32px">Nenhuma movimentação.</div>';
  cbody.appendChild(clist);
  const cftr=document.createElement('div');

  const closeBtn=document.createElement('button');
  closeBtn.className='btn btn-ghost btn-sm';closeBtn.textContent='Fechar';

  cftr.appendChild(closeBtn);

  overlay.appendChild(cd);

  document.body.appendChild(overlay);
  overlay.addEventListener('click',e=>{if(e.target===overlay)overlay.remove()});
}

async function perguntarIA(){
  const inp=document.getElementById('ia-inp');
  const chat=document.getElementById('ia-chat');
  const btn=document.getElementById('ia-btn');
  const pergunta=inp?.value?.trim();
  if(!pergunta||!chat||!btn)return;
  
  // Montar contexto financeiro
  const keys=allMonthKeys();
  const t=calcTotaisMes(curMonth);
  const renda=t.receita+t.transf;
  const saldo=calcSaldoMes(curMonth);
  const g=getGlobal();
  const contas=g.contas.filter(c=>c.ativa!==false).map(c=>({nome:c.nome,entidade:c.entidade,saldo:calcSaldoConta(c.id,curMonth)}));
  const metas=(g.metas||[]).map(m=>({nome:m.nome,alvo:m.alvo,poupado:m.poupado||0}));
  const invTotal=keys.reduce((s,k)=>s+getLancs(k).filter(l=>l.tipo==='investimento'&&!l.espelho_id).reduce((a,l)=>a+l.valor,0),0);
  const lancsRecentes=getLancs(curMonth).filter(l=>!l.espelho_id).slice(0,20).map(l=>({tipo:l.tipo,desc:l.descricao,valor:l.valor,cat:l.categoria}));
  
  const ctx=`Dados financeiros do usuário (${mLabel(curMonth)}):
- Renda total: ${fmt(renda)}
- Despesas: ${fmt(t.despesa)}
- Investido: ${fmt(t.inv)}
- Saldo do mês: ${fmt(saldo)}
- Patrimônio investido total: ${fmt(invTotal)}
- Contas: ${JSON.stringify(contas)}
- Metas: ${JSON.stringify(metas)}
- Lançamentos recentes: ${JSON.stringify(lancsRecentes)}

Responda em português brasileiro, de forma direta e prática. Máximo 3 parágrafos curtos.`;

  // Adicionar pergunta ao chat
  chat.innerHTML+=`<div style="margin-top:10px"><span style="font-weight:700;color:var(--gold)">Você:</span> ${san(pergunta)}</div>`;
  chat.innerHTML+=`<div id="ia-resp" style="margin-top:6px;color:var(--sub);font-style:italic">Analisando seus dados...</div>`;
  chat.scrollTop=chat.scrollHeight;
  inp.value='';btn.disabled=true;btn.textContent='...';
  
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:400,
        system:'Você é um assistente financeiro pessoal especialista. Analise os dados e responda de forma prática e objetiva.',
        messages:[{role:'user',content:ctx+'\n\nPergunta: '+pergunta}]
      })
    });
    const data=await res.json();
    const resp=data?.content?.[0]?.text||'Não consegui analisar. Tente novamente.';
    const el=document.getElementById('ia-resp');
    if(el){el.style.fontStyle='normal';el.style.color='var(--text)';el.innerHTML='<span style="font-weight:700;color:var(--purple)">✦ IA:</span> '+san(resp).replace(/\n/g,'<br>')}
  }catch(e){
    const el=document.getElementById('ia-resp');
    if(el){el.style.color='var(--red)';el.textContent='Erro ao conectar com a IA. Verifique sua conexão.'}
  }
  btn.disabled=false;btn.textContent='Perguntar';
  chat.scrollTop=chat.scrollHeight;
}

function changePass(){
  const a=document.getElementById('pw-a').value,n=document.getElementById('pw-n').value,c=document.getElementById('pw-c').value;
  const msg=document.getElementById('pw-msg');
  if(hashStr(a)!==getPassHash()){msg.style.color='var(--red)';msg.textContent='Senha atual incorreta.';return}
  if(n.length<3){msg.style.color='var(--red)';msg.textContent='Mínimo 3 caracteres.';return}
  if(n!==c){msg.style.color='var(--red)';msg.textContent='Senhas não coincidem.';return}
  setPassHash(n);msg.style.color='var(--green)';msg.textContent='Senha alterada.';
  ['pw-a','pw-n','pw-c'].forEach(id=>document.getElementById(id).value='');
  toast('Senha alterada');
}

  size(el){if(!el)return null;let w=0,p=el.parentElement;while(p&&!w){w=p.clientWidth||p.offsetWidth||0;p=p.parentElement}el.width=w||320;el.height=parseInt(el.getAttribute('height')||el.style.height||200)||200;return el.getContext('2d')},
  empty(ctx,W,H,msg='Sem dados'){ctx.clearRect(0,0,W,H);ctx.fillStyle='rgba(114,114,138,.08)';ctx.beginPath();ctx.arc(W/2,H/2,Math.min(W,H)*.2,0,Math.PI*2);ctx.fill();ctx.fillStyle='rgba(114,114,138,.4)';ctx.font='11px DM Sans,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(msg,W/2,H/2)},
  tick(v){const a=Math.abs(v);if(a>=1e6)return'R$'+(v/1e6).toFixed(1)+'M';if(a>=1000)return'R$'+(v/1000).toFixed(0)+'k';return'R$'+v.toFixed(0)},
  donut(id,labels,values,opts){
    const el=document.getElementById(id);const ctx=this.size(el);if(!ctx)return;
    const W=el.width,H=el.height;ctx.clearRect(0,0,W,H);
    const idx=values.map((_,i)=>i).filter(i=>values[i]>0);
    if(!idx.length){this.empty(ctx,W,H);return}
    const vals=idx.map(i=>values[i]),lbls=idx.map(i=>labels[i]);
    const colors=opts?.colors?idx.map(i=>opts.colors[i]):this.PAL;
    const total=vals.reduce((a,b)=>a+b,0);
    const legW=Math.min(130,W*.38),cW=W-legW;
    const cx=cW/2,cy=H/2,r=Math.min(cx,cy)*.82,cut=.62;
    let angle=-Math.PI/2;
    vals.forEach((v,i)=>{const sw=v/total*Math.PI*2,g=.016;ctx.beginPath();ctx.arc(cx,cy,r,angle+g,angle+sw-g);ctx.arc(cx,cy,r*cut,angle+sw-g,angle+g,true);ctx.closePath();ctx.fillStyle=colors[i%colors.length];ctx.globalAlpha=.9;ctx.fill();angle+=sw});
    ctx.globalAlpha=1;
    const iH=Math.min(17,(H-16)/lbls.length),sY=cy-(lbls.length*iH)/2+iH*.5;
    lbls.forEach((lbl,i)=>{
      const y=sY+i*iH,col=colors[i%colors.length];
      ctx.fillStyle=col;ctx.globalAlpha=.85;ctx.beginPath();ctx.arc(cW+10,y,4,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;
      ctx.fillStyle='rgba(114,114,138,.85)';ctx.font='10px DM Sans,sans-serif';ctx.textAlign='left';
      ctx.fillText(lbl.length>13?lbl.slice(0,12)+'…':lbl,cW+18,y+3.5);
      ctx.fillStyle='rgba(232,232,240,.7)';ctx.font='bold 10px DM Sans,sans-serif';ctx.textAlign='right';
      ctx.fillText(Math.round(vals[i]/total*100)+'%',W-2,y+3.5);
    });
  },
  bar(id,labels,datasets){
    const el=document.getElementById(id);const ctx=this.size(el);if(!ctx)return;
    const W=el.width,H=el.height;ctx.clearRect(0,0,W,H);
    const allV=datasets.flatMap(d=>d.data||[]).filter(v=>typeof v==='number'&&v>=0);
    if(!allV.length||!labels.length){this.empty(ctx,W,H);return}
    const maxV=Math.max(...allV)||1;const mag=Math.pow(10,Math.floor(Math.log10(maxV)));const topV=Math.ceil(maxV/mag)*mag||1;
    const pad={t:22,r:10,b:26,l:52};const cW=W-pad.l-pad.r,cH=H-pad.t-pad.b;
    const n=labels.length,nD=datasets.length;const grpW=cW/n,bW=Math.min(Math.max(grpW*.28,6),22);
    for(let i=0;i<=4;i++){const f=i/4,y=pad.t+cH*(1-f);ctx.strokeStyle=`rgba(114,114,138,${i===0?.12:.05})`;ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke();ctx.fillStyle='rgba(114,114,138,.55)';ctx.font='9px DM Sans,sans-serif';ctx.textAlign='right';ctx.fillText(this.tick(topV*f),pad.l-4,y+3)}
    datasets.forEach((ds,di)=>{const col=ds.color||this.PAL[di%this.PAL.length];(ds.data||[]).forEach((v,i)=>{if(!v||v<=0)return;const h=Math.max(v/topV*cH,2);const tW=nD*bW+(nD-1)*2,x=pad.l+i*grpW+(grpW-tW)/2+di*(bW+2),y=pad.t+cH-h;ctx.fillStyle=col;ctx.globalAlpha=.82;ctx.beginPath();const rad=Math.min(3,h/2);if(ctx.roundRect)ctx.roundRect(x,y,bW,h,rad);else ctx.rect(x,y,bW,h);ctx.fill()})});
    ctx.globalAlpha=1;ctx.fillStyle='rgba(114,114,138,.6)';ctx.font='9px DM Sans,sans-serif';ctx.textAlign='center';labels.forEach((lbl,i)=>ctx.fillText(lbl,pad.l+i*grpW+grpW/2,H-7));
    if(datasets.length>1){let lx=pad.l;datasets.forEach((ds,i)=>{const col=ds.color||this.PAL[i];ctx.fillStyle=col;ctx.globalAlpha=.82;if(ctx.roundRect)ctx.roundRect(lx,6,10,4,2);else ctx.fillRect(lx,6,10,4);ctx.fill();ctx.globalAlpha=1;ctx.fillStyle='rgba(114,114,138,.7)';ctx.font='9px DM Sans,sans-serif';ctx.textAlign='left';ctx.fillText(ds.label||'',lx+13,11);lx+=ctx.measureText(ds.label||'').width+22})}
  },
  line(id,labels,datasets){
    const el=document.getElementById(id);const ctx=this.size(el);if(!ctx)return;
    const W=el.width,H=el.height;ctx.clearRect(0,0,W,H);
    const allV=datasets.flatMap(d=>d.data||[]).filter(v=>typeof v==='number'&&!isNaN(v));
    if(!allV.length){this.empty(ctx,W,H);return}
    let minV=Math.min(...allV),maxV=Math.max(...allV);const rng=maxV-minV||Math.abs(maxV)||100;
    minV-=rng*.08;maxV+=rng*.12;const range=maxV-minV;const n=Math.max(labels.length,1);
    const pad={t:18,r:14,b:26,l:54};const cW=W-pad.l-pad.r,cH=H-pad.t-pad.b;
    const xOf=i=>pad.l+(n>1?i*(cW/(n-1)):cW/2);const yOf=v=>pad.t+cH*(1-(v-minV)/range);
    for(let i=0;i<=4;i++){const f=i/4,y=pad.t+cH*(1-f);ctx.strokeStyle=`rgba(114,114,138,${i===0?.1:.05})`;ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke();ctx.fillStyle='rgba(114,114,138,.55)';ctx.font='9px DM Sans,sans-serif';ctx.textAlign='right';ctx.fillText(this.tick(minV+range*f),pad.l-4,y+3)}
    ctx.fillStyle='rgba(114,114,138,.6)';ctx.font='9px DM Sans,sans-serif';ctx.textAlign='center';labels.forEach((lbl,i)=>ctx.fillText(lbl,xOf(i),H-7));
    datasets.forEach((ds,di)=>{
      const col=ds.color||this.PAL[di%this.PAL.length];const pts=(ds.data||[]).map((v,i)=>({x:xOf(i),y:yOf(v)}));if(pts.length<2)return;
      ctx.beginPath();ctx.moveTo(pts[0].x,pad.t+cH);pts.forEach(p=>ctx.lineTo(p.x,p.y));ctx.lineTo(pts[pts.length-1].x,pad.t+cH);ctx.closePath();
      const g=ctx.createLinearGradient(0,pad.t,0,pad.t+cH);g.addColorStop(0,col+'28');g.addColorStop(1,col+'04');ctx.fillStyle=g;ctx.fill();
      ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);for(let i=1;i<pts.length;i++){const cpx=(pts[i-1].x+pts[i].x)/2;ctx.bezierCurveTo(cpx,pts[i-1].y,cpx,pts[i].y,pts[i].x,pts[i].y)}
      ctx.strokeStyle=col;ctx.lineWidth=1.8;ctx.globalAlpha=.9;ctx.stroke();ctx.globalAlpha=1;
      pts.forEach(p=>{ctx.beginPath();ctx.arc(p.x,p.y,3,0,Math.PI*2);ctx.fillStyle=col;ctx.fill();ctx.strokeStyle='rgba(10,10,18,.8)';ctx.lineWidth=1.5;ctx.stroke()});
    });
    if(datasets.length>1){let lx=pad.l;datasets.forEach((ds,i)=>{const col=ds.color||this.PAL[i];ctx.strokeStyle=col;ctx.lineWidth=2;ctx.globalAlpha=.85;ctx.beginPath();ctx.moveTo(lx,8);ctx.lineTo(lx+14,8);ctx.stroke();ctx.globalAlpha=1;ctx.fillStyle=col;ctx.beginPath();ctx.arc(lx+7,8,2.5,0,Math.PI*2);ctx.fill();ctx.fillStyle='rgba(114,114,138,.75)';ctx.font='9px DM Sans,sans-serif';ctx.textAlign='left';ctx.fillText(ds.label||'',lx+18,11);lx+=ctx.measureText(ds.label||'').width+26})}
  }
};

/* ── FILTRO LANÇAMENTOS ── */
let _lancFiltro={busca:'',tipo:'',ent:''};
function filtrarLancs(){
  const busca=(document.getElementById('lanc-busca')?.value||'').toLowerCase();
  const tipo=document.getElementById('lanc-filtro-tipo')?.value||'';
  const ent=document.getElementById('lanc-filtro-ent')?.value||'';
  _lancFiltro={busca,tipo,ent};
  const container=document.getElementById('lancs-container');
  if(!container)return;
  const lancs=getLancs(curMonth).filter(l=>!l.espelho_id);
  const filtered=lancs.filter(l=>{
    if(tipo&&l.tipo!==tipo)return false;
    if(ent&&l.entidade!==ent)return false;
    if(busca&&!l.descricao?.toLowerCase().includes(busca)&&!l.categoria?.toLowerCase().includes(busca))return false;
    return true;
  });
  const mkSec=(titulo,items,col,tp)=>`<div class="tx-list" style="margin-bottom:12px">
    <div class="tx-hdr">
      <div class="tx-hdr-title"><div class="tx-pill tp-${tp}"></div>${titulo} <span style="font-size:10px;color:var(--sub);font-weight:400">${items.length}</span></div>
      <div class="tx-hdr-total" style="color:${col}">${fmt(items.reduce((s,l)=>s+l.valor,0))}</div>
    </div>
    ${items.length?[...items].sort((a,b)=>(b.data||'').localeCompare(a.data||'')).map(l=>txRow(l,curMonth)).join(''):'<div class="tx-empty">Nenhum resultado.</div>'}
  </div>`;
  const tipos=['receita','despesa','transferencia','investimento'];
  const cores=['var(--green)','var(--red)','var(--teal)','var(--purple)'];
  const titulos=['Receitas','Despesas','Transferências PJ → PF','Investimentos'];
  let html='';
  tipos.forEach((t,i)=>{
    const items=filtered.filter(l=>l.tipo===t);
    if(!tipo||tipo===t)html+=mkSec(titulos[i],items,cores[i],t);
  });
  container.innerHTML=html||'<div class="card"><div class="tx-empty">Nenhum lançamento encontrado.</div></div>';
}

/* ── FAB ── */
let _fabOpen=false;
function toggleFab(){
  _fabOpen=!_fabOpen;
  const btn=document.getElementById('fab-btn');
  const menu=document.getElementById('fab-menu');
  btn.textContent=_fabOpen?'×':'+';
  btn.style.transform=_fabOpen?'rotate(45deg)':'';
  menu.classList.toggle('open',_fabOpen);
}
function closeFab(){
  _fabOpen=false;
  const btn=document.getElementById('fab-btn');
  const menu=document.getElementById('fab-menu');
  if(btn){btn.textContent='+';btn.style.transform='';}
  if(menu)menu.classList.remove('open');
}
document.addEventListener('click',e=>{
  if(_fabOpen&&!e.target.closest('.fab')&&!e.target.closest('.fab-menu'))closeFab();
});

/* ── MODO FOCO ── */
let _focoOn=false;
function toggleFoco(){
  _focoOn=!_focoOn;
  document.getElementById('app').classList.toggle('foco-on',_focoOn);
  document.querySelectorAll('.foco-btn').forEach(b=>b.classList.toggle('on',_focoOn));
  toast(_focoOn?'Modo foco ativado — passe o mouse para revelar':'Modo foco desativado');
}

/* ── ERROR BOUNDARY ── */
window.addEventListener('error',e=>{
  console.error('[nmm]',e.error);
  const el=document.getElementById('pg');
  if(el)el.innerHTML=`<div class="card" style="padding:32px;text-align:center"><div style="color:var(--red);font-weight:700;margin-bottom:8px">Algo deu errado</div><div style="font-size:12px;color:var(--sub);margin-bottom:14px">${e.message}</div><button class="btn btn-primary btn-sm" onclick="renderPage()">Tentar novamente</button></div>`;
});

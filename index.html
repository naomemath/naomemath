<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>naomemath · finanças</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  /* ── SUPERFÍCIES ── */
  --bg:#080810;
  --s1:#0e0e1c;
  --s2:#13131f;
  --s3:#18182a;
  --s4:#1e1e30;

  /* ── BORDAS ── */
  --b1:rgba(255,255,255,0.06);
  --b2:rgba(255,255,255,0.10);
  --b3:rgba(255,255,255,0.16);

  /* ── PALETA SEMÂNTICA ── */
  --gold:#E8A020;
  --gold-dim:rgba(232,160,32,0.10);
  --gold-soft:rgba(232,160,32,0.05);
  --gold2:rgba(232,160,32,0.15);

  --green:#0EA572;
  --green-dim:rgba(14,165,114,0.10);
  --green-soft:rgba(14,165,114,0.05);
  --green2:rgba(14,165,114,0.15);

  --red:#E5484D;
  --red-dim:rgba(229,72,77,0.10);
  --red-soft:rgba(229,72,77,0.05);
  --red2:rgba(229,72,77,0.15);

  --blue:#3B82F6;
  --blue-dim:rgba(59,130,246,0.10);
  --blue2:rgba(59,130,246,0.15);

  --purple:#7C3AED;
  --purple-dim:rgba(124,58,237,0.10);
  --purple2:rgba(124,58,237,0.15);

  --teal:#0891B2;
  --teal-dim:rgba(8,145,178,0.10);
  --teal2:rgba(8,145,178,0.15);

  --orange:#EA580C;
  --pink:#DB2777;

  /* ── TIPOGRAFIA ── */
  --text:#ededf5;
  --sub:#6e6e8a;
  --dim:#3a3a52;
  --muted:#2a2a3e;

  --fs-2xs:10px;
  --fs-xs:11px;
  --fs-sm:12px;
  --fs-base:13px;
  --fs-md:14px;
  --fs-lg:17px;
  --fs-xl:22px;
  --fs-2xl:30px;
  --fs-display:36px;

  /* ── ESPAÇAMENTO ── */
  --sp-1:4px; --sp-2:8px; --sp-3:12px;
  --sp-4:16px; --sp-5:20px; --sp-6:24px;

  /* ── RAIOS ── */
  --r-xs:6px; --r-sm:8px; --r:12px;
  --r-lg:16px; --r-xl:20px; --r-full:999px;

  /* ── SOMBRAS ── */
  --sh-xs:0 1px 2px rgba(0,0,0,.25);
  --sh-sm:0 2px 6px rgba(0,0,0,.3);
  --sh:0 4px 14px rgba(0,0,0,.35),0 1px 3px rgba(0,0,0,.2);
  --sh-md:0 8px 24px rgba(0,0,0,.4),0 2px 6px rgba(0,0,0,.2);
  --sh-lg:0 16px 48px rgba(0,0,0,.45);
  --sh-glow:0 0 0 1px var(--gold),0 0 20px rgba(232,160,32,.12);

  /* aliases legacy */
  --shadow:var(--sh-sm);
  --shadow-sm:var(--sh-xs);
  --shadow-md:var(--sh-md);
  --shadow-lg:var(--sh-lg);
  --shadow-glow:var(--sh-glow);

  /* ── GLASS ── */
  --glass:rgba(14,14,28,0.82);
  --glass-border:rgba(255,255,255,0.07);

  /* ── MOVIMENTO ── */
  --ease:cubic-bezier(.4,0,.2,1);
  --ease-out:cubic-bezier(0,.5,.5,1);
  --dur-fast:100ms;
  --dur:180ms;
  --dur-slow:320ms;

  /* legacy */
  --r-sm:8px;
  --r-full:999px;
}

/* ── RESET & BASE ── */
*{box-sizing:border-box;margin:0;padding:0}
html,body{
  height:100%;background:var(--bg);color:var(--text);
  font-family:'DM Sans',sans-serif;overflow:hidden;
  font-size:var(--fs-base);line-height:1.5;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--s4);border-radius:var(--r-full)}
button,input,select{font-family:inherit;font-size:inherit}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}

/* ── LOGIN ── */
#login{
  position:fixed;inset:0;z-index:999;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:var(--sp-6);
  background:radial-gradient(ellipse 70% 40% at 50% -10%,rgba(232,160,32,.08),transparent 60%),var(--bg);
}
.brand{text-align:center}
.brand h1{
  font-family:'Syne',sans-serif;font-size:var(--fs-2xl);font-weight:800;
  letter-spacing:-1.5px;line-height:1;color:var(--text);
}
.brand h1 em{color:var(--gold);font-style:normal}
.brand p{
  font-size:var(--fs-xs);color:var(--sub);
  letter-spacing:2.5px;text-transform:uppercase;margin-top:6px;
}
.lbox{
  background:var(--s1);border:1px solid var(--b1);
  border-radius:var(--r-xl);padding:28px;
  width:300px;max-width:90vw;
  display:flex;flex-direction:column;gap:14px;
  box-shadow:var(--sh-md);
}
.lbl{
  display:block;font-size:var(--fs-2xs);color:var(--sub);
  font-weight:600;letter-spacing:.8px;text-transform:uppercase;margin-bottom:4px;
}
.inp{
  width:100%;background:var(--s2);border:1px solid var(--b2);
  border-radius:var(--r-sm);padding:10px 12px;
  color:var(--text);font-size:var(--fs-md);
  outline:none;transition:border-color var(--dur) var(--ease);
}
.inp:focus{border-color:var(--gold)}
.inp::placeholder{color:var(--dim)}
.btn-g{
  width:100%;background:var(--gold);color:#000;border:none;
  border-radius:var(--r-sm);padding:11px;
  font-size:var(--fs-base);font-weight:700;letter-spacing:-.1px;
  cursor:pointer;margin-top:2px;
  transition:opacity var(--dur) var(--ease),box-shadow var(--dur) var(--ease);
}
.btn-g:hover{opacity:.88;box-shadow:0 0 0 3px rgba(232,160,32,.15)}
.btn-g:active{opacity:.75;transform:scale(.99)}
.lerr{color:var(--red);font-size:var(--fs-xs);text-align:center;display:none}
.lhint{font-size:var(--fs-xs);color:var(--sub);text-align:center;line-height:1.7}

/* ── SHELL ── */
#app{display:none;height:100vh;flex-direction:column}

/* ── TOPBAR ── */
.top{
  display:flex;align-items:center;gap:var(--sp-2);
  padding:0 var(--sp-4);height:48px;
  border-bottom:1px solid var(--b1);
  background:var(--glass);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  flex-shrink:0;flex-wrap:nowrap;
  position:sticky;top:0;z-index:200;
}
.tlogo{
  font-family:'Syne',sans-serif;font-size:15px;font-weight:800;
  letter-spacing:-.5px;white-space:nowrap;color:var(--text);flex-shrink:0;
}
.tlogo em{color:var(--gold);font-style:normal}
.acc-sw{
  display:flex;background:var(--s2);
  border:1px solid var(--b1);border-radius:var(--r-sm);
  padding:2px;gap:1px;flex-shrink:0;
}
.ab{
  background:transparent;border:none;color:var(--sub);
  border-radius:6px;padding:4px 10px;
  font-size:var(--fs-xs);font-weight:600;
  cursor:pointer;transition:all var(--dur-fast) var(--ease);
  white-space:nowrap;letter-spacing:.1px;
}
.ab:hover{color:var(--text);background:var(--s3)}
.ab.on{background:var(--gold);color:#000;font-weight:700}
.sp{flex:1;min-width:0}
.msel{
  background:var(--s2);border:1px solid var(--b1);
  color:var(--text);border-radius:var(--r-sm);
  padding:4px 8px;font-size:var(--fs-xs);
  outline:none;cursor:pointer;max-width:140px;flex-shrink:0;
}
.tbtn{
  border:none;border-radius:var(--r-sm);
  padding:5px 11px;font-size:var(--fs-xs);
  font-weight:600;cursor:pointer;flex-shrink:0;
  transition:opacity var(--dur-fast) var(--ease);letter-spacing:.1px;
}
.tbtn:hover{opacity:.8}
.tbtn:active{opacity:.6}
.pill{
  border-radius:var(--r-full);padding:3px 10px;
  font-size:var(--fs-xs);font-weight:700;
  white-space:nowrap;flex-shrink:0;
  font-variant-numeric:tabular-nums;letter-spacing:-.2px;
}

/* ── TABS ── */
.tabs{
  display:flex;gap:2px;padding:0 var(--sp-4);
  border-bottom:1px solid var(--b1);
  flex-shrink:0;overflow-x:auto;
  background:var(--s1);height:40px;align-items:center;
}
.tabs::-webkit-scrollbar{display:none}
.tab{
  background:transparent;border:none;
  color:var(--sub);border-radius:var(--r-sm);
  padding:5px 12px;font-size:var(--fs-xs);
  font-weight:500;cursor:pointer;white-space:nowrap;
  transition:color var(--dur-fast) var(--ease),background var(--dur-fast) var(--ease);
  letter-spacing:.1px;height:30px;display:flex;align-items:center;
}
.tab:hover{color:var(--text);background:var(--s2)}
.tab.on{
  background:var(--gold-dim);color:var(--gold);
  font-weight:700;
}
.tab-badge{
  background:var(--red);color:#fff;border-radius:var(--r-full);
  font-size:9px;padding:1px 4px;margin-left:3px;font-weight:700;
}

/* ── SCROLL & PAGE ── */
.scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.page{padding:var(--sp-4);max-width:1020px;margin:0 auto;display:flex;flex-direction:column;gap:var(--sp-3)}

/* ── GRID ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:var(--sp-3)}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:var(--sp-3)}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:var(--sp-3)}

/* ── CARD ── */
.card{
  background:var(--s1);border:1px solid var(--b1);
  border-radius:var(--r);padding:var(--sp-4);
  transition:border-color var(--dur) var(--ease);
}
.card:hover{border-color:var(--b2)}

/* Stat card */
.sl{
  font-size:var(--fs-2xs);color:var(--sub);font-weight:600;
  letter-spacing:.6px;text-transform:uppercase;margin-bottom:var(--sp-1);
}
.sv{
  font-family:'Syne',sans-serif;font-size:var(--fs-lg);
  font-weight:800;line-height:1.1;
  font-variant-numeric:tabular-nums;letter-spacing:-.5px;
}
.ss{font-size:var(--fs-xs);color:var(--sub);margin-top:3px}
.st{font-weight:600;font-size:var(--fs-base);color:var(--text)}
.sh{display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--sp-3)}

/* ── PROGRESS ── */
.track{
  background:var(--s3);border-radius:var(--r-full);
  height:3px;overflow:hidden;margin-top:var(--sp-2);
}
.fill{height:100%;border-radius:var(--r-full);transition:width .8s var(--ease)}

/* ── CHECKLIST BLOCK ── */
.cblock{
  background:var(--s1);border:1px solid var(--b1);
  border-radius:var(--r);overflow:hidden;
}
.cbh{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px var(--sp-4);border-bottom:1px solid var(--b1);
  background:var(--s2);
}
.cbhtl{
  font-weight:600;font-size:var(--fs-base);
  display:flex;align-items:center;gap:6px;color:var(--text);
}
.cbct{
  font-size:var(--fs-2xs);color:var(--sub);
  background:var(--s3);border-radius:var(--r-full);
  padding:1px 7px;font-weight:600;letter-spacing:.3px;
}
.cbv{font-weight:700;font-size:var(--fs-base);font-variant-numeric:tabular-nums}

/* ── ROW ── */
.crow{
  display:flex;align-items:center;gap:var(--sp-2);
  padding:9px var(--sp-4);
  border-bottom:1px solid var(--b1);
  transition:background var(--dur-fast) var(--ease);
  cursor:pointer;-webkit-tap-highlight-color:transparent;
  user-select:none;
}
.crow:last-child{border-bottom:none}
.crow:hover{background:var(--s2)}
.crow:active{background:var(--s3)}
.crow.done{opacity:.4}
.crow.done .rn{text-decoration:line-through}

/* ── CHECK ── */
.chk{
  width:18px;height:18px;min-width:18px;border-radius:50%;
  border:1.5px solid var(--b3);
  display:flex;align-items:center;justify-content:center;
  transition:all var(--dur) var(--ease);flex-shrink:0;
  background:transparent;cursor:pointer;
}
.chk.ok{border-color:currentColor;background:currentColor}
.chk svg{
  width:9px;height:9px;stroke:#000;stroke-width:2.5;
  fill:none;display:none;stroke-linecap:round;stroke-linejoin:round;
}
.chk.ok svg{display:block}

/* ── ROW ELEMENTS ── */
.rn{
  flex:1;font-size:var(--fs-base);font-weight:400;color:var(--text);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.rb{
  font-size:var(--fs-2xs);padding:2px 6px;border-radius:var(--r-xs);
  font-weight:600;white-space:nowrap;flex-shrink:0;letter-spacing:.2px;
}
.rd{font-size:var(--fs-xs);color:var(--sub);white-space:nowrap;flex-shrink:0}
.rv{
  font-weight:600;font-size:var(--fs-base);white-space:nowrap;
  min-width:68px;text-align:right;flex-shrink:0;
  font-variant-numeric:tabular-nums;letter-spacing:-.3px;
}
.rdl{
  background:none;border:none;color:var(--dim);
  cursor:pointer;font-size:14px;padding:0 2px;
  line-height:1;transition:color var(--dur-fast) var(--ease);flex-shrink:0;
}
.rdl:hover{color:var(--red)}
.redit{
  background:none;border:none;color:var(--dim);
  cursor:pointer;font-size:11px;padding:0 2px;
  line-height:1;transition:color var(--dur-fast) var(--ease);flex-shrink:0;
}
.redit:hover{color:var(--text)}
.erow{padding:12px var(--sp-4);color:var(--sub);font-size:var(--fs-sm);font-style:italic}

/* ── EDIT PANEL ── */
.edit-panel{
  background:var(--s2);border-bottom:1px solid var(--b1);
  padding:var(--sp-3) var(--sp-4);
  display:flex;flex-direction:column;gap:var(--sp-2);
  animation:slideDown var(--dur-fast) var(--ease-out);
}
@keyframes slideDown{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.edit-row{display:flex;gap:6px;flex-wrap:wrap;align-items:flex-end}
.edit-lbl{font-size:var(--fs-2xs);color:var(--sub);font-weight:600;letter-spacing:.5px;text-transform:uppercase;margin-bottom:2px;display:block}
.edit-inp{
  background:var(--s1);border:1px solid var(--b2);
  border-radius:var(--r-xs);padding:6px 9px;
  color:var(--text);font-size:var(--fs-sm);
  outline:none;transition:border-color var(--dur) var(--ease);min-width:70px;
}
.edit-inp:focus{border-color:var(--gold)}
.edit-sel{
  background:var(--s1);border:1px solid var(--b2);color:var(--text);
  border-radius:var(--r-xs);padding:6px 9px;font-size:var(--fs-sm);
  outline:none;cursor:pointer;
}
.edit-save{
  background:var(--green);color:#fff;border:none;
  border-radius:var(--r-xs);padding:6px 12px;
  font-size:var(--fs-sm);font-weight:600;cursor:pointer;
}
.edit-cancel{
  background:var(--s3);color:var(--sub);border:none;
  border-radius:var(--r-xs);padding:6px 10px;
  font-size:var(--fs-sm);font-weight:500;cursor:pointer;
}

/* ── FORM ── */
.af{
  background:var(--s1);border:1px solid var(--b1);
  border-radius:var(--r);padding:var(--sp-3) var(--sp-4);
}
.aft{
  font-weight:600;font-size:var(--fs-2xs);color:var(--sub);
  text-transform:uppercase;letter-spacing:.8px;margin-bottom:var(--sp-2);
}
.fr{display:flex;gap:6px;flex-wrap:wrap;align-items:flex-end}
.fi{
  flex:1;min-width:80px;background:var(--s2);
  border:1px solid var(--b1);border-radius:var(--r-xs);
  padding:7px 10px;color:var(--text);font-size:var(--fs-base);
  outline:none;transition:border-color var(--dur) var(--ease);
}
.fi:focus{border-color:var(--gold)}
.fi::placeholder{color:var(--dim)}
.fs{
  background:var(--s2);border:1px solid var(--b1);
  color:var(--text);border-radius:var(--r-xs);
  padding:7px 10px;font-size:var(--fs-base);
  outline:none;cursor:pointer;flex-shrink:0;
}
.fa{
  border:none;border-radius:var(--r-xs);
  padding:7px 14px;font-size:var(--fs-sm);
  font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0;
  transition:opacity var(--dur-fast) var(--ease);letter-spacing:.1px;
}
.fa:hover{opacity:.82}
.fa:active{opacity:.65}

/* ── CHARTS ── */
.ch{position:relative}
.ch-s{height:160px}.ch-m{height:210px}.ch-l{height:250px}

/* ── ALERTS ── */
.al{
  border-radius:var(--r-sm);padding:9px 12px;
  font-size:var(--fs-sm);font-weight:500;
  display:flex;align-items:flex-start;gap:8px;
  border:1px solid;line-height:1.5;
}
.al-r{background:var(--red-soft);border-color:var(--red-dim);color:#f87171}
.al-y{background:var(--gold-soft);border-color:var(--gold-dim);color:#fbbf24}
.al-g{background:var(--green-soft);border-color:var(--green-dim);color:#34d399}
.al-b{background:var(--blue-dim);border-color:rgba(59,130,246,.2);color:#93c5fd}

/* ── METRIC ROW ── */
.mr{
  display:flex;align-items:center;gap:var(--sp-3);
  padding:11px var(--sp-4);
  background:var(--s1);border:1px solid var(--b1);
  border-radius:var(--r-sm);
}
.md{width:6px;height:6px;min-width:6px;border-radius:50%}
.mi{flex:1;min-width:0}
.mt{font-weight:500;font-size:var(--fs-base);color:var(--text)}
.ms{font-size:var(--fs-xs);color:var(--sub);margin-top:1px}
.mv{font-weight:700;font-size:var(--fs-base);white-space:nowrap;font-variant-numeric:tabular-nums}

/* ── TABLE ── */
.htbl{width:100%;border-collapse:collapse;font-size:var(--fs-sm)}
.htbl th{
  text-align:left;font-size:var(--fs-2xs);color:var(--sub);
  font-weight:600;letter-spacing:.6px;text-transform:uppercase;
  padding:0 var(--sp-2) var(--sp-2) 0;border-bottom:1px solid var(--b1);
}
.htbl td{
  padding:8px var(--sp-2) 8px 0;
  border-bottom:1px solid var(--b1);vertical-align:middle;
}
.htbl tr:last-child td{border:none}

/* ── TOAST ── */
#toast{
  position:fixed;bottom:20px;left:50%;
  transform:translateX(-50%) translateY(4px);
  background:var(--s2);border:1px solid var(--b2);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-radius:var(--r);padding:8px 16px;
  font-size:var(--fs-sm);font-weight:600;
  z-index:9999;opacity:0;
  transition:opacity var(--dur) var(--ease),transform var(--dur) var(--ease);
  pointer-events:none;white-space:nowrap;
  box-shadow:var(--sh-md);
}

/* ── XFER ROW ── */
.xrow{background:rgba(8,145,178,.04);border-left:2px solid rgba(8,145,178,.25)}

/* ── PROJ BAR ── */
.proj-bar{
  display:flex;border-radius:var(--r-xs);overflow:hidden;
  height:22px;gap:2px;margin-top:var(--sp-2);
}
.proj-seg{
  display:flex;align-items:center;justify-content:center;
  font-size:9px;font-weight:700;color:rgba(0,0,0,.7);
  min-width:0;overflow:hidden;white-space:nowrap;padding:0 4px;
  letter-spacing:.3px;
}

/* ── DIVIDER ── */
.divider{height:1px;background:var(--b1);margin:var(--sp-2) 0}

/* ── RESPONSIVE ── */
@media(max-width:700px){
  .g4{grid-template-columns:1fr 1fr}
  .g3{grid-template-columns:1fr 1fr}
  .top{gap:var(--sp-1)}
  .msel{max-width:110px}
}
@media(max-width:440px){
  .g2,.g3,.g4{grid-template-columns:1fr}
  .fr{flex-direction:column}
  .fi,.fs,.fa{width:100%!important;min-width:0}
  .page{padding:var(--sp-3)}
}
</style>
</head>
<body>
<div id="toast"></div>

<!-- LOGIN -->
<div id="login">
  <div class="brand"><h1>naome<em>math</em></h1><p>finanças pessoais</p></div>
  <div class="lbox">
    <div><div class="lbl">Senha</div><input class="inp" type="password" id="pwd" placeholder="••••••" onkeydown="if(event.key==='Enter')login()"></div>
    <div class="lerr" id="lerr">Senha incorreta.</div>
    <button class="btn-g" onclick="login()">Entrar</button>
    <div class="lhint">Senha padrão: <strong style="color:var(--text)">1234</strong> · altere em ⚙️</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="top">
    <div class="tlogo">naome<em>math</em></div>
    <div class="acc-sw">
      <button class="ab on" id="ab-pf" onclick="setAcc('PF')">👤 PF</button>
      <button class="ab" id="ab-pj" onclick="setAcc('PJ')">🏢 PJ</button>
      <button class="ab" id="ab-all" onclick="setAcc('ALL')">🔗 Tudo</button>
    </div>
    <div class="sp"></div>
    <select class="msel" id="msel" onchange="changeMonth(this.value)"></select>
    <button class="tbtn" style="background:var(--gold);color:#000;font-weight:700" onclick="addMonth()">+ mês</button>
    <div id="spill" class="pill" style="display:none"></div>
    <button class="tbtn" style="background:var(--red2);color:var(--red);border:1px solid rgba(239,68,68,.2)" onclick="logout()">Sair</button>
  </div>
  <div class="tabs" id="tabs">
    <button class="tab on" data-t="dash" onclick="goTab('dash',this)">🏠 Dashboard</button>
    <button class="tab" data-t="entradas" onclick="goTab('entradas',this)">💰 Entradas</button>
    <button class="tab" data-t="contas" onclick="goTab('contas',this)">📋 Contas</button>
    <button class="tab" data-t="cartoes" onclick="goTab('cartoes',this)">💳 Cartões</button>
    <button class="tab" data-t="invest" onclick="goTab('invest',this)">📈 Investimentos</button>
    <button class="tab" data-t="transf" onclick="goTab('transf',this)">🔄 PJ→PF</button>
    <button class="tab" data-t="saude" onclick="goTab('saude',this)">❤️ Saúde</button>
    <button class="tab" data-t="hist" onclick="goTab('hist',this)">🗂 Histórico</button>
    <button class="tab" data-t="cfg" onclick="goTab('cfg',this)">⚙️</button>
  </div>
  <div class="scroll"><div class="page" id="pg"></div></div>
</div>

<script>
/* ── UTILS ── */
const fmt=v=>isNaN(+v)?'R$0,00':(+v).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
const fmtK=v=>{const n=+v;return n>=1000?'R$'+(n/1000).toFixed(0)+'k':fmt(n)};
const pct=(a,b)=>b>0?Math.min(100,+(a/b*100).toFixed(1)):0;
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const mLabel=k=>{const[y,m]=k.split('-');const s=new Date(+y,+m-1).toLocaleDateString('pt-BR',{month:'long',year:'numeric'});return s[0].toUpperCase()+s.slice(1)};
const CHK=`<svg viewBox="0 0 12 12"><polyline points="1.5,6.5 4.5,9.5 10.5,2.5"/></svg>`;
const now=new Date();

function toast(msg,col='var(--text)'){
  const t=document.getElementById('toast');
  t.textContent=msg;t.style.color=col;t.style.opacity='1';
  clearTimeout(t._t);t._t=setTimeout(()=>t.style.opacity='0',2000);
}

/* ── CATS ── */
const CPF={moradia:{l:'Moradia',c:'#F59E0B',i:'🏠'},saude:{l:'Saúde',c:'#10B981',i:'💚'},financeiro:{l:'Financeiro',c:'#EF4444',i:'💳'},servicos:{l:'Serviços',c:'#8B5CF6',i:'⚡'},alimentacao:{l:'Alimentação',c:'#F97316',i:'🍽'},transporte:{l:'Transporte',c:'#06B6D4',i:'🚗'},lazer:{l:'Lazer',c:'#EC4899',i:'🎉'},educacao:{l:'Educação',c:'#84CC16',i:'📚'},outros:{l:'Outros',c:'#6B7280',i:'📦'}};
const CPJ={impostos:{l:'Impostos',c:'#EF4444',i:'🏛'},contabilidade:{l:'Contabilidade',c:'#8B5CF6',i:'📚'},operacional:{l:'Operacional',c:'#F97316',i:'⚙️'},folha:{l:'Folha/Sócios',c:'#F59E0B',i:'👥'},servicos_pj:{l:'Serviços PJ',c:'#06B6D4',i:'🔧'},marketing:{l:'Marketing',c:'#EC4899',i:'📣'},outros_pj:{l:'Outros',c:'#6B7280',i:'📦'}};
const CATS={...CPF,...CPJ};
const ITYPES_PF=['FII','ETF','Fundo','Renda Fixa','Ações','Crypto','Tesouro Direto','Outros'];
const ITYPES_PJ=['Fundo PJ','Renda Fixa PJ','CDB','LCI/LCA','Tesouro Direto PJ','Outros PJ'];
const CARDS=['Nubank','Santander','BB','Outro'];
const CARD_C={Nubank:'#8B5CF6',Santander:'#EF4444',BB:'#F59E0B',Outro:'#6B7280'};

/* ── AUTH ── */
const getPass=()=>localStorage.getItem('nmm_pass')||'1234';
function login(){
  if(document.getElementById('pwd').value!==getPass()){
    document.getElementById('lerr').style.display='block';
    document.getElementById('pwd').value='';return;
  }
  document.getElementById('login').style.display='none';
  const a=document.getElementById('app');a.style.display='flex';a.style.flexDirection='column';
  init();
}
function logout(){
  document.getElementById('login').style.display='flex';
  document.getElementById('app').style.display='none';
  document.getElementById('pwd').value='';
  document.getElementById('lerr').style.display='none';
}

/* ── DATA ── */
const load=()=>{try{return JSON.parse(localStorage.getItem('nmm_data')||'{}')}catch{return{}}};
const save=d=>localStorage.setItem('nmm_data',JSON.stringify(d));
function blank(){return{pf:{inc:[],bills:[],inv:[]},pj:{inc:[],bills:[],inv:[]},xfer:[],cards:[]};}
function getMD(k){
  const d=load();if(!d[k])d[k]=blank();
  const m=d[k];
  m.pf=m.pf||{};m.pf.inc=m.pf.inc||[];m.pf.bills=m.pf.bills||[];m.pf.inv=m.pf.inv||[];
  m.pj=m.pj||{};m.pj.inc=m.pj.inc||[];m.pj.bills=m.pj.bills||[];m.pj.inv=m.pj.inv||[];
  m.xfer=m.xfer||[];m.cards=m.cards||[];
  return m;
}
function saveMD(k,m){const d=load();d[k]=m;save(d);}
const allKeys=()=>Object.keys(load()).sort((a,b)=>b.localeCompare(a));

/* ── STATE ── */
let curM='2026-06',curAcc='PF',curTab='dash';
let CHS={};
const dC=()=>{Object.values(CHS).forEach(c=>{try{c.destroy()}catch{}});CHS={};};

/* ── INIT ── */
function init(){
  if(!load()['2026-06'])saveMD('2026-06',blank());
  curM='2026-06';bSel();
  document.getElementById('msel').value=curM;
  checkVencimentos();render();
}
function bSel(){
  const sel=document.getElementById('msel'),prev=sel.value||curM;
  if(!allKeys().includes(curM))saveMD(curM,getMD(curM));
  const fk=allKeys();
  sel.innerHTML=fk.map(k=>`<option value="${k}">${mLabel(k)}</option>`).join('');
  if(fk.includes(prev))sel.value=prev;else sel.value=fk[0]||curM;
}
function changeMonth(v){curM=v;checkVencimentos();render();}
function setAcc(a){
  curAcc=a;
  ['PF','PJ','ALL'].forEach(x=>document.getElementById('ab-'+x.toLowerCase()).classList.toggle('on',x===a));
  render();
}
function addMonth(){
  const n=new Date();
  for(let i=0;i<24;i++){
    const d=new Date(n.getFullYear(),n.getMonth()+i);
    const k=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    if(!allKeys().includes(k)){
      // Copy recorrentes from previous month
      const prev=allKeys()[0];
      if(prev){
        const pm=getMD(prev);const nm=blank();
        pm.pf.bills.filter(b=>b.rec).forEach(b=>nm.pf.bills.push({...b,id:uid(),ok:false}));
        pm.pj.bills.filter(b=>b.rec).forEach(b=>nm.pj.bills.push({...b,id:uid(),ok:false}));
        pm.cards.filter(c=>c.rec).forEach(c=>{
          const proxParc=(c.parcAtual||1)+1;
          const total=c.parcelas||1;
          // Só copia se ainda tem parcelas restantes, ou se é recorrente sem parcelas (parcelas=1)
          if(total<=1||proxParc<=total){
            nm.cards.push({...c,id:uid(),ok:false,parcAtual:proxParc});
          }
          // Se chegou na última parcela, não copia mais — parcelamento encerrado
        });
        pm.pf.inv.filter(i=>i.rec).forEach(i=>nm.pf.inv.push({...i,id:uid(),ok:false}));
        pm.pj.inv.filter(i=>i.rec).forEach(i=>nm.pj.inv.push({...i,id:uid(),ok:false}));
        saveMD(k,nm);
      } else saveMD(k,blank());
      curM=k;bSel();document.getElementById('msel').value=k;render();
      toast('Mês criado');return;
    }
  }
}
function goTab(t,btn){
  curTab=t;document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));btn.classList.add('on');render();
}

/* ── VENCIMENTOS ── */
function checkVencimentos(){
  const m=getMD(curM);let v=0;
  const today=now.getDate();
  [...m.pf.bills,...m.pj.bills,...m.cards].forEach(b=>{
    if(!b.ok&&b.date){
      const d=parseInt(b.date);
      if(!isNaN(d)&&d-today<=3&&d>=today)v++;
    }
  });
  const tab=document.querySelector('.tab[data-t="contas"]');
  if(tab)tab.innerHTML=`📋 Contas${v>0?`<span class="tab-badge">${v}</span>`:''}`;
}

/* ── PILL ── */
function updatePill(){
  const m=getMD(curM);
  const pfI=m.pf.inc.reduce((s,i)=>s+i.v,0);
  const pfO=m.pf.bills.reduce((s,b)=>s+b.v,0)+m.cards.reduce((s,c)=>s+c.v,0)+m.pf.inv.reduce((s,i)=>s+i.v,0);
  const pjI=m.pj.inc.reduce((s,i)=>s+i.v,0);
  const pjO=m.pj.bills.reduce((s,b)=>s+b.v,0)+m.xfer.reduce((s,x)=>s+x.v,0)+m.pj.inv.reduce((s,i)=>s+i.v,0);
  const bal=curAcc==='PF'?pfI-pfO:curAcc==='PJ'?pjI-pjO:(pfI+pjI)-(pfO+pjO);
  const pill=document.getElementById('spill');pill.style.display='';
  const pos=bal>=0;
  pill.style.cssText+=`;background:${pos?'var(--green2)':'var(--red2)'};border:1px solid ${pos?'rgba(16,185,129,.3)':'rgba(239,68,68,.3)'};color:${pos?'var(--green)':'var(--red)'}`;
  pill.textContent=fmt(bal);
}

function render(){
  dC();updatePill();
  const fns={dash:pgDash,entradas:pgEntradas,contas:pgContas,cartoes:pgCartoes,invest:pgInvest,transf:pgTransf,saude:pgSaude,hist:pgHist,cfg:pgCfg};
  document.getElementById('pg').innerHTML=(fns[curTab]||pgDash)();
  document.querySelector('.scroll').scrollTop=0;
  requestAnimationFrame(()=>{
    if(curTab==='dash')drawDash();
    if(curTab==='saude')drawSaude();
    if(curTab==='hist')drawHist();
    if(curTab==='invest')drawInvest();
    if(curTab==='cartoes')drawCartoes();
  });
}

/* ── HELPER ── */
function cb(title,icon,items,col,rowFn,extra=''){
  const done=items.filter(i=>i.ok).length;
  const tot=items.reduce((s,i)=>s+i.v,0);
  return `<div class="cblock">
    <div class="cbh">
      <div class="cbhtl">${icon} ${title} <span class="cbct">${done}/${items.length}</span>${extra}</div>
      <div class="cbv" style="color:${col}">${fmt(tot)}</div>
    </div>
    ${items.length?items.map(rowFn).join(''):'<div class="erow">Nenhum item ainda.</div>'}
  </div>`;
}

/* ══════════════════════════════════
   DASHBOARD
══════════════════════════════════ */
function pgDash(){
  const m=getMD(curM);
  const pfI=m.pf.inc.reduce((s,i)=>s+i.v,0);
  const pfO=m.pf.bills.reduce((s,b)=>s+b.v,0);
  const pfC=m.cards.reduce((s,c)=>s+c.v,0);
  const pfInv=m.pf.inv.reduce((s,i)=>s+i.v,0);
  const pjI=m.pj.inc.reduce((s,i)=>s+i.v,0);
  const pjO=m.pj.bills.reduce((s,b)=>s+b.v,0);
  const pjInv=m.pj.inv.reduce((s,i)=>s+i.v,0);
  const xfer=m.xfer.reduce((s,x)=>s+x.v,0);
  const pfBal=pfI-pfO-pfC-pfInv;
  const pjBal=pjI-pjO-pjInv-xfer;
  const totalInv=allKeys().reduce((s,k)=>{const md=getMD(k);return s+md.pf.inv.reduce((a,i)=>a+i.v,0)+md.pj.inv.reduce((a,i)=>a+i.v,0)},0);

  // pending alerts
  const pending=[...m.pf.bills,...m.pj.bills,...m.cards].filter(b=>!b.ok);
  const totalPending=pending.reduce((s,b)=>s+b.v,0);

  // projeção: onde vai o dinheiro
  const total=pfI||1;
  const segs=[
    {l:'Contas',v:pfO,c:'#EF4444'},{l:'Cartões',v:pfC,c:'#8B5CF6'},
    {l:'Invest',v:pfInv,c:'#10B981'},{l:'Sobra',v:Math.max(0,pfBal),c:'#F59E0B'}
  ].filter(s=>s.v>0);

  const projBar=segs.map(s=>`<div class="proj-seg" style="width:${(s.v/total*100).toFixed(1)}%;background:${s.c}">${(s.v/total*100).toFixed(0)}%</div>`).join('');

  // vencendo em breve
  const soon=[...m.pf.bills,...m.pj.bills,...m.cards].filter(b=>{
    if(b.ok||!b.date)return false;
    const d=parseInt(b.date),t=now.getDate();
    return !isNaN(d)&&d-t<=5&&d>=t;
  }).sort((a,b)=>parseInt(a.date)-parseInt(b.date));

  const soonRows=soon.slice(0,4).map(b=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)">
    <div>
      <div style="font-size:13px;font-weight:500">${b.n||b.card}</div>
      <div style="font-size:11px;color:var(--sub)">Vence dia ${b.date}</div>
    </div>
    <div style="font-weight:700;color:var(--orange)">${fmt(b.v)}</div>
  </div>`).join('');

  return `
  <!-- KPIs -->
  <div class="g4">
    <div class="card card-hi">
      <div class="sl">Receita PF</div>
      <div class="sv" style="color:var(--green)">${fmt(pfI)}</div>
      <div class="ss">${m.pf.inc.filter(i=>i.ok).length}/${m.pf.inc.length} recebidas</div>
    </div>
    <div class="card">
      <div class="sl">Gastos PF</div>
      <div class="sv" style="color:var(--red)">${fmt(pfO+pfC)}</div>
      <div class="ss">Contas + Cartões</div>
    </div>
    <div class="card">
      <div class="sl">Investido</div>
      <div class="sv" style="color:var(--purple)">${fmt(pfInv+pjInv)}</div>
      <div class="ss">PF + PJ</div>
    </div>
    <div class="card card-hi">
      <div class="sl">Saldo PF</div>
      <div class="sv" style="color:${pfBal>=0?'var(--green)':'var(--red)'}">${fmt(pfBal)}</div>
      <div class="ss">Renda − Gastos − Invest</div>
    </div>
  </div>

  ${curAcc!=='PF'?`<div class="g4">
    <div class="card"><div class="sl">Faturamento PJ</div><div class="sv" style="color:var(--blue)">${fmt(pjI)}</div></div>
    <div class="card"><div class="sl">Saídas PJ</div><div class="sv" style="color:var(--red)">${fmt(pjO)}</div></div>
    <div class="card"><div class="sl">Investido PJ</div><div class="sv" style="color:var(--purple)">${fmt(pjInv)}</div></div>
    <div class="card"><div class="sl">Saldo PJ</div><div class="sv" style="color:${pjBal>=0?'var(--green)':'var(--red)'}">${fmt(pjBal)}</div></div>
  </div>`:''}

  <!-- PROJEÇÃO DA RENDA -->
  <div class="card">
    <div class="sh"><div class="st">Distribuição da Renda PF</div><div style="font-size:11px;color:var(--sub)">${fmt(pfI)}</div></div>
    <div class="proj-bar">${projBar||'<div style="color:var(--sub);font-size:12px;padding:8px">Lance entradas para ver a distribuição</div>'}</div>
    <div style="display:flex;gap:12px;margin-top:10px;flex-wrap:wrap">
      ${segs.map(s=>`<div style="display:flex;align-items:center;gap:5px;font-size:11px">
        <div style="width:8px;height:8px;border-radius:2px;background:${s.c}"></div>
        <span style="color:var(--sub)">${s.l}</span> <strong>${fmt(s.v)}</strong>
      </div>`).join('')}
    </div>
  </div>

  <!-- PATRIMÔNIO + GRÁFICOS -->
  <div class="g2">
    <div class="card">
      <div class="sl">Patrimônio Investido Total</div>
      <div class="sv" style="color:var(--purple)">${fmt(totalInv)}</div>
      <div class="ss">Acumulado em todos os meses</div>
      <div class="divider" style="margin:12px 0"></div>
      <div class="st" style="margin-bottom:10px">Gastos por Categoria</div>
      <div class="ch ch-m"><canvas id="cvpie"></canvas></div>
    </div>
    <div class="card">
      <div class="st" style="margin-bottom:10px">Receita vs Gastos</div>
      <div class="ch ch-m"><canvas id="cvbar"></canvas></div>
    </div>
  </div>

  <!-- PENDENTES + VENCENDO EM BREVE -->
  <div class="g2">
    <div class="card">
      <div class="sh"><div class="st">⏳ Pendente</div><div style="color:var(--orange);font-weight:700">${fmt(totalPending)}</div></div>
      ${pending.slice(0,5).map(b=>`<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:12px">
        <span>${b.n||b.card||'—'}</span><span style="font-weight:700;color:var(--orange)">${fmt(b.v)}</span>
      </div>`).join('')||'<div class="erow">Tudo em dia ✓</div>'}
    </div>
    <div class="card">
      <div class="sh"><div class="st">🔔 Vencendo em breve</div></div>
      ${soonRows||'<div class="erow">Nenhum vencimento próximo</div>'}
    </div>
  </div>`;
}

function drawDash(){
  const m=getMD(curM);
  const billsSrc=curAcc==='PJ'?m.pj.bills:[...m.pf.bills,...(curAcc==='ALL'?m.pj.bills:[])];
  const byCat={};
  billsSrc.forEach(b=>byCat[b.c||'outros']=(byCat[b.c||'outros']||0)+b.v);
  if(curAcc!=='PJ')byCat['cartao']=(byCat['cartao']||0)+m.cards.reduce((s,c)=>s+c.v,0);
  const allC={...CATS,cartao:{l:'Cartões',c:'#8B5CF6',i:'💳'}};
  const e=Object.entries(byCat).filter(([,v])=>v>0);
  const pie=document.getElementById('cvpie');
  if(pie&&e.length)CHS.pie=new Chart(pie,{type:'doughnut',
    data:{labels:e.map(([k])=>allC[k]?.l||k),datasets:[{data:e.map(([,v])=>v),backgroundColor:e.map(([k])=>(allC[k]?.c||'#666')+'bb'),borderColor:'#0d0d1a',borderWidth:3}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'64%',plugins:{legend:{position:'right',labels:{color:'#8888aa',font:{size:11},boxWidth:9,padding:7}}}}
  });
  const months=allKeys().slice(0,6).reverse();
  const bar=document.getElementById('cvbar');
  if(bar){
    const iKey=curAcc==='PJ'?'pj':'pf';
    CHS.bar=new Chart(bar,{type:'bar',
      data:{labels:months.map(k=>{const[y,mo]=k.split('-');return new Date(+y,+mo-1).toLocaleDateString('pt-BR',{month:'short'})}),
        datasets:[
          {label:'Receita',data:months.map(k=>getMD(k)[iKey].inc.reduce((s,i)=>s+i.v,0)),backgroundColor:'rgba(16,185,129,.22)',borderColor:'#10B981',borderWidth:2,borderRadius:5},
          {label:'Gastos',data:months.map(k=>getMD(k)[iKey].bills.reduce((s,b)=>s+b.v,0)+(iKey==='pf'?getMD(k).cards.reduce((s,c)=>s+c.v,0):0)),backgroundColor:'rgba(239,68,68,.22)',borderColor:'#EF4444',borderWidth:2,borderRadius:5},
        ]},
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{labels:{color:'#8888aa',font:{size:11},boxWidth:9}}},
        scales:{x:{ticks:{color:'#555'},grid:{color:'rgba(255,255,255,.04)'}},y:{ticks:{color:'#555',callback:v=>fmtK(v)},grid:{color:'rgba(255,255,255,.04)'}}}}
    });
  }
}

/* ══════════════════════════════════
   ENTRADAS
══════════════════════════════════ */
function pgEntradas(){
  const m=getMD(curM);
  const pfI=m.pf.inc.reduce((s,i)=>s+i.v,0);
  const pjI=m.pj.inc.reduce((s,i)=>s+i.v,0);
  const showPJ=curAcc==='PJ'||curAcc==='ALL';
  const mkR=(i,src)=>`<div class="crow ${i.ok?'done':''}" onclick="tgInc('${i.id}','${src}')">
    <div class="chk ${i.ok?'ok':''}" style="color:var(--green)">${i.ok?CHK:''}</div>
    <span class="rn">${i.n}</span>
    ${i.date?`<span class="rd">${i.date}</span>`:''}
    <span class="rv" style="color:var(--green)">${fmt(i.v)}</span>
    <button class="rdl" onclick="event.stopPropagation();del('${i.id}','${src}','inc')">×</button>
  </div>`;
  const srcSel=curAcc==='ALL'?`<select class="fs" id="inc-src"><option value="pf">👤 PF</option><option value="pj">🏢 PJ</option></select>`:'';
  return `<div class="g2">
    <div class="card"><div class="sl">PF</div><div class="sv" style="color:var(--green)">${fmt(pfI)}</div>

function renderInvSaude(histPF,histPJ,total){
  const allTypes={...histPF};
  Object.entries(histPJ).forEach(([k,v])=>allTypes[k]=(allTypes[k]||0)+v);
  const entries=Object.entries(allTypes);
  if(!entries.length)return `<div class="card"><div class="st">📊 Relatório da Carteira</div><div class="erow">Lance aportes para ver o relatório.</div></div>`;
  const bigger=entries.reduce((a,b)=>b[1]>a[1]?b:a,['',0]);
  const concPct=total>0?(bigger[1]/total*100).toFixed(0):0;
  const diversity=entries.length;

  const rows=entries.sort((a,b)=>b[1]-a[1]).map(([t,v])=>{
    const p=total>0?(v/total*100).toFixed(1):0;
    const ok=p<40;
    return `<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">
      <div style="width:7px;height:7px;border-radius:50%;background:${ok?'var(--green)':'var(--orange)'}"></div>
      <div style="flex:1;font-size:13px;font-weight:500">${t}</div>
      <div style="font-weight:700;font-size:13px">${fmt(v)}</div>
      <div style="font-size:11px;color:${ok?'var(--green)':'var(--orange)'};font-weight:700;min-width:36px;text-align:right">${p}%</div>
    </div>`;
  }).join('');

  const alerts=[];
  if(concPct>50)alerts.push({t:'red',m:`⚠️ ${bigger[0]} representa ${concPct}% da carteira — concentração alta`});
  if(diversity<3)alerts.push({t:'yellow',m:`💡 Carteira pouco diversificada (${diversity} tipo${diversity>1?'s':''})`});
  if(diversity>=4&&concPct<40)alerts.push({t:'green',m:`✅ Boa diversificação entre ${diversity} tipos de ativos`});

  return `<div class="card">
    <div class="sh"><div class="st">📊 Relatório da Carteira</div>
      <div style="font-size:11px;color:var(--sub)">${diversity} tipo${diversity>1?'s':''} · ${entries.length} ativos</div>
    </div>
    ${alerts.map(a=>`<div class="al al-${a.t}" style="margin-bottom:8px">${a.m}</div>`).join('')}
    ${rows}
  </div>`;
}

function calcInvScore(){
  const allH={};let totalH=0;
  allKeys().forEach(k=>{
    const md=getMD(k);
    [...md.pf.inv,...md.pj.inv].forEach(i=>{allH[i.t]=(allH[i.t]||0)+i.v;totalH+=i.v;});
  });
  if(!totalH)return 0;
  const types=Object.keys(allH).length;
  const maxConc=totalH>0?Math.max(...Object.values(allH))/totalH*100:100;
  const divScore=Math.min(40,types*10);
  const concScore=Math.min(40,Math.max(0,40-(maxConc-30)));
  const monthlyCnt=allKeys().filter(k=>getMD(k).pf.inv.length>0||getMD(k).pj.inv.length>0).length;
  const consScore=Math.min(20,monthlyCnt*5);
  return Math.round(divScore+concScore+consScore);
}

function drawInvest(){
  const m=getMD(curM);

/* ══════════════════════════════════
   SAÚDE FINANCEIRA
══════════════════════════════════ */
function calcScore(k){
  const m=getMD(k);
  const inc=m.pf.inc.reduce((s,i)=>s+i.v,0);
  if(!inc)return 0;
  const out=m.pf.bills.reduce((s,b)=>s+b.v,0)+m.cards.reduce((s,c)=>s+c.v,0);
  const inv=m.pf.inv.reduce((s,i)=>s+i.v,0)+m.pj.inv.reduce((s,i)=>s+i.v,0);
  const savR=(inc-out)/inc*100;
  const invR=inv/inc*100;
  const paidR=m.pf.bills.length?m.pf.bills.filter(b=>b.ok).length/m.pf.bills.length*100:100;
  return Math.round(Math.min(100,Math.max(0,Math.min(40,savR)+Math.min(30,invR*2)+paidR*.3)));
}

function pgSaude(){
  const score=calcScore(curM);
  const iScore=calcInvScore();
  const col=score>=70?'var(--green)':score>=40?'var(--gold)':'var(--red)';
  const iCol=iScore>=70?'var(--green)':iScore>=40?'var(--gold)':'var(--red)';
  const lbl=score>=70?'Ótima 🟢':score>=40?'Regular 🟡':'Atenção 🔴';
  const m=getMD(curM);
  const inc=m.pf.inc.reduce((s,i)=>s+i.v,0);
  const out=m.pf.bills.reduce((s,b)=>s+b.v,0);
  const cards=m.cards.reduce((s,c)=>s+c.v,0);
  const inv=m.pf.inv.reduce((s,i)=>s+i.v,0)+m.pj.inv.reduce((s,i)=>s+i.v,0);
  const pjI=m.pj.inc.reduce((s,i)=>s+i.v,0);
  const pjO=m.pj.bills.reduce((s,b)=>s+b.v,0);
  const xfer=m.xfer.reduce((s,x)=>s+x.v,0);
  const totalOut=out+cards;
  const savR=inc>0?((inc-totalOut)/inc*100).toFixed(1):0;
  const invR=inc>0?(inv/inc*100).toFixed(1):0;
  const cardR=inc>0?(cards/inc*100).toFixed(1):0;
  const paidR=m.pf.bills.length?(m.pf.bills.filter(b=>b.ok).length/m.pf.bills.length*100).toFixed(0):100;

  // Projeção 3 meses
  const keys=allKeys();
  const avgInc=keys.length?keys.slice(0,3).reduce((s,k)=>s+getMD(k).pf.inc.reduce((a,i)=>a+i.v,0),0)/Math.min(3,keys.length):0;
  const avgOut=keys.length?keys.slice(0,3).reduce((s,k)=>s+getMD(k).pf.bills.reduce((a,b)=>a+b.v,0)+getMD(k).cards.reduce((a,c)=>a+c.v,0),0)/Math.min(3,keys.length):0;
  const avgInv=keys.length?keys.slice(0,3).reduce((s,k)=>s+getMD(k).pf.inv.reduce((a,i)=>a+i.v,0)+getMD(k).pj.inv.reduce((a,i)=>a+i.v,0),0)/Math.min(3,keys.length):0;
  const proj3=((avgInc-avgOut-avgInv)*3).toFixed(0);

  const alerts=[];
  if(+cardR>30)alerts.push({t:'red',m:`⚠️ Cartões = ${cardR}% da renda (ideal <30%)`});
  if(+savR<10)alerts.push({t:'red',m:`⚠️ Taxa de economia baixa: ${savR}% (meta: >20%)`});
  if(+savR>=20)alerts.push({t:'green',m:`✅ Economia saudável: ${savR}% da renda`});
  if(+invR<5)alerts.push({t:'yellow',m:`💡 Invista mais: apenas ${invR}% da renda investida`});
  if(+invR>=10)alerts.push({t:'green',m:`✅ Bom ritmo de investimento: ${invR}% da renda`});
  if(pjI>0&&pjI-pjO-xfer<0)alerts.push({t:'red',m:`⚠️ Caixa PJ negativo — revise saídas`});
  if(+proj3>0)alerts.push({t:'blue',m:`📈 Projeção 3 meses: acumular +${fmt(+proj3)} (média atual)`});

  const metrics=[
    {l:'Taxa de Economia',v:`${savR}%`,ok:+savR>=20,tip:'Meta: >20% da renda'},
    {l:'Taxa de Investimento',v:`${invR}%`,ok:+invR>=10,tip:'Meta: >10% da renda'},
    {l:'Peso dos Cartões',v:`${cardR}%`,ok:+cardR<=30,tip:'Ideal: <30% da renda'},
    {l:'Contas em Dia',v:`${paidR}%`,ok:+paidR>=80,tip:'Meta: 100%'},
    {l:'Saldo PF',v:fmt(inc-totalOut-inv),ok:(inc-totalOut-inv)>=0,tip:'Renda − Tudo'},
    {l:'Caixa PJ',v:fmt(pjI-pjO-xfer),ok:(pjI-pjO-xfer)>=0,tip:'PJ após custos e repasses'},
    {l:'Score Investimentos',v:`${iScore}/100`,ok:iScore>=60,tip:'Diversificação e constância'},
  ];

  return `${alerts.map(a=>`<div class="al al-${a.t}">${a.m}</div>`).join('')}
  <div class="g2">
    <div class="card" style="display:flex;align-items:center;gap:18px">
      <div style="position:relative;width:90px;height:90px;flex-shrink:0">
        <canvas id="cvscore" width="90" height="90"></canvas>
        <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column">
          <div style="font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:${col}">${score}</div>
          <div style="font-size:9px;color:var(--sub);letter-spacing:1px">SCORE</div>
        </div>
      </div>
      <div>
        <div class="sl">Saúde Financeira</div>
        <div style="font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:${col}">${lbl}</div>
        <div class="ss">Score investimentos: <strong style="color:${iCol}">${iScore}/100</strong></div>
      </div>
    </div>
    <div class="card"><div class="st" style="margin-bottom:9px">Evolução do Score</div><div class="ch ch-s"><canvas id="cvsl"></canvas></div></div>
  </div>
  <div style="display:flex;flex-direction:column;gap:7px">${metrics.map(it=>`
    <div class="mr">
      <div class="md" style="background:${it.ok?'var(--green)':'var(--red)'}"></div>
      <div class="mi"><div class="mt">${it.l}</div><div class="ms">${it.tip}</div></div>
      <div class="mv" style="color:${it.ok?'var(--green)':'var(--orange)'}">${it.v}</div>
    </div>`).join('')}
  </div>
  <div class="g2">
    <div class="card"><div class="st" style="margin-bottom:9px">Onde vai o dinheiro</div><div class="ch ch-m"><canvas id="cvdist"></canvas></div></div>
    <div class="card"><div class="st" style="margin-bottom:9px">Patrimônio acumulado</div><div class="ch ch-m"><canvas id="cvia"></canvas></div></div>
  </div>`;
}

}
function chPass(){
  const o=document.getElementById('so').value,n=document.getElementById('sn').value,c=document.getElementById('sc').value;
  const msg=document.getElementById('pmsg');msg.style.display='block';
  if(o!==getPass()){msg.style.color='var(--red)';msg.textContent='Senha incorreta.';return;}
  if(n.length<3){msg.style.color='var(--red)';msg.textContent='Mínimo 3 caracteres.';return;}
  if(n!==c){msg.style.color='var(--red)';msg.textContent='Senhas não coincidem.';return;}
  localStorage.setItem('nmm_pass',n);msg.style.color='var(--green)';msg.textContent='Senha alterada.';
}
function expData(){
  const b=new Blob([JSON.stringify(load(),null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);
  a.download=`naomemath_${new Date().toISOString().slice(0,10)}.json`;a.click();toast('Backup exportado');
}
function impData(inp){
  const f=inp.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=e=>{try{save(JSON.parse(e.target.result));bSel();render();toast('Dados importados');}catch{toast('Arquivo inválido','var(--red)');}};
  r.readAsText(f);
}
function clrAll(){
  if(!confirm('Apagar TODOS os dados permanentemente?'))return;
  if(!confirm('Última confirmação.'))return;
  localStorage.removeItem('nmm_data');localStorage.removeItem('nmm_pass');location.reload();
}
</script>
</body>
</html>
